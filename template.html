<script>
const RECIPES_RAW = /*__RECIPES_DATA__*/;

const FOLDER_META = {
  'Volaille': { icon: '🍗', order: 0 },
  'Boeuf':    { icon: '🥩', order: 1 },
  'Porc':     { icon: '🐖', order: 2 },
  'Poisson':  { icon: '🐟', order: 3 },
  'Végé':     { icon: '🥦', order: 4 },
  'Divers':   { icon: '✨', order: 5 },
  'Autres':   { icon: '📦', order: 99 },
};
const folderIcon = f => (FOLDER_META[f] || {}).icon || '📦';
const folderOrder = f => (FOLDER_META[f] || {}).order ?? 50;

// ---------- Markdown parsing ----------
function parseRecipe(raw) {
  const fmMatch = raw.match(/^---\n([\s\S]*?)\n---\n([\s\S]*)$/);
  if (!fmMatch) return null;
  const fm = {};
  fmMatch[1].split('\n').forEach(line => {
    const m = line.match(/^([\w_]+):\s*(.*)$/);
    if (m) fm[m[1]] = m[2].trim();
  });
  const body = fmMatch[2];

  const ingrMatch = body.match(/##\s*Ingr[ée]dients\s*\n([\s\S]*?)(?=\n##\s|$)/);
  const ingredients = [];
  let currentSubsection = null;
  if (ingrMatch) {
    ingrMatch[1].split('\n').forEach(line => {
      const sub = line.match(/^###\s+(.+?)\s*$/);
      if (sub) { currentSubsection = sub[1].trim(); return; }
      const it = line.match(/^-\s+(.+)$/);
      if (it) ingredients.push({ raw: it[1].trim(), subsection: currentSubsection });
    });
  }

  const prepMatch = body.match(/##\s*Pr[ée]paration\s*\n([\s\S]*?)(?=\n##\s|$)/);
  const preparation = [];
  if (prepMatch) {
    prepMatch[1].split('\n').forEach(line => {
      const m = line.match(/^\d+\.\s+(.+)$/);
      if (m) preparation.push(m[1].trim());
    });
  }

  const notesMatch = body.match(/##\s*Notes?\s*\n([\s\S]*?)$/);
  const notes = [];
  if (notesMatch) {
    notesMatch[1].split('\n').forEach(line => {
      const m = line.match(/^-\s+(.+)$/);
      if (m) notes.push(m[1].trim());
    });
  }

  const tagsMatch = (fm.tags || '').match(/\[(.*)\]/);
  const tags = tagsMatch ? tagsMatch[1].split(',').map(t => t.trim()).filter(Boolean) : [];

  return {
    titre: fm.titre || '(sans titre)',
    portions: parseInt(fm.portions) || 1,
    tempsPrep: fm.temps_prep || '',
    tempsCuisson: fm.temps_cuisson || '',
    tags, ingredients, preparation, notes,
    calories: parseInt(fm.calories) || null,
    proteines: parseInt(fm.proteines) || null,
    glucides: parseInt(fm.glucides) || null,
    lipides: parseInt(fm.lipides) || null,
    nutritionEstimee: (fm.nutrition_estimee || '').toLowerCase() === 'true',
    certifieBittle: (fm.certifie_bittle || '').toLowerCase() === 'true',
  };
}

// ---------- Ingredient parsing ----------
const UNIT_PATTERN = '(?:g|kg|ml|l|L|lb|oz|tasses?|c\\.\\s*à\\s*th[ée]|c\\.\\s*à\\s*soupe|gousses?|bo[îi]tes?|pots?|feuilles?|brins?|pieds?|t[êe]tes?|bottes?|paquets?|filets?|tranches?|morceaux?|quartiers?|conserves?|sachets?|contenants?|branches?|pinc[ée]es?|cubes?)';

function parseQty(s) {
  s = s.replace(/\s+/g, ' ').trim().replace(',', '.');
  const mixed = s.match(/^(\d+)\s+(\d+)\/(\d+)$/);
  if (mixed) return parseInt(mixed[1]) + parseInt(mixed[2]) / parseInt(mixed[3]);
  const frac = s.match(/^(\d+)\/(\d+)$/);
  if (frac) return parseInt(frac[1]) / parseInt(frac[2]);
  const n = parseFloat(s);
  return isNaN(n) ? null : n;
}

function parseIngredient(raw) {
  const qtyRe = /^((?:\d+\s+\d+\/\d+)|(?:\d+[.,]\d+)|(?:\d+\/\d+)|(?:\d+))\s+/;
  const qtyMatch = raw.match(qtyRe);
  let qty = null, rest = raw;
  if (qtyMatch) { qty = parseQty(qtyMatch[1]); rest = raw.slice(qtyMatch[0].length); }
  const unitRe = new RegExp('^(' + UNIT_PATTERN + ')\\s+', 'i');
  const unitMatch = rest.match(unitRe);
  let unit = null;
  if (unitMatch) {
    unit = unitMatch[1].toLowerCase().replace(/\s+/g, ' ').trim();
    rest = rest.slice(unitMatch[0].length);
  }
  rest = rest.replace(/^\([^)]*\)\s*/, '');
  rest = rest.replace(/^d['e]\s+/i, '');
  return { qty, unit, name: rest.trim() };
}

function formatQty(n) {
  if (n === null || n === undefined) return '';
  if (Math.abs(n - Math.round(n)) < 0.01) return String(Math.round(n));
  return n.toFixed(2).replace(/\.?0+$/, '').replace('.', ',');
}

// ---------- Categorization ----------
function normalizeName(name) {
  return name.toLowerCase()
    .replace(/œ/g,'oe').replace(/æ/g,'ae')
    .normalize('NFKD').replace(/[̀-ͯ]/g,'')
    .replace(/[,;:]/g,' ').replace(/\s+/g,' ').trim();
}
function nameForMatching(name) {
  return normalizeName(name)
    .replace(/\b(haches?|hachees?|finement|grossierement|tranches?|tranchees?|coupes?|coupees?|emincees?|en\s+(cubes?|des|lanieres|quartiers|biseau|julienne|petales?|rondelles|morceaux|tronc?ons|fines\s+tranches|fleurettes|bouquets?|aiguillettes))\b/g,'')
    .replace(/\b(divises?|divisees?|au\s+gout|au\s+choix|nature|moulus?|moulues?|broyes?|broyees?|rapes?|rapees?|effiloches?|effilochees?|battu|battue|legerement|emiette[es]?)\b/g,'')
    .replace(/\s+/g,' ').trim();
}
function normalizeUnit(u) {
  if (!u) return null;
  return u.replace(/s$/,'').replace(/\s+/g,' ');
}

// Conversions vers une unité de base pour pouvoir additionner
// des unités compatibles (ml/L, g/kg, etc.) lors du merge.
const UNIT_CONVERSIONS = {
  'ml':         { base: 'ml', factor: 1 },
  'l':          { base: 'ml', factor: 1000 },
  'tasse':      { base: 'ml', factor: 250 },
  'c. à thé':   { base: 'ml', factor: 5 },
  'c. à the':   { base: 'ml', factor: 5 },
  'c. à soupe': { base: 'ml', factor: 15 },
  'g':          { base: 'g',  factor: 1 },
  'kg':         { base: 'g',  factor: 1000 },
  'lb':         { base: 'g',  factor: 454 },
  'oz':         { base: 'g',  factor: 28.35 },
};

function getBase(unit) {
  if (!unit) return null;
  const u = normalizeUnit(unit);
  return UNIT_CONVERSIONS[u] || null;
}

function displayQty(qtyInBase, baseUnit) {
  if (qtyInBase === null || qtyInBase === undefined) return { qty: '', unit: '' };
  if (baseUnit === 'ml') {
    if (qtyInBase >= 1000) return { qty: formatQty(qtyInBase / 1000), unit: 'L' };
    return { qty: formatQty(qtyInBase), unit: 'ml' };
  }
  if (baseUnit === 'g') {
    if (qtyInBase >= 1000) return { qty: formatQty(qtyInBase / 1000), unit: 'kg' };
    return { qty: formatQty(qtyInBase), unit: 'g' };
  }
  return { qty: formatQty(qtyInBase), unit: baseUnit || '' };
}

const CATEGORIES = [
  ['Viandes & charcuterie', ['poulet','dinde','boeuf','porc','lardon','saucisse','cotelette','roti','palette','bifteck','tournedos','poitrine','haut de cuisse','filet de porc','filet mignon','viande','jambon','chair','crevette','saumon','poisson']],
  ['Produits laitiers & œufs', ['lait de coco','lait','creme de soya','creme','beurre d\'arachides','beurre de sesame','beurre','yogourt','fromage','parmesan','mozzarella','ricotta','feta','cheddar','monterey','bocconcini','halloumi','chevre','oeuf']],
  ['Sauces & condiments', ['sauce soya','tamari','hoisin','sriracha','huitres','mayonnaise','moutarde','ketchup','tahini','miso','salsa','barbecue','sauce piquante','vinaigre','ail en pot','gingembre en pot','pate de cari','concentre de bouillon','sauce a pizza','sauce tomate','fecule de mais']],
  ['Conserves & bocaux', ['tomates en des','tomates en cubes','coulis','haricots noirs','haricots','tomates sechees','pate de tomates','poivrons rotis','capres','boite de','conserve','pot de']],
  ['Pain, pâtes & céréales', ['chapelure','pita','naan','orzo','nouille','vermicelle','riz','quinoa','udon','panko','farine','chow mein','cereale','avoine','flocons d\'avoine','couscous','semoule']],
  ['Fruits & légumes', ['oignon','ail','carotte','pomme de terre','grelot','brocoli','courgette','poivron','celeri','epinard','laitue','romaine','iceberg','concombre','tomate cerise','tomate','radis','champignon','asperge','chou','rutabaga','fenouil','radicchio','pois','mange-tout','echalote','bok choy','feve germee','roquette','citron','lime','orange','pomme rouge','pomme','courge','ciboulette','aneth','basilic','persil','coriandre','menthe','thym frais','origan frais','romarin frais','estragon','gingembre frais','kale','poireau']],
  ['Bouillons & vins', ['bouillon','vin rouge','vin blanc','biere']],
  ['Sucré & sirops', ['sirop d\'erable','cassonade','sucre','miel']],
  ['Huiles', ['huile']],
  ['Épices & herbes séchées', ['paprika','cumin','cajun','italien','grec','passe-partout','thym seche','origan seche','romarin seche','epices','assaisonnement','herbes de provence','cinq-epices','5-epices','cannelle','muscade','girofle','laurier','piment','flocons','graines de','fines herbes','poudre d\'oignon','poudre d\'ail','poudre','gingembre','sel','poivre','bicarbonate','zaatar','ras-el-hanout']],
];
function categorize(name) {
  const n = nameForMatching(name);
  for (const [cat, kws] of CATEGORIES) {
    for (const kw of kws) {
      // Matching par mot entier (\b) pour éviter par ex. « laitue » -> « lait »
      const re = new RegExp('\\b' + kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\b', 'i');
      if (re.test(n)) return cat;
    }
  }
  return 'Autres';
}

// ---------- State ----------
// Calcule les macros par portion à partir de la ventilation CNF (source de vérité unique).
// Si aucune donnée calculée n'est disponible, retourne null pour chaque champ et on
// tombera en fallback sur les valeurs du frontmatter.
function macrosFromBreakdown(breakdown, portions) {
  if (!breakdown || !breakdown.length) return null;
  const ok = breakdown.filter(m => m.status === 'ok');
  if (!ok.length) return null;
  const tot = ok.reduce((s, m) => ({
    kcal: s.kcal + (m.kcal || 0),
    prot: s.prot + (m.prot || 0),
    gluc: s.gluc + (m.gluc || 0),
    lip:  s.lip  + (m.lip  || 0),
  }), { kcal: 0, prot: 0, gluc: 0, lip: 0 });
  const p = portions || 1;
  return {
    calories:  Math.round(tot.kcal / p),
    proteines: Math.round(tot.prot / p),
    glucides:  Math.round(tot.gluc / p),
    lipides:   Math.round(tot.lip  / p),
    nutritionEstimee: true,
  };
}

const recipes = RECIPES_RAW.map(r => {
  const parsed = parseRecipe(r.raw);
  const computed = macrosFromBreakdown(r.macros_par_ingredient, parsed.portions);
  // Les valeurs calculées CNF sont la source de vérité ; le frontmatter sert de fallback.
  return { ...r, ...parsed, ...(computed || {}) };
});
const STATE_KEY = 'gestion_alimentaire_state_v1';
const THEME_KEY = 'bittle_theme_v1';
const THEMES = [
  { id: 'framboise', label: 'Lin & framboise', color: '#c2185b' },
  { id: 'creme',     label: 'Crème',           color: '#ee6e2c' },
  { id: 'olive',     label: 'Beurre & olive',  color: '#7a8c3a' },
  { id: 'sauge',     label: 'Sauge & abricot', color: '#d68a5c' },
];

const state = loadState();
const ui = {
  view: 'recipes',
  detailRecipeId: null,
  detailTab: 'ingredients',
  searchQuery: '',
  activeCategory: null,
  certifMode: 'certifie', // 'certifie' | 'decouverte'
  ingredientChecks: {}, // recipeId -> ingredient idx -> bool (per-recipe checklist on detail)
  theme: localStorage.getItem(THEME_KEY) || 'framboise',
};

function applyTheme(themeId) {
  if (!THEMES.find(t => t.id === themeId)) themeId = 'framboise';
  document.body.classList.remove(...THEMES.map(t => 'theme-' + t.id));
  document.body.classList.add('theme-' + themeId);
  const meta = document.querySelector('meta[name="theme-color"]');
  const t = THEMES.find(x => x.id === themeId);
  if (meta && t) meta.setAttribute('content', t.color);
  localStorage.setItem(THEME_KEY, themeId);
  ui.theme = themeId;
}

// ---------- Dialogs (confirm / alert thématisés) ----------
function showDialog({ title, message = '', icon = null, buttons }) {
  return new Promise(resolve => {
    const root = document.getElementById('modal-root');
    const backdrop = document.createElement('div');
    backdrop.className = 'dialog-backdrop';
    const dialog = document.createElement('div');
    dialog.className = 'dialog';
    let html = '';
    if (icon) html += `<div class="dialog-icon ${icon.type}">${icon.glyph}</div>`;
    html += `<h3 class="dialog-title">${title}</h3>`;
    if (message) html += `<div class="dialog-message">${message}</div>`;
    html += '<div class="dialog-actions">' +
      buttons.map((b, i) =>
        `<button class="btn-dialog ${b.style || 'secondary'}" data-btn="${i}">${b.label}</button>`
      ).join('') + '</div>';
    dialog.innerHTML = html;
    backdrop.appendChild(dialog);
    root.appendChild(backdrop);

    const cleanup = (val) => {
      backdrop.remove();
      document.removeEventListener('keydown', onKey);
      resolve(val);
    };
    const onKey = e => {
      if (e.key === 'Escape') cleanup(null);
      if (e.key === 'Enter') {
        // Tap on the primary/danger button
        const primary = buttons.findIndex(b => b.style === 'primary' || b.style === 'danger');
        cleanup(primary >= 0 ? buttons[primary].value : (buttons[buttons.length - 1].value));
      }
    };
    backdrop.addEventListener('click', e => { if (e.target === backdrop) cleanup(null); });
    dialog.querySelectorAll('[data-btn]').forEach(btn => {
      btn.addEventListener('click', () => cleanup(buttons[+btn.dataset.btn].value));
    });
    document.addEventListener('keydown', onKey);
  });
}

async function showConfirm({ title, message = '', confirmText = 'Confirmer', cancelText = 'Annuler', danger = false }) {
  const result = await showDialog({
    title, message,
    icon: danger ? { type: 'warn', glyph: '⚠' } : null,
    buttons: [
      { label: cancelText, style: 'secondary', value: false },
      { label: confirmText, style: danger ? 'danger' : 'primary', value: true },
    ],
  });
  return result === true;
}

async function showAlert({ title, message = '', type = 'success', okText = 'OK' }) {
  const glyphs = { success: '✓', error: '⚠', warn: '!', info: 'i' };
  await showDialog({
    title, message,
    icon: { type, glyph: glyphs[type] || 'i' },
    buttons: [{ label: okText, style: 'primary', value: true }],
  });
}

function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem(STATE_KEY) || '{}');
    return { selected: s.selected || {}, checked: s.checked || {} };
  } catch { return { selected: {}, checked: {} }; }
}
function saveState() { localStorage.setItem(STATE_KEY, JSON.stringify(state)); }
function selectedRecipes() { return recipes.filter(r => state.selected[r.id]); }

function setGreeting() {
  const h = new Date().getHours();
  let g = 'BONJOUR';
  if (h >= 17) g = 'BONSOIR';
  else if (h < 12) g = 'BONJOUR';
  else g = 'BON APRÈS-MIDI';
  document.getElementById('greeting').textContent = g;
  const NAMES = ['Bittle', 'Chatoune', 'Sarah'];
  const name = NAMES[Math.floor(Math.random() * NAMES.length)];
  document.getElementById('page-title').textContent = `${name} 👸.`;
}

// ---------- View switching ----------
function switchView(v) {
  ui.view = v;
  document.querySelectorAll('.view').forEach(s => {
    s.classList.toggle('hidden', s.dataset.view !== v);
  });
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === v);
  });
  window.scrollTo({ top: 0, behavior: 'instant' });
  // Render
  if (v === 'recipes') renderRecipesView();
  else if (v === 'week') renderWeekView();
  else if (v === 'list') renderListView();
  else if (v === 'profile') renderProfileView();
  else if (v === 'detail') renderDetailView();
}

document.querySelectorAll('.tab-btn').forEach(b => {
  b.addEventListener('click', () => switchView(b.dataset.tab));
});

// ---------- Vue Recettes ----------
function renderRecipesView() {
  renderHero();
  renderCatPills();
  renderRecipeFeed();
  updateBadges();
}

function renderHero() {
  const root = document.getElementById('hero');
  const sel = selectedRecipes();
  if (sel.length === 0) {
    root.innerHTML = `
      <div class="hero hero-empty">
        <p class="hero-eyebrow">Bienvenue</p>
        <h2 class="hero-title">Cuisine de la semaine 🍳</h2>
        <p class="hero-meta">Sélectionne tes recettes pour bâtir ta liste de courses.</p>
      </div>`;
    return;
  }
  let totalCal = 0;
  for (const r of sel) {
    const wanted = state.selected[r.id].wantedPortions;
    if (r.calories !== null) totalCal += r.calories * wanted;
  }
  const featured = sel[0];
  const others = sel.length - 1;
  const otherTxt = others > 0 ? ` · +${others} autre${others > 1 ? 's' : ''}` : '';
  root.innerHTML = `
    <div class="hero">
      <p class="hero-eyebrow">Cette semaine · ${sel.length} recette${sel.length > 1 ? 's' : ''}</p>
      <h2 class="hero-title">${featured.titre}</h2>
      <p class="hero-meta">${otherTxt}${totalCal ? ' · ≈' + Math.round(totalCal).toLocaleString('fr-CA') + ' kcal' : ''}</p>
      <button class="hero-cta" id="hero-cta">Voir la liste de courses →</button>
    </div>`;
  document.getElementById('hero-cta').addEventListener('click', () => switchView('list'));
}

function renderCatPills() {
  const root = document.getElementById('cat-pills');
  root.innerHTML = '';

  // === Rangée 1 : toggle Certifiée / Découverte ===
  const nCertif = recipes.filter(r => r.certifieBittle).length;
  const nDecouv = recipes.length - nCertif;
  const toggle = document.createElement('div');
  toggle.className = 'filter-toggle';
  toggle.innerHTML = `
    <button class="toggle-opt opt-certifie ${ui.certifMode === 'certifie' ? 'active' : ''}" data-mode="certifie">
      <span>👑</span><span>Certifiée Bittle</span><span class="count">${nCertif}</span>
    </button>
    <button class="toggle-opt opt-decouverte ${ui.certifMode === 'decouverte' ? 'active' : ''}" data-mode="decouverte">
      <span>🔍</span><span>Découverte</span><span class="count">${nDecouv}</span>
    </button>
  `;
  toggle.querySelectorAll('.toggle-opt').forEach(btn => {
    btn.addEventListener('click', () => {
      ui.certifMode = btn.dataset.mode;
      renderRecipesView();
    });
  });
  root.appendChild(toggle);

  // === Rangée 2 : catégories en icônes seules ===
  // Compteurs basés sur le mode actif (pour ne pas afficher des catégories vides)
  const inMode = recipes.filter(r =>
    ui.certifMode === 'certifie' ? r.certifieBittle : !r.certifieBittle);
  const counts = {};
  for (const r of inMode) counts[r.folder] = (counts[r.folder] || 0) + 1;
  const folders = Object.keys(counts).sort((a, b) => folderOrder(a) - folderOrder(b));

  const row = document.createElement('div');
  row.className = 'cat-pills-row';

  const allBtn = document.createElement('button');
  allBtn.className = 'cat-pill icon-only' + (ui.activeCategory === null ? ' active' : '');
  allBtn.title = `Tout (${inMode.length})`;
  allBtn.innerHTML = `<span class="icon">🍽️</span>`;
  allBtn.addEventListener('click', () => { ui.activeCategory = null; renderRecipesView(); });
  row.appendChild(allBtn);

  for (const f of folders) {
    const btn = document.createElement('button');
    btn.className = 'cat-pill icon-only' + (ui.activeCategory === f ? ' active' : '');
    btn.title = `${f} (${counts[f]})`;
    btn.innerHTML = `<span class="icon">${folderIcon(f)}</span>`;
    btn.addEventListener('click', () => {
      ui.activeCategory = ui.activeCategory === f ? null : f;
      renderRecipesView();
    });
    row.appendChild(btn);
  }

  root.appendChild(row);
}

function recipeMatchesFilters(r) {
  if (ui.searchQuery) {
    const q = ui.searchQuery.toLowerCase();
    if (!r.titre.toLowerCase().includes(q)) return false;
  }
  if (ui.activeCategory && r.folder !== ui.activeCategory) return false;
  if (ui.certifMode === 'certifie' && !r.certifieBittle) return false;
  if (ui.certifMode === 'decouverte' && r.certifieBittle) return false;
  return true;
}

function renderRecipeFeed() {
  const root = document.getElementById('recipe-feed');
  root.innerHTML = '';
  const visible = recipes.filter(recipeMatchesFilters)
    .sort((a, b) => {
      const fo = folderOrder(a.folder) - folderOrder(b.folder);
      if (fo !== 0) return fo;
      return a.titre.localeCompare(b.titre);
    });

  if (visible.length === 0) {
    root.innerHTML = `<p class="empty-msg">Aucune recette ne correspond.</p>`;
    return;
  }

  for (const r of visible) {
    const card = document.createElement('div');
    card.className = 'recipe-card' + (state.selected[r.id] ? ' selected' : '');
    const cal = r.calories ? `<span>🔥 ${r.nutritionEstimee ? '≈' : ''}${r.calories} kcal</span>` : '';
    const time = (r.tempsPrep || r.tempsCuisson) ? `<span>⏱ ${r.tempsCuisson || r.tempsPrep}</span>` : '';
    card.innerHTML = `
      <div class="recipe-card-image" data-folder="${r.folder}">
        <span class="placeholder-emoji">${folderIcon(r.folder)}</span>
        <img src="assets/recipes/${r.id}.jpg" alt="" loading="lazy"
             onload="this.parentElement.classList.add('has-photo')"
             onerror="this.remove()">
        <span class="placeholder-badge">Photo à venir</span>
        ${r.certifieBittle ? '<span class="certifie-badge"><span class="crown">👑</span>Certifiée Bittle</span>' : ''}
        <div class="recipe-checkbox-overlay">
          <div class="recipe-checkbox">${state.selected[r.id] ? '✓' : ''}</div>
        </div>
      </div>
      <div class="recipe-card-content">
        <div class="recipe-tag">${folderIcon(r.folder)} ${r.folder}</div>
        <h3 class="recipe-card-title">${r.titre}</h3>
        <div class="recipe-card-meta">
          ${time}
          <span>👥 ${r.portions}</span>
          ${cal}
        </div>
      </div>`;
    card.addEventListener('click', () => openDetail(r.id));
    root.appendChild(card);
  }
}

function openDetail(id) {
  ui.detailRecipeId = id;
  ui.detailTab = 'ingredients';
  switchView('detail');
}

// ---------- Vue Détail ----------
function renderDetailView() {
  const r = recipes.find(x => x.id === ui.detailRecipeId);
  if (!r) { switchView('recipes'); return; }

  const sel = state.selected[r.id];
  const wanted = sel ? sel.wantedPortions : r.portions;

  const totalTime = (() => {
    const parseMin = s => {
      if (!s) return 0;
      const h = s.match(/(\d+)\s*h/);
      const m = s.match(/(\d+)\s*min/);
      return (h ? parseInt(h[1]) * 60 : 0) + (m ? parseInt(m[1]) : 0);
    };
    const total = parseMin(r.tempsPrep) + parseMin(r.tempsCuisson);
    if (!total) return '—';
    if (total >= 60) return `${Math.floor(total/60)}h${(total%60).toString().padStart(2,'0')}`;
    return `${total}m`;
  })();

  const root = document.getElementById('view-detail');
  root.innerHTML = `
    <div class="detail-hero">
      <div class="detail-hero-top">
        <button class="icon-btn-ghost" id="detail-back" aria-label="Retour">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="m15 18-6-6 6-6"/>
          </svg>
        </button>
      </div>
      <div class="detail-tag-pill">${folderIcon(r.folder)} ${r.folder}</div>${r.certifieBittle ? '<span class="detail-certifie-pill"><span style="font-size:0.85rem">👑</span> Certifiée Bittle</span>' : ''}
      <h1 class="detail-title">${r.titre}</h1>
      ${r.tags.length ? `<div class="detail-tags">${r.tags.map(t => `<span class="detail-mini-tag">${t}</span>`).join('')}</div>` : ''}
    </div>
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-value">${r.tempsPrep || '—'}</div>
        <div class="stat-label">Prep</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">${r.tempsCuisson || '—'}</div>
        <div class="stat-label">Cuisson</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">${totalTime}</div>
        <div class="stat-label">Total</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">${r.calories ? (r.nutritionEstimee ? '≈' : '') + r.calories : '—'}</div>
        <div class="stat-label">Kcal/p</div>
      </div>
    </div>
    <div class="portion-card">
      <div class="portion-info">
        <span class="lbl">Ajuster pour</span>
        <span class="val" id="portion-val">${wanted} portion${wanted > 1 ? 's' : ''}</span>
      </div>
      <div class="portion-controls">
        <button class="portion-btn" id="port-minus" ${wanted <= 1 ? 'disabled' : ''}>−</button>
        <button class="portion-btn" id="port-plus">+</button>
      </div>
    </div>
    <div class="detail-tabs">
      <button class="detail-tab ${ui.detailTab === 'ingredients' ? 'active' : ''}" data-dtab="ingredients">
        Ingrédients <span class="badge">${r.ingredients.length}</span>
      </button>
      <button class="detail-tab ${ui.detailTab === 'preparation' ? 'active' : ''}" data-dtab="preparation">
        Préparation <span class="badge">${r.preparation.length}</span>
      </button>
      <button class="detail-tab ${ui.detailTab === 'nutrition' ? 'active' : ''}" data-dtab="nutrition">Nutrition</button>
    </div>
    <div class="tab-content" id="detail-tab-content"></div>
    <button class="detail-cta ${sel ? 'in-selection' : ''}" id="detail-cta">
      ${sel ? `✓ Dans la sélection · Retirer (${wanted} portion${wanted > 1 ? 's' : ''})` : `+ Ajouter ${wanted} portion${wanted > 1 ? 's' : ''} à la sélection`}
    </button>`;

  document.getElementById('detail-back').addEventListener('click', () => switchView('recipes'));
  document.getElementById('port-minus').addEventListener('click', () => adjustPortion(r, -1));
  document.getElementById('port-plus').addEventListener('click', () => adjustPortion(r, 1));
  document.getElementById('detail-cta').addEventListener('click', () => {
    toggleSelection(r);
    updateBadges();
    switchView('recipes');
  });
  document.querySelectorAll('.detail-tab').forEach(t => {
    t.addEventListener('click', () => { ui.detailTab = t.dataset.dtab; renderDetailView(); });
  });

  renderDetailTabContent(r, wanted);
}

function adjustPortion(r, delta) {
  const sel = state.selected[r.id];
  const cur = sel ? sel.wantedPortions : r.portions;
  const next = Math.max(1, cur + delta);
  if (sel) {
    sel.wantedPortions = next;
  } else {
    state.selected[r.id] = { wantedPortions: next };
  }
  saveState();
  renderDetailView();
  updateBadges();
}

function toggleSelection(r) {
  if (state.selected[r.id]) delete state.selected[r.id];
  else state.selected[r.id] = { wantedPortions: r.portions };
  saveState();
}

function renderDetailTabContent(r, wanted) {
  const root = document.getElementById('detail-tab-content');
  if (ui.detailTab === 'ingredients') {
    const factor = wanted / r.portions;
    let html = '<p class="tab-hint">Coche ce que tu as déjà — le reste ira dans la liste.</p>';
    const bySub = {};
    const order = [];
    for (let i = 0; i < r.ingredients.length; i++) {
      const ing = r.ingredients[i];
      const k = ing.subsection || '';
      if (!(k in bySub)) { bySub[k] = []; order.push(k); }
      bySub[k].push({ ...ing, idx: i });
    }
    if (!ui.ingredientChecks[r.id]) ui.ingredientChecks[r.id] = {};
    for (const sub of order) {
      if (sub) html += `<div class="ingr-subhead">${sub}</div>`;
      html += '<div class="ingr-list">';
      for (const ing of bySub[sub]) {
        const parsed = parseIngredient(ing.raw);
        const scaled = parsed.qty !== null ? parsed.qty * factor : null;
        const qtyStr = scaled !== null ? `<span class="ingr-qty">${formatQty(scaled)} ${parsed.unit || ''}</span> ` : '';
        const checked = ui.ingredientChecks[r.id][ing.idx];
        html += `
          <div class="ingr-item" data-idx="${ing.idx}">
            <div class="ingr-check ${checked ? 'checked' : ''}">${checked ? '✓' : ''}</div>
            <div class="ingr-text ${checked ? 'struck' : ''}">${qtyStr}${parsed.name}</div>
          </div>`;
      }
      html += '</div>';
    }
    root.innerHTML = html;
    root.querySelectorAll('.ingr-item').forEach(el => {
      el.addEventListener('click', () => {
        const i = parseInt(el.dataset.idx);
        ui.ingredientChecks[r.id][i] = !ui.ingredientChecks[r.id][i];
        renderDetailTabContent(r, wanted);
      });
    });
  } else if (ui.detailTab === 'preparation') {
    if (r.preparation.length === 0) { root.innerHTML = '<p class="empty-msg">Aucune étape de préparation.</p>'; return; }
    let html = '<div class="prep-list">';
    r.preparation.forEach((step, i) => {
      html += `<div class="prep-step"><div class="prep-step-num">${i+1}</div><div class="prep-step-text">${step}</div></div>`;
    });
    html += '</div>';
    if (r.notes.length > 0) {
      html += '<div class="ingr-subhead" style="margin-top:1.5rem">Notes</div>';
      html += '<ul style="margin:0; padding-left:1.25rem; color:var(--text-soft); font-size:0.9rem;">';
      r.notes.forEach(n => html += `<li style="margin-bottom:0.4rem">${n}</li>`);
      html += '</ul>';
    }
    root.innerHTML = html;
  } else {
    const factor = wanted;
    const cal = r.calories !== null ? r.calories * factor : null;
    const p = r.proteines !== null ? r.proteines * factor : null;
    const g = r.glucides !== null ? r.glucides * factor : null;
    const l = r.lipides !== null ? r.lipides * factor : null;
    const fmt = v => v ? Math.round(v) : '—';
    const fmt1 = v => v ? v.toFixed(1) : '—';
    const px = r.nutritionEstimee ? '≈' : '';
    let html = `
      <div class="nutri-grid">
        <div class="nutri-card"><div class="lbl">Calories</div><div class="val">${px}${fmt(cal)}</div><div class="sub">par portion: ${px}${fmt(r.calories)}</div></div>
        <div class="nutri-card"><div class="lbl">Protéines</div><div class="val">${px}${fmt(p)}<span style="font-size:0.85rem;color:var(--muted)"> g</span></div><div class="sub">par portion: ${px}${fmt(r.proteines)} g</div></div>
        <div class="nutri-card"><div class="lbl">Glucides</div><div class="val">${px}${fmt(g)}<span style="font-size:0.85rem;color:var(--muted)"> g</span></div><div class="sub">par portion: ${px}${fmt(r.glucides)} g</div></div>
        <div class="nutri-card"><div class="lbl">Lipides</div><div class="val">${px}${fmt(l)}<span style="font-size:0.85rem;color:var(--muted)"> g</span></div><div class="sub">par portion: ${px}${fmt(r.lipides)} g</div></div>
      </div>
      <p class="nutri-note">Pour ${wanted} portion${wanted > 1 ? 's' : ''}. ≈ calculé à partir des ingrédients (CNF, Santé Canada).</p>
    `;

    // Ventilation par ingrédient (depuis macros_par_ingredient embarqué par build.py)
    if (r.macros_par_ingredient && r.macros_par_ingredient.length) {
      const portionFactor = wanted / (r.portions || 1);
      const items = r.macros_par_ingredient
        .filter(m => m.status === 'ok')
        .map(m => ({
          name: m.raw,
          grams: m.grams * portionFactor,
          kcal: m.kcal * portionFactor,
          prot: m.prot * portionFactor,
          gluc: m.gluc * portionFactor,
          lip:  m.lip  * portionFactor,
        }))
        .sort((a, b) => b.kcal - a.kcal);
      const totalKcal = items.reduce((s, m) => s + m.kcal, 0) || 1;
      const tot = items.reduce((s, m) => ({
        grams: s.grams + m.grams, kcal: s.kcal + m.kcal,
        prot: s.prot + m.prot, gluc: s.gluc + m.gluc, lip: s.lip + m.lip,
      }), { grams: 0, kcal: 0, prot: 0, gluc: 0, lip: 0 });
      const skipped = r.macros_par_ingredient.filter(m => m.status !== 'ok').length;
      const escapeHtml = s => s.replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));

      html += `
        <div class="nutri-breakdown">
          <h4>Ventilation par ingrédient</h4>
          <p class="nutri-breakdown-note">Pour ${wanted} portion${wanted > 1 ? 's' : ''}. Trié par calories décroissantes.${skipped ? ` ${skipped} ingrédient${skipped > 1 ? 's' : ''} sans macros (sel, eau, garnitures…)` : ''}</p>
          <div class="im-row im-header">
            <span>Ingrédient</span>
            <span class="im-num">g</span>
            <span class="im-num">kcal</span>
            <span class="im-num">P</span>
            <span class="im-num">G</span>
            <span class="im-num">L</span>
          </div>
          ${items.map(m => {
            const pctKcal = (m.kcal / totalKcal) * 100;
            return `
              <div class="im-row">
                <span class="im-name" title="${escapeHtml(m.name)}">
                  ${escapeHtml(m.name)}
                  <span class="im-bar" style="width:${pctKcal.toFixed(1)}%"></span>
                </span>
                <span class="im-num">${fmt(m.grams)}</span>
                <span class="im-num">${fmt(m.kcal)}</span>
                <span class="im-num">${fmt1(m.prot)}</span>
                <span class="im-num">${fmt1(m.gluc)}</span>
                <span class="im-num">${fmt1(m.lip)}</span>
              </div>`;
          }).join('')}
          <div class="im-row im-total">
            <span>Total</span>
            <span class="im-num">${fmt(tot.grams)}</span>
            <span class="im-num">${fmt(tot.kcal)}</span>
            <span class="im-num">${fmt1(tot.prot)}</span>
            <span class="im-num">${fmt1(tot.gluc)}</span>
            <span class="im-num">${fmt1(tot.lip)}</span>
          </div>
        </div>
      `;
    }

    root.innerHTML = html;
  }
}

// ---------- Vue Semaine ----------
function renderWeekView() {
  const root = document.getElementById('week-content');
  const sel = selectedRecipes();
  if (sel.length === 0) {
    root.innerHTML = `<div class="list-empty"><span class="emoji">🍽️</span><p>Aucune recette dans ta sélection. Va piger dans l'onglet Recettes.</p></div>`;
    updateBadges();
    return;
  }
  let totalCal = 0, totalP = 0, totalG = 0, totalL = 0, totalPortions = 0;
  for (const r of sel) {
    const w = state.selected[r.id].wantedPortions;
    totalPortions += w;
    if (r.calories !== null)  totalCal += r.calories * w;
    if (r.proteines !== null) totalP += r.proteines * w;
    if (r.glucides !== null)  totalG += r.glucides * w;
    if (r.lipides !== null)   totalL += r.lipides * w;
  }
  let html = `
    <div class="week-summary">
      <div class="week-summary-top">
        <div>
          <div class="week-summary-num">${sel.length}</div>
          <div class="week-summary-lbl">recette${sel.length > 1 ? 's' : ''} · ${totalPortions} portion${totalPortions > 1 ? 's' : ''}</div>
        </div>
        <div class="week-stat-block">
          <div class="v">≈${Math.round(totalCal).toLocaleString('fr-CA')}</div>
          <div class="l">kcal total</div>
        </div>
      </div>
      <div class="week-summary-macros">
        <div class="m"><span class="v">${Math.round(totalP)} g</span><span class="l">protéines</span></div>
        <div class="m"><span class="v">${Math.round(totalG)} g</span><span class="l">glucides</span></div>
        <div class="m"><span class="v">${Math.round(totalL)} g</span><span class="l">lipides</span></div>
      </div>
    </div>`;
  for (const r of sel) {
    const w = state.selected[r.id].wantedPortions;
    const px = r.nutritionEstimee ? '≈' : '';
    const fmt = v => v ? Math.round(v) : '—';
    const tCal = r.calories !== null ? r.calories * w : null;
    const tP   = r.proteines !== null ? r.proteines * w : null;
    const tG   = r.glucides !== null ? r.glucides * w : null;
    const tL   = r.lipides !== null ? r.lipides * w : null;
    const ppCal = r.calories !== null ? r.calories : '—';
    const ppP   = r.proteines !== null ? r.proteines : '—';
    const ppG   = r.glucides !== null ? r.glucides : '—';
    const ppL   = r.lipides !== null ? r.lipides : '—';
    html += `
      <div class="week-card" data-id="${r.id}">
        <div class="week-card-top">
          <div class="week-card-thumb" data-folder="${r.folder}" data-action="open">
            <span class="week-card-thumb-emoji">${folderIcon(r.folder)}</span>
            <img src="assets/recipes/${r.id}.jpg" alt="" loading="lazy"
                 onload="this.parentElement.classList.add('has-photo')"
                 onerror="this.remove()">
          </div>
          <div class="week-card-title-block" data-action="open">
            <div class="week-card-tag">${r.folder}</div>
            <h3 class="week-card-title">${r.titre}</h3>
          </div>
          <button class="week-remove" data-action="remove">×</button>
        </div>
        <div class="week-macros">
          <div class="week-macro"><div class="v">${px}${fmt(tCal)}</div><div class="l">kcal</div></div>
          <div class="week-macro"><div class="v">${px}${fmt(tP)} g</div><div class="l">protéines</div></div>
          <div class="week-macro"><div class="v">${px}${fmt(tG)} g</div><div class="l">glucides</div></div>
          <div class="week-macro"><div class="v">${px}${fmt(tL)} g</div><div class="l">lipides</div></div>
        </div>
        <div class="week-per-portion">
          <span class="pp-tag">/ portion :</span> ${px}${ppCal} kcal · ${ppP} g protéines · ${ppG} g glucides · ${ppL} g lipides
        </div>
        <div class="week-card-footer">
          <span class="week-card-time">${r.tempsCuisson ? '⏱ ' + r.tempsCuisson : ''}</span>
          <div class="week-card-controls">
            <button data-action="dec">−</button>
            <span class="qty">${w} portion${w > 1 ? 's' : ''}</span>
            <button data-action="inc">+</button>
          </div>
        </div>
      </div>`;
  }
  html += `<button class="week-cta" id="week-list-cta">Voir la liste de courses →</button>`;
  root.innerHTML = html;
  root.querySelectorAll('.week-card').forEach(card => {
    const id = card.dataset.id;
    const r = recipes.find(x => x.id === id);
    card.querySelectorAll('[data-action="open"]').forEach(el => {
      el.addEventListener('click', () => openDetail(id));
    });
    card.querySelector('[data-action="dec"]').addEventListener('click', () => { adjustPortion(r, -1); renderWeekView(); });
    card.querySelector('[data-action="inc"]').addEventListener('click', () => { adjustPortion(r, 1); renderWeekView(); });
    card.querySelector('[data-action="remove"]').addEventListener('click', () => {
      delete state.selected[id]; saveState(); renderWeekView(); updateBadges();
    });
  });
  document.getElementById('week-list-cta').addEventListener('click', () => switchView('list'));
  updateBadges();
}

// ---------- Vue Liste ----------
function isPantryStaple(name) {
  // Items exclus de la liste de courses (toujours en stock, non mesurables,
  // ou doublons d'autres ingrédients de la même recette).
  const n = nameForMatching(name);
  const first = n.split(/\s+/)[0];

  // Toujours en stock
  if (first === 'eau' || first === 'sel' || first === 'poivre') return true;
  if (/^sel\s+et\s+poivre/.test(n)) return true;
  if (/^fleur\s+de\s+sel/.test(n)) return true;

  // Matériel / mesures imprécises (pas un ingrédient achetable)
  if (first === 'spray') return true;                  // « Spray de cuisson »
  if (/\bvaporisateur\b/.test(n)) return true;         // « Huile végétale en vaporisateur »
  if (/\bfilet\s+d/.test(n)) return true;              // « Filet d'huile (d'olive) »

  // Garnitures sans quantité claire
  if (/\b(pour\s+garnir|pour\s+la\s+garniture|en\s+garniture)\b/.test(n)) return true;
  if (/\bfacultatif\b/.test(n)) return true;

  // Zeste (l'agrume entier est listé ailleurs dans la recette)
  if (/^zeste\s+de\b/.test(n)) return true;

  return false;
}

function buildShoppingList() {
  const items = [];
  for (const r of recipes) {
    const sel = state.selected[r.id];
    if (!sel) continue;
    const factor = sel.wantedPortions / r.portions;
    for (const ing of r.ingredients) {
      const parsed = parseIngredient(ing.raw);
      if (isPantryStaple(parsed.name)) continue;
      const scaledQty = parsed.qty !== null ? parsed.qty * factor : null;
      // Convertit vers une unité de base (ml ou g) pour permettre le merge
      // entre unités compatibles (3 L + 750 ml → 3,75 L).
      const conv = getBase(parsed.unit);
      const baseUnit = conv ? conv.base : (normalizeUnit(parsed.unit) || '');
      const baseQty = (scaledQty !== null && conv) ? scaledQty * conv.factor : scaledQty;
      items.push({
        qty: baseQty, baseUnit,
        name: parsed.name, nameKey: nameForMatching(parsed.name),
        category: categorize(parsed.name), fromRecipe: r.titre,
      });
    }
  }
  const byCategory = {};
  for (const item of items) {
    if (!byCategory[item.category]) byCategory[item.category] = new Map();
    const map = byCategory[item.category];
    // Sans qty: regroupe par nom uniquement (pas de doublon « persil pour garnir »).
    const key = item.qty === null
      ? `${item.nameKey}||__noqty__`
      : `${item.nameKey}||${item.baseUnit}`;
    if (map.has(key)) {
      const ex = map.get(key);
      if (ex.qty !== null && item.qty !== null) {
        ex.qty += item.qty;
      }
      if (!ex.fromRecipes.includes(item.fromRecipe)) ex.fromRecipes.push(item.fromRecipe);
    } else {
      map.set(key, { qty: item.qty, baseUnit: item.baseUnit, name: item.name, fromRecipes: [item.fromRecipe] });
    }
  }
  return byCategory;
}

function renderListView() {
  const root = document.getElementById('list-content');
  if (selectedRecipes().length === 0) {
    root.innerHTML = `<div class="list-empty"><span class="emoji">🛒</span><p>Sélectionne des recettes pour générer ta liste.</p></div>`;
    return;
  }
  const byCategory = buildShoppingList();
  const order = ['Viandes & charcuterie','Produits laitiers & œufs','Fruits & légumes','Conserves & bocaux','Pain, pâtes & céréales','Sauces & condiments','Bouillons & vins','Sucré & sirops','Huiles','Épices & herbes séchées','Autres'];
  let html = '';
  for (const cat of order) {
    if (!byCategory[cat]) continue;
    const items = Array.from(byCategory[cat].values()).sort((a, b) => a.name.localeCompare(b.name));
    html += `<div class="list-cat"><h3 class="list-cat-h">${cat}</h3>`;
    for (const it of items) {
      const key = `${nameForMatching(it.name)}||${it.baseUnit || ''}`;
      const checked = state.checked[key];
      const display = displayQty(it.qty, it.baseUnit);
      const qtyStr = display.qty ? `${display.qty} ` : '';
      const unitStr = display.unit ? `${display.unit} ` : '';
      html += `
        <div class="list-item ${checked ? 'checked' : ''}" data-key="${key}">
          <div class="ingr-check ${checked ? 'checked' : ''}">${checked ? '✓' : ''}</div>
          <div class="list-item-text">
            <div><span class="ingr-qty">${qtyStr}${unitStr}</span>${it.name}</div>
            <div class="list-item-from">↳ ${it.fromRecipes.join(' + ')}</div>
          </div>
        </div>`;
    }
    html += '</div>';
  }
  root.innerHTML = html;
  root.querySelectorAll('.list-item').forEach(el => {
    el.addEventListener('click', () => {
      const k = el.dataset.key;
      state.checked[k] = !state.checked[k];
      saveState();
      renderListView();
    });
  });
}

// ---------- Vue Profil ----------
function exportState() {
  const data = {
    app: 'bittle',
    version: 1,
    exportedAt: new Date().toISOString(),
    selected: state.selected,
    checked: state.checked,
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const date = new Date().toISOString().slice(0, 10);
  const a = document.createElement('a');
  a.href = url;
  a.download = `bittle-${date}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importStateFromFile(file) {
  const reader = new FileReader();
  reader.onload = async (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data || typeof data !== 'object') throw new Error('Format invalide');
      const sel = data.selected || {};
      const chk = data.checked || {};
      const nSel = Object.keys(sel).length;
      const nChk = Object.keys(chk).length;
      if (nSel === 0 && nChk === 0) throw new Error('Le fichier ne contient aucune donnée à importer');

      const dateStr = data.exportedAt ? new Date(data.exportedAt).toLocaleDateString('fr-CA') : 'inconnue';
      const msgHtml = `<ul>
        <li>${nSel} recette${nSel > 1 ? 's' : ''} sélectionnée${nSel > 1 ? 's' : ''}</li>
        <li>${nChk} item${nChk > 1 ? 's' : ''} coché${nChk > 1 ? 's' : ''}</li>
      </ul>Cela remplacera ta sélection actuelle.`;
      const ok = await showConfirm({
        title: `Importer la sauvegarde du ${dateStr} ?`,
        message: msgHtml,
        confirmText: 'Importer',
      });
      if (!ok) return;

      // Filtre les recettes inconnues (au cas où certaines auraient été supprimées)
      const knownIds = new Set(recipes.map(r => r.id));
      const cleanSel = {};
      let dropped = 0;
      for (const id in sel) {
        if (knownIds.has(id)) cleanSel[id] = sel[id];
        else dropped++;
      }

      state.selected = cleanSel;
      state.checked = chk;
      saveState();
      switchView('recipes');
      const note = dropped > 0 ? `${dropped} recette${dropped > 1 ? 's' : ''} introuvable${dropped > 1 ? 's' : ''} a été ignorée.` : '';
      await showAlert({ title: 'Importation réussie', message: note, type: 'success' });
    } catch (err) {
      await showAlert({ title: 'Erreur d\'importation', message: err.message, type: 'error' });
    }
  };
  reader.onerror = () => showAlert({ title: 'Erreur', message: 'Impossible de lire le fichier.', type: 'error' });
  reader.readAsText(file);
}

function renderProfileView() {
  const root = document.getElementById('profile-content');
  const sel = selectedRecipes();
  root.innerHTML = `
    <div class="profile-card">
      <p class="hello" style="margin-bottom:0.6rem">Aperçu</p>
      <div class="profile-stat-row">
        <div class="profile-stat">
          <div class="v">${recipes.length}</div>
          <div class="l">recettes au total</div>
        </div>
        <div class="profile-stat">
          <div class="v">${sel.length}</div>
          <div class="l">dans la sélection</div>
        </div>
      </div>
    </div>

    <p class="hello" style="margin:1rem 0 0.5rem">Apparence</p>
    <div class="theme-grid">
      ${THEMES.map(t => `
        <button class="theme-swatch ${ui.theme === t.id ? 'active' : ''}" data-theme="${t.id}">
          <span class="swatch-color swatch-${t.id}"></span>
          <span class="swatch-label">${t.label}</span>
        </button>
      `).join('')}
    </div>

    <p class="hello" style="margin:1rem 0 0.5rem">Sauvegarde</p>
    <input type="file" accept="application/json,.json" id="prof-import-file" hidden>
    <button class="profile-action" id="prof-export">📤 Exporter ma sélection (.json)</button>
    <button class="profile-action" id="prof-import">📥 Importer une sauvegarde</button>

    <p class="hello" style="margin:1rem 0 0.5rem">Zone de danger</p>
    <button class="profile-action danger" id="prof-reset">🗑 Tout réinitialiser</button>

    <p style="text-align:center;font-size:0.78rem;color:var(--muted);margin-top:1.5rem">Bittle · v0.5 · ${recipes.length} recettes</p>
    <p style="text-align:center;font-size:0.7rem;color:var(--muted);margin-top:0.25rem">Données stockées localement sur cet appareil. <br>Exporte régulièrement pour ne rien perdre.</p>
  `;
  document.querySelectorAll('.theme-swatch').forEach(btn => {
    btn.addEventListener('click', () => {
      applyTheme(btn.dataset.theme);
      renderProfileView();
    });
  });
  document.getElementById('prof-export').addEventListener('click', exportState);
  document.getElementById('prof-import').addEventListener('click', () => {
    document.getElementById('prof-import-file').click();
  });
  document.getElementById('prof-import-file').addEventListener('change', (e) => {
    if (e.target.files && e.target.files.length) importStateFromFile(e.target.files[0]);
    e.target.value = ''; // reset pour pouvoir réimporter le même fichier
  });
  document.getElementById('prof-reset').addEventListener('click', async () => {
    const ok = await showConfirm({
      title: 'Tout réinitialiser ?',
      message: 'Cela effacera ta sélection complète, tes cases cochées et tes ingrédients marqués. Action irréversible.',
      confirmText: 'Réinitialiser',
      danger: true,
    });
    if (!ok) return;
    state.selected = {}; state.checked = {}; ui.ingredientChecks = {};
    saveState();
    switchView('recipes');
  });
}

// ---------- Helpers ----------
function updateBadges() {
  const n = selectedRecipes().length;
  const badge = document.getElementById('badge-week');
  if (n > 0) { badge.textContent = n; badge.classList.remove('hidden'); }
  else badge.classList.add('hidden');
}

// ---------- Search ----------
document.getElementById('search-toggle').addEventListener('click', () => {
  const inp = document.getElementById('search-input');
  inp.classList.toggle('hidden');
  if (!inp.classList.contains('hidden')) inp.focus();
  else { inp.value = ''; ui.searchQuery = ''; renderRecipeFeed(); }
});
document.getElementById('search-input').addEventListener('input', e => {
  ui.searchQuery = e.target.value.trim();
  renderRecipeFeed();
});

// ---------- Select / deselect tout ----------
document.getElementById('select-all-btn').addEventListener('click', () => {
  const visible = recipes.filter(recipeMatchesFilters);
  const toAdd = visible.filter(r => !state.selected[r.id]);
  if (toAdd.length === 0) return;
  for (const r of toAdd) state.selected[r.id] = { wantedPortions: r.portions };
  saveState();
  renderRecipesView();
});

document.getElementById('deselect-all-btn').addEventListener('click', async () => {
  if (Object.keys(state.selected).length === 0) return;
  const ok = await showConfirm({
    title: 'Désélectionner toutes les recettes ?',
    message: 'Toutes les recettes seront retirées de ta sélection et tes cases cochées seront effacées.',
    confirmText: 'Désélectionner',
    danger: true,
  });
  if (!ok) return;
  state.selected = {};
  state.checked = {};
  ui.ingredientChecks = {};
  saveState();
  renderRecipesView();
});

// ---------- Init ----------
applyTheme(ui.theme);
setGreeting();
switchView('recipes');
</script>
