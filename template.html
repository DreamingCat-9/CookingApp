<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Recettes & liste de courses de Bittle</title>
<style>
  :root {
    --bg: #fdf6ec;
    --panel: #ffffff;
    --panel-soft: #fef3e6;
    --border: #ecdcc8;
    --border-soft: #f5e8d6;
    --text: #2a2118;
    --muted: #8a7866;
    --accent: #2d6a4f;
    --accent-light: #d8f3dc;
    --accent-soft: #e8f5ed;
    --orange: #ea6c2d;
    --orange-light: #fde0d0;
    --warn: #b95c00;
    --shadow: 0 2px 8px rgba(180, 140, 100, 0.08);
    --shadow-lg: 0 6px 20px rgba(180, 140, 100, 0.12);
    --radius: 14px;
    --radius-sm: 10px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }

  /* ============ Layout ============ */
  .app {
    display: grid;
    grid-template-columns: 240px 1fr 280px;
    gap: 1.25rem;
    max-width: 1500px;
    margin: 0 auto;
    padding: 1.25rem;
    align-items: start;
  }
  .col-left, .col-right {
    position: sticky;
    top: 1.25rem;
    max-height: calc(100vh - 2.5rem);
    overflow-y: auto;
  }
  .col-main { min-width: 0; }

  @media (max-width: 1024px) {
    .app {
      grid-template-columns: 1fr;
    }
    .col-left, .col-right {
      position: static;
      max-height: none;
    }
  }

  /* ============ Panels ============ */
  .panel {
    background: var(--panel);
    border-radius: var(--radius);
    padding: 1.25rem;
    box-shadow: var(--shadow);
  }
  .panel-title {
    margin: 0 0 1rem 0;
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--text);
  }
  .panel-subtitle {
    font-size: 0.75rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 0.5rem;
  }

  /* ============ Sidebar gauche : catégories ============ */
  .brand {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    margin-bottom: 1.25rem;
    padding: 0.5rem;
  }
  .brand-logo {
    width: 36px;
    height: 36px;
    background: var(--orange);
    color: white;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
  }
  .brand-name {
    font-weight: 700;
    font-size: 1.05rem;
  }
  .brand-sub {
    font-size: 0.7rem;
    color: var(--muted);
  }

  .cat-list {
    display: flex;
    flex-direction: column;
    gap: 0.35rem;
  }
  .cat-item {
    display: flex;
    align-items: center;
    gap: 0.65rem;
    padding: 0.65rem 0.85rem;
    border-radius: var(--radius-sm);
    background: transparent;
    border: 1px solid transparent;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--text);
    font-size: 0.9rem;
    text-align: left;
    width: 100%;
  }
  .cat-item:hover {
    background: var(--panel-soft);
  }
  .cat-item.active {
    background: var(--orange-light);
    border-color: var(--orange);
    color: var(--orange);
    font-weight: 600;
  }
  .cat-icon {
    font-size: 1.1rem;
    width: 24px;
    text-align: center;
  }
  .cat-count {
    margin-left: auto;
    font-size: 0.75rem;
    color: var(--muted);
    background: var(--panel-soft);
    padding: 0.1rem 0.45rem;
    border-radius: 999px;
  }
  .cat-item.active .cat-count {
    background: rgba(255,255,255,0.6);
    color: var(--orange);
  }

  .reset-btn {
    margin-top: 1rem;
    width: 100%;
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 0.55rem;
    border-radius: var(--radius-sm);
    font-size: 0.85rem;
    cursor: pointer;
  }
  .reset-btn:hover { background: var(--panel-soft); color: var(--text); }

  /* ============ Bannière sélection ============ */
  .hero {
    background: linear-gradient(135deg, var(--orange-light), #fef3e6);
    border-radius: var(--radius);
    padding: 1.5rem;
    margin-bottom: 1.25rem;
    box-shadow: var(--shadow);
  }
  .hero-empty {
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  .hero-empty-icon {
    font-size: 3rem;
    flex-shrink: 0;
  }
  .hero-empty h2 {
    margin: 0 0 0.3rem 0;
    font-size: 1.2rem;
  }
  .hero-empty p {
    margin: 0;
    color: var(--muted);
    font-size: 0.9rem;
  }
  .hero-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .hero-header h2 {
    margin: 0;
    font-size: 1.1rem;
  }
  .hero-header .count-badge {
    background: var(--orange);
    color: white;
    padding: 0.15rem 0.6rem;
    border-radius: 999px;
    font-size: 0.78rem;
    margin-left: 0.5rem;
  }
  .btn-primary {
    background: var(--accent);
    color: white;
    border: 0;
    padding: 0.6rem 1.1rem;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 0.88rem;
    font-weight: 600;
    box-shadow: 0 2px 6px rgba(45, 106, 79, 0.25);
  }
  .btn-primary:hover { filter: brightness(1.08); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

  .selected-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 0.6rem;
  }
  .mini-card {
    background: white;
    border-radius: var(--radius-sm);
    padding: 0.65rem 0.75rem;
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
    box-shadow: var(--shadow);
    border: 1px solid var(--border-soft);
  }
  .mini-card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 0.4rem;
  }
  .mini-card-title {
    font-size: 0.85rem;
    font-weight: 600;
    line-height: 1.3;
    flex: 1;
    min-width: 0;
  }
  .mini-card-remove {
    background: transparent;
    border: 0;
    color: var(--muted);
    cursor: pointer;
    font-size: 1.1rem;
    padding: 0;
    line-height: 1;
    flex-shrink: 0;
  }
  .mini-card-remove:hover { color: var(--orange); }
  .mini-card-controls {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.78rem;
    color: var(--muted);
  }
  .mini-card-controls input {
    width: 3rem;
    padding: 0.2rem 0.35rem;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 0.8rem;
  }

  /* ============ Recherche ============ */
  .search-bar {
    background: var(--panel);
    border-radius: 999px;
    padding: 0.6rem 1.1rem;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    gap: 0.6rem;
    margin-bottom: 1.25rem;
  }
  .search-bar svg { color: var(--muted); flex-shrink: 0; }
  .search-bar input {
    flex: 1;
    border: 0;
    outline: 0;
    font-size: 0.95rem;
    background: transparent;
    color: var(--text);
  }
  .search-bar input::placeholder { color: var(--muted); }

  /* ============ Recettes ============ */
  .folder { margin-bottom: 1.5rem; }
  .folder h2 {
    margin: 0 0 0.75rem 0;
    font-size: 0.85rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .recipe-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 0.75rem;
  }
  .recipe {
    background: var(--panel);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius);
    padding: 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
    box-shadow: var(--shadow);
    transition: all 0.15s;
    position: relative;
  }
  .recipe:hover {
    box-shadow: var(--shadow-lg);
    transform: translateY(-2px);
  }
  .recipe.selected {
    border-color: var(--orange);
    background: linear-gradient(180deg, var(--panel) 0%, var(--orange-light) 100%);
  }
  .recipe-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 0.5rem;
  }
  .recipe-title {
    font-weight: 600;
    font-size: 0.95rem;
    line-height: 1.3;
    cursor: pointer;
    flex: 1;
  }
  .recipe-checkbox {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: white;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    color: white;
    font-size: 0.85rem;
    font-weight: bold;
    line-height: 1;
  }
  .recipe-checkbox.checked {
    background: var(--orange);
    border-color: var(--orange);
  }
  .recipe-meta {
    font-size: 0.78rem;
    color: var(--muted);
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem 0.8rem;
  }
  .recipe-actions {
    display: flex;
    gap: 0.4rem;
    margin-top: auto;
  }
  .btn-view {
    background: var(--panel-soft);
    color: var(--orange);
    border: 0;
    padding: 0.4rem 0.75rem;
    border-radius: 8px;
    font-size: 0.78rem;
    font-weight: 500;
    cursor: pointer;
    flex: 1;
  }
  .btn-view:hover { background: var(--orange-light); }

  /* ============ Sidebar droite : nutrition ============ */
  .nutri-total {
    text-align: center;
    padding: 1rem 0;
    border-bottom: 1px solid var(--border-soft);
    margin-bottom: 1rem;
  }
  .nutri-total-value {
    font-size: 2rem;
    font-weight: 700;
    color: var(--orange);
    line-height: 1;
  }
  .nutri-total-label {
    font-size: 0.75rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 0.3rem;
  }
  .nutri-row {
    display: flex;
    justify-content: space-between;
    padding: 0.55rem 0;
    border-bottom: 1px solid var(--border-soft);
    font-size: 0.88rem;
  }
  .nutri-row:last-child { border-bottom: 0; }
  .nutri-label { color: var(--muted); }
  .nutri-value { font-weight: 600; }

  .nutri-per-portion {
    margin-top: 1rem;
    padding-top: 1rem;
    border-top: 2px dashed var(--border-soft);
  }
  .nutri-placeholder {
    color: var(--muted);
    font-style: italic;
    font-size: 0.8rem;
    text-align: center;
    padding: 0.5rem 0;
  }

  /* ============ Liste de courses ============ */
  #shopping {
    margin-top: 1.5rem;
    background: var(--panel);
    border-radius: var(--radius);
    padding: 1.5rem;
    box-shadow: var(--shadow);
  }
  #shopping h2 { margin-top: 0; }
  .category { margin-bottom: 1.25rem; }
  .category h3 {
    margin: 0 0 0.5rem 0;
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--accent);
    border-bottom: 2px solid var(--accent-soft);
    padding-bottom: 0.25rem;
  }
  .item {
    display: flex;
    align-items: flex-start;
    gap: 0.5rem;
    padding: 0.4rem 0;
    border-bottom: 1px solid var(--border-soft);
  }
  .item:last-child { border-bottom: none; }
  .item input[type="checkbox"] { margin-top: 0.25rem; }
  .item-text { flex: 1; }
  .item.checked .item-text {
    text-decoration: line-through;
    color: var(--muted);
  }
  .item-from {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 0.1rem;
  }

  /* ============ Modal ============ */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(40, 25, 10, 0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    z-index: 100;
  }
  .modal {
    background: var(--panel);
    border-radius: var(--radius);
    max-width: 600px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    padding: 1.5rem;
    box-shadow: var(--shadow-lg);
  }
  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 1rem;
    margin-bottom: 1rem;
    padding-bottom: 0.75rem;
    border-bottom: 1px solid var(--border-soft);
  }
  .modal-header h2 { margin: 0; font-size: 1.15rem; }
  .modal-meta { color: var(--muted); font-size: 0.85rem; margin-top: 0.25rem; }
  .modal-close {
    background: transparent;
    color: var(--muted);
    border: 0;
    font-size: 1.5rem;
    cursor: pointer;
    padding: 0;
    line-height: 1;
  }
  .modal h3 {
    margin: 1rem 0 0.5rem 0;
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--orange);
  }
  .modal h3:first-of-type { margin-top: 0; }
  .modal ul { margin: 0; padding-left: 1.25rem; }
  .modal li { margin-bottom: 0.25rem; }

  .empty-state {
    text-align: center;
    color: var(--muted);
    padding: 2rem;
    font-style: italic;
  }
  .hidden { display: none; }
</style>
</head>
<body>

<div class="app">

  <!-- ============ COLONNE GAUCHE : catégories ============ -->
  <aside class="col-left">
    <div class="panel">
      <div class="brand">
        <div class="brand-logo">🍳</div>
        <div>
          <div class="brand-name">Bittle</div>
          <div class="brand-sub">Recettes & courses</div>
        </div>
      </div>
      <div class="panel-subtitle">Catégories</div>
      <div id="cat-list" class="cat-list"></div>
      <button id="reset-filters" class="reset-btn" type="button">Réinitialiser</button>
    </div>
  </aside>

  <!-- ============ COLONNE PRINCIPALE ============ -->
  <main class="col-main">
    <!-- Bannière sélection -->
    <section id="hero" class="hero"></section>

    <!-- Recherche -->
    <div class="search-bar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="7"/><path d="m20 20-3-3"/>
      </svg>
      <input type="search" id="search" placeholder="Rechercher une recette…">
    </div>

    <!-- Liste de recettes -->
    <section id="recipes-section"></section>

    <!-- Liste de courses (générée à la demande) -->
    <section id="shopping" class="hidden">
      <h2>Liste de courses</h2>
      <div id="shopping-list"></div>
    </section>
  </main>

  <!-- ============ COLONNE DROITE : nutrition ============ -->
  <aside class="col-right">
    <div class="panel">
      <h3 class="panel-title">Nutrition</h3>
      <div id="nutri-content"></div>
    </div>
  </aside>

</div>

<div id="modal-root"></div>

<script>
const RECIPES_RAW = /*__RECIPES_DATA__*/;

const FOLDER_META = {
  'Volaille': { icon: '🍗', order: 0 },
  'Boeuf':    { icon: '🥩', order: 1 },
  'Porc':     { icon: '🐖', order: 2 },
  'Végé':     { icon: '🥦', order: 3 },
  'Divers':   { icon: '✨', order: 4 },
  'Autres':   { icon: '📦', order: 99 },
};
const folderIcon = f => (FOLDER_META[f] || {}).icon || '📦';
const folderOrder = f => (FOLDER_META[f] || {}).order ?? 50;

// ---------- Markdown parsing ----------

function parseRecipe(raw) {
  const fmMatch = raw.match(/^---\n([\s\S]*?)\n---\n([\s\S]*)$/);
  if (!fmMatch) return null;

  const fm = {};
  fmMatch[1].split('\n').forEach(line => {
    const m = line.match(/^([\w_]+):\s*(.*)$/);
    if (m) fm[m[1]] = m[2].trim();
  });

  const body = fmMatch[2];
  const ingrMatch = body.match(/##\s*Ingr[ée]dients\s*\n([\s\S]*?)(?=\n##\s|$)/);
  const ingredients = [];
  let currentSubsection = null;

  if (ingrMatch) {
    ingrMatch[1].split('\n').forEach(line => {
      const subMatch = line.match(/^###\s+(.+?)\s*$/);
      if (subMatch) {
        currentSubsection = subMatch[1].trim();
        return;
      }
      const itemMatch = line.match(/^-\s+(.+)$/);
      if (itemMatch) {
        ingredients.push({ raw: itemMatch[1].trim(), subsection: currentSubsection });
      }
    });
  }

  const tagsMatch = (fm.tags || '').match(/\[(.*)\]/);
  const tags = tagsMatch
    ? tagsMatch[1].split(',').map(t => t.trim()).filter(Boolean)
    : [];

  return {
    titre: fm.titre || '(sans titre)',
    portions: parseInt(fm.portions) || 1,
    tempsPrep: fm.temps_prep || '',
    tempsCuisson: fm.temps_cuisson || '',
    tags,
    ingredients,
    calories: parseInt(fm.calories) || null,
    proteines: parseInt(fm.proteines) || null,
    glucides: parseInt(fm.glucides) || null,
    lipides: parseInt(fm.lipides) || null,
  };
}

// ---------- Ingredient parsing ----------

const UNIT_PATTERN = '(?:g|kg|ml|l|L|lb|oz|tasses?|c\\.\\s*à\\s*th[ée]|c\\.\\s*à\\s*soupe|gousses?|bo[îi]tes?|pots?|feuilles?|brins?|pieds?|t[êe]tes?|bottes?|paquets?|filets?|tranches?|morceaux?|quartiers?|conserves?|sachets?|contenants?|branches?|pinc[ée]es?|cubes?)';

function parseQty(s) {
  s = s.replace(/\s+/g, ' ').trim().replace(',', '.');
  const mixed = s.match(/^(\d+)\s+(\d+)\/(\d+)$/);
  if (mixed) return parseInt(mixed[1]) + parseInt(mixed[2]) / parseInt(mixed[3]);
  const frac = s.match(/^(\d+)\/(\d+)$/);
  if (frac) return parseInt(frac[1]) / parseInt(frac[2]);
  const n = parseFloat(s);
  return isNaN(n) ? null : n;
}

function parseIngredient(raw) {
  const qtyRe = /^((?:\d+\s+\d+\/\d+)|(?:\d+[.,]\d+)|(?:\d+\/\d+)|(?:\d+))\s+/;
  const qtyMatch = raw.match(qtyRe);

  let qty = null;
  let rest = raw;
  if (qtyMatch) {
    qty = parseQty(qtyMatch[1]);
    rest = raw.slice(qtyMatch[0].length);
  }

  const unitRe = new RegExp('^(' + UNIT_PATTERN + ')\\s+', 'i');
  const unitMatch = rest.match(unitRe);
  let unit = null;
  if (unitMatch) {
    unit = unitMatch[1].toLowerCase().replace(/\s+/g, ' ').trim();
    rest = rest.slice(unitMatch[0].length);
  }

  rest = rest.replace(/^\([^)]*\)\s*/, '');
  rest = rest.replace(/^d['e]\s+/i, '');

  return { qty, unit, name: rest.trim() };
}

function formatQty(n) {
  if (n === null || n === undefined) return '';
  if (Math.abs(n - Math.round(n)) < 0.01) return String(Math.round(n));
  return n.toFixed(2).replace(/\.?0+$/, '').replace('.', ',');
}

// ---------- Categorization ----------

function normalizeName(name) {
  return name
    .toLowerCase()
    .replace(/œ/g, 'oe').replace(/æ/g, 'ae')
    .normalize('NFKD').replace(/[̀-ͯ]/g, '')
    .replace(/[,;:]/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

function nameForMatching(name) {
  return normalizeName(name)
    .replace(/\b(haches?|hachees?|finement|grossierement|tranches?|tranchees?|coupes?|coupees?|emincees?|en\s+(cubes?|des|lanieres|quartiers|biseau|julienne|petales?|rondelles|morceaux|tronc?ons|fines\s+tranches|fleurettes|bouquets?|aiguillettes))\b/g, '')
    .replace(/\b(divises?|divisees?|au\s+gout|au\s+choix|nature|moulus?|moulues?|broyes?|broyees?|rapes?|rapees?|effiloches?|effilochees?|battu|battue|legerement|emiette[es]?)\b/g, '')
    .replace(/\s+/g, ' ')
    .trim();
}

function normalizeUnit(u) {
  if (!u) return null;
  return u.replace(/s$/, '').replace(/\s+/g, ' ');
}

const CATEGORIES = [
  ['Viandes & charcuterie', [
    'poulet', 'dinde', 'boeuf', 'porc', 'lardon', 'saucisse', 'cotelette',
    'roti', 'palette', 'bifteck', 'tournedos', 'poitrine', 'haut de cuisse',
    'filet de porc', 'filet mignon', 'viande', 'jambon', 'chair'
  ]],
  ['Produits laitiers & œufs', [
    'lait de coco', 'lait', 'creme de soya', 'creme', 'beurre d\'arachides',
    'beurre de sesame', 'beurre', 'yogourt', 'fromage', 'parmesan',
    'mozzarella', 'ricotta', 'feta', 'cheddar', 'monterey', 'bocconcini',
    'oeuf'
  ]],
  ['Sauces & condiments', [
    'sauce soya', 'tamari', 'hoisin', 'sriracha', 'huitres', 'mayonnaise',
    'moutarde', 'ketchup', 'tahini', 'miso', 'salsa', 'barbecue',
    'sauce piquante', 'vinaigre', 'ail en pot', 'gingembre en pot',
    'pate de cari', 'concentre de bouillon', 'sauce a pizza', 'sauce tomate',

  ]],
  ['Conserves & bocaux', [

    'haricots', 'tomates sechees', 'pate de tomates', 'poivrons rotis',
    'capres', 'boite de', 'conserve', 'pot de'
  ]],
  ['Pain, pâtes & céréales', [
    'chapelure', 'pita', 'naan', 'orzo', 'nouille', 'vermicelle', 'riz',
    'quinoa', 'udon', 'panko', 'farine', 'chow mein', 'cereale'
  ]],
  ['Fruits & légumes', [
    'oignon', 'ail', 'carotte', 'pomme de terre', 'grelot', 'brocoli',
    'courgette', 'poivron', 'celeri', 'epinard', 'laitue', 'romaine',
    'iceberg', 'concombre', 'tomate cerise', 'tomate', 'radis',
    'champignon', 'asperge', 'chou', 'rutabaga', 'fenouil', 'radicchio',
    'pois', 'mange-tout', 'echalote', 'bok choy',
    'feve germee', 'roquette', 'citron', 'lime', 'orange', 'pomme rouge',
    'pomme', 'courge', 'ciboulette', 'aneth', 'basilic', 'persil',
    'coriandre', 'menthe', 'thym frais', 'origan frais', 'romarin frais',
    'estragon', 'gingembre frais'
  ]],
  ['Bouillons & vins', [
    'bouillon', 'vin rouge', 'vin blanc', 'biere'
  ]],
  ['Sucré & sirops', [
    'sirop d\'erable', 'cassonade', 'sucre', 'miel'
  ]],

    'poudre d\'oignon', 'poudre d\'ail', 'poudre', 'gingembre', 'sel', 'poivre',
    'bicarbonate'
  ]],
];

function categorize(name) {
  const n = nameForMatching(name);
  for (const [cat, kws] of CATEGORIES) {
    for (const kw of kws) {
      if (n.includes(kw)) return cat;
    }
  }
  return 'Autres';
}

// ---------- State ----------

const recipes = RECIPES_RAW.map(r => ({
  ...r,
  ...parseRecipe(r.raw),
}));

const STATE_KEY = 'gestion_alimentaire_state_v1';
const state = loadState();
const filters = {
  search: '',
  folders: new Set(),
};

function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem(STATE_KEY) || '{}');
    return {
      selected: s.selected || {},
      checked: s.checked || {},
    };
  } catch {
    return { selected: {}, checked: {} };
  }
}

function saveState() {
  localStorage.setItem(STATE_KEY, JSON.stringify(state));
}

function recipeMatchesFilters(r) {
  if (filters.search) {
    const q = filters.search.toLowerCase();
    if (!r.titre.toLowerCase().includes(q)) return false;
  }
  if (filters.folders.size > 0 && !filters.folders.has(r.folder)) return false;
  return true;
}

function selectedRecipes() {
  return recipes.filter(r => state.selected[r.id]);
}

// ---------- Sidebar gauche : catégories ----------

function renderCategories() {
  const counts = {};
  for (const r of recipes) counts[r.folder] = (counts[r.folder] || 0) + 1;

  const folders = Object.keys(counts).sort((a, b) => folderOrder(a) - folderOrder(b));

  const root = document.getElementById('cat-list');
  root.innerHTML = '';

  // « Tout »
  const allBtn = document.createElement('button');
  allBtn.type = 'button';
  allBtn.className = 'cat-item' + (filters.folders.size === 0 ? ' active' : '');
  allBtn.innerHTML = `
    <span class="cat-icon">🍽️</span>
    <span>Tout</span>
    <span class="cat-count">${recipes.length}</span>
  `;
  allBtn.addEventListener('click', () => {
    filters.folders.clear();
    renderCategories();
    render();
  });
  root.appendChild(allBtn);

  for (const f of folders) {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'cat-item' + (filters.folders.has(f) ? ' active' : '');
    btn.innerHTML = `
      <span class="cat-icon">${folderIcon(f)}</span>
      <span>${f}</span>
      <span class="cat-count">${counts[f]}</span>
    `;
    btn.addEventListener('click', () => {
      if (filters.folders.has(f)) filters.folders.delete(f);
      else filters.folders.add(f);
      renderCategories();
      render();
    });
    root.appendChild(btn);
  }
}

// ---------- Bannière sélection ----------

function renderHero() {
  const hero = document.getElementById('hero');
  const sel = selectedRecipes();

  if (sel.length === 0) {
    hero.innerHTML = `
      <div class="hero-empty">
        <div class="hero-empty-icon">👨‍🍳</div>
        <div>
          <h2>Bonjour Bittle&nbsp;!</h2>
          <p>Sélectionne des recettes pour générer ta liste de courses.</p>
        </div>
      </div>
    `;
    return;
  }

  hero.innerHTML = `
    <div class="hero-header">
      <h2>Recettes sélectionnées <span class="count-badge">${sel.length}</span></h2>
      <div style="display:flex; gap:0.5rem">
        <button class="btn-primary" id="generate-btn">Générer la liste de courses</button>
        <button class="reset-btn" id="clear-selection" style="margin:0; width:auto">Tout retirer</button>
      </div>
    </div>
    <div class="selected-grid" id="selected-grid"></div>
  `;

  const grid = document.getElementById('selected-grid');
  for (const r of sel) {
    grid.appendChild(renderMiniCard(r));
  }

  document.getElementById('generate-btn').addEventListener('click', generate);
  document.getElementById('clear-selection').addEventListener('click', () => {
    if (!confirm('Retirer toutes les recettes sélectionnées ?')) return;
    state.selected = {};
    state.checked = {};
    saveState();
    document.getElementById('shopping').classList.add('hidden');
    rerenderAll();
  });
}

function renderMiniCard(r) {
  const card = document.createElement('div');
  card.className = 'mini-card';
  const sel = state.selected[r.id];
  const wanted = sel ? sel.wantedPortions : r.portions;

  card.innerHTML = `
    <div class="mini-card-header">
      <div class="mini-card-title">${folderIcon(r.folder)} ${r.titre}</div>
      <button class="mini-card-remove" title="Retirer">×</button>
    </div>
    <div class="mini-card-controls">
      <input type="number" min="1" value="${wanted}">
      <span>portions</span>
    </div>
  `;

  card.querySelector('.mini-card-remove').addEventListener('click', () => {
    delete state.selected[r.id];
    saveState();
    rerenderAll();
  });

  const input = card.querySelector('input');
  input.addEventListener('change', () => {
    const v = Math.max(1, parseInt(input.value) || r.portions);
    if (state.selected[r.id]) {
      state.selected[r.id].wantedPortions = v;
      saveState();
      renderNutrition();
    }
  });

  return card;
}

// ---------- Sidebar droite : nutrition ----------

function renderNutrition() {
  const root = document.getElementById('nutri-content');
  const sel = selectedRecipes();

  if (sel.length === 0) {
    root.innerHTML = `<p class="nutri-placeholder">Sélectionne des recettes pour voir les valeurs nutritionnelles.</p>`;
    return;
  }

  // Placeholders : à terme, calculer depuis state.selected[id].wantedPortions et r.calories/macros
  let totalCalories = 0;
  let totalPortions = 0;
  let hasData = false;
  for (const r of sel) {
    const wanted = state.selected[r.id].wantedPortions;
    totalPortions += wanted;
    if (r.calories !== null) {
      totalCalories += r.calories * (wanted / r.portions);
      hasData = true;
    }
  }

  const fmt = v => v ? Math.round(v) : '—';
  const placeholder = hasData ? '' : ' <span style="font-size:0.7rem; color:var(--muted)">(à compléter)</span>';

  root.innerHTML = `
    <div class="nutri-total">
      <div class="nutri-total-value">${fmt(totalCalories)}</div>
      <div class="nutri-total-label">calories totales${placeholder}</div>
    </div>
    <div class="nutri-row">
      <span class="nutri-label">Protéines</span>
      <span class="nutri-value">— g</span>
    </div>
    <div class="nutri-row">
      <span class="nutri-label">Glucides</span>
      <span class="nutri-value">— g</span>
    </div>
    <div class="nutri-row">
      <span class="nutri-label">Lipides</span>
      <span class="nutri-value">— g</span>
    </div>

    <div class="nutri-per-portion">
      <div class="panel-subtitle">Par portion</div>
      <div class="nutri-row">
        <span class="nutri-label">Calories</span>
        <span class="nutri-value">${totalPortions ? fmt(totalCalories / totalPortions) : '—'}</span>
      </div>
    </div>
  `;
}

// ---------- Liste de recettes ----------

function render() {
  const root = document.getElementById('recipes-section');
  root.innerHTML = '';

  const visible = recipes.filter(recipeMatchesFilters);

  if (visible.length === 0) {
    const msg = document.createElement('div');
    msg.className = 'empty-state';
    msg.textContent = 'Aucune recette ne correspond aux filtres.';
    root.appendChild(msg);
    return;
  }

  const byFolder = {};
  for (const r of visible) {
    if (!byFolder[r.folder]) byFolder[r.folder] = [];
    byFolder[r.folder].push(r);
  }

  const folders = Object.keys(byFolder).sort((a, b) => folderOrder(a) - folderOrder(b));

  for (const folder of folders) {
    const section = document.createElement('div');
    section.className = 'folder';
    section.innerHTML = `<h2>${folderIcon(folder)} ${folder}</h2>`;
    const list = document.createElement('div');
    list.className = 'recipe-list';
    for (const r of byFolder[folder].sort((a, b) => a.titre.localeCompare(b.titre))) {
      list.appendChild(renderRecipe(r));
    }
    section.appendChild(list);
    root.appendChild(section);
  }
}

function renderRecipe(r) {
  const card = document.createElement('div');
  card.className = 'recipe';
  const sel = state.selected[r.id];
  if (sel) card.classList.add('selected');

  const top = document.createElement('div');
  top.className = 'recipe-top';

  const title = document.createElement('div');
  title.className = 'recipe-title';
  title.textContent = r.titre;

  const cb = document.createElement('div');
  cb.className = 'recipe-checkbox' + (sel ? ' checked' : '');
  cb.innerHTML = sel ? '✓' : '';

  const toggleSelect = () => {
    if (state.selected[r.id]) {
      delete state.selected[r.id];
    } else {
      state.selected[r.id] = { wantedPortions: r.portions };
    }
    saveState();
    rerenderAll();
  };

  cb.addEventListener('click', toggleSelect);
  title.addEventListener('click', toggleSelect);

  top.appendChild(title);
  top.appendChild(cb);

  const meta = document.createElement('div');
  meta.className = 'recipe-meta';
  const metaParts = [`${r.portions} portions`];
  if (r.tempsPrep) metaParts.push(`prép. ${r.tempsPrep}`);
  if (r.tempsCuisson) metaParts.push(`cuisson ${r.tempsCuisson}`);
  if (r.calories) metaParts.push(`${r.calories} cal`);
  meta.innerHTML = metaParts.map(p => `<span>${p}</span>`).join('');

  const actions = document.createElement('div');
  actions.className = 'recipe-actions';
  const viewBtn = document.createElement('button');
  viewBtn.type = 'button';
  viewBtn.className = 'btn-view';
  viewBtn.textContent = 'Voir les ingrédients';
  viewBtn.addEventListener('click', e => {
    e.stopPropagation();
    showIngredientsModal(r);
  });
  actions.appendChild(viewBtn);

  card.appendChild(top);
  card.appendChild(meta);
  card.appendChild(actions);
  return card;
}

// ---------- Modal ingrédients ----------

function showIngredientsModal(r) {
  const root = document.getElementById('modal-root');
  root.innerHTML = '';

  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop';
  backdrop.addEventListener('click', e => {
    if (e.target === backdrop) closeModal();
  });

  const modal = document.createElement('div');
  modal.className = 'modal';

  const header = document.createElement('div');
  header.className = 'modal-header';
  const titleWrap = document.createElement('div');
  const metaParts = [];
  if (r.portions) metaParts.push(`${r.portions} portions`);
  if (r.tempsPrep) metaParts.push(`prép. ${r.tempsPrep}`);
  if (r.tempsCuisson) metaParts.push(`cuisson ${r.tempsCuisson}`);
  if (r.calories) metaParts.push(`${r.calories} cal`);
  titleWrap.innerHTML = `<h2>${folderIcon(r.folder)} ${r.titre}</h2>` +
    (metaParts.length ? `<div class="modal-meta">${metaParts.join(' · ')}</div>` : '');
  const closeBtn = document.createElement('button');
  closeBtn.className = 'modal-close';
  closeBtn.type = 'button';
  closeBtn.innerHTML = '×';
  closeBtn.setAttribute('aria-label', 'Fermer');
  closeBtn.addEventListener('click', closeModal);
  header.appendChild(titleWrap);
  header.appendChild(closeBtn);
  modal.appendChild(header);

  const bySub = {};
  const order = [];
  for (const ing of r.ingredients) {
    const key = ing.subsection || '';
    if (!(key in bySub)) {
      bySub[key] = [];
      order.push(key);
    }
    bySub[key].push(ing.raw);
  }

  if (r.ingredients.length === 0) {
    const p = document.createElement('p');
    p.className = 'empty-state';
    p.textContent = 'Aucun ingrédient listé.';
    modal.appendChild(p);
  } else {
    for (const sub of order) {
      if (sub) {
        const h3 = document.createElement('h3');
        h3.textContent = sub;
        modal.appendChild(h3);
      }
      const ul = document.createElement('ul');
      for (const item of bySub[sub]) {
        const li = document.createElement('li');
        li.textContent = item;
        ul.appendChild(li);
      }
      modal.appendChild(ul);
    }
  }

  backdrop.appendChild(modal);
  root.appendChild(backdrop);
  document.addEventListener('keydown', escClose);
}

function escClose(e) {
  if (e.key === 'Escape') closeModal();
}

function closeModal() {
  document.getElementById('modal-root').innerHTML = '';
  document.removeEventListener('keydown', escClose);
}

// ---------- Liste de courses ----------

function generate() {
  const items = [];
  for (const r of recipes) {
    const sel = state.selected[r.id];
    if (!sel) continue;
    const factor = sel.wantedPortions / r.portions;
    for (const ing of r.ingredients) {
      const parsed = parseIngredient(ing.raw);
      const scaledQty = parsed.qty !== null ? parsed.qty * factor : null;
      items.push({
        qty: scaledQty,
        unit: parsed.unit,
        unitKey: normalizeUnit(parsed.unit) || '',
        name: parsed.name,
        nameKey: nameForMatching(parsed.name),
        category: categorize(parsed.name),
        fromRecipe: r.titre,
      });
    }
  }

  const byCategory = {};
  for (const item of items) {
    if (!byCategory[item.category]) byCategory[item.category] = new Map();
    const map = byCategory[item.category];
    const key = `${item.nameKey}||${item.unitKey}`;

    if (map.has(key)) {
      const ex = map.get(key);
      if (ex.qty !== null && item.qty !== null) {
        ex.qty += item.qty;
        if (!ex.fromRecipes.includes(item.fromRecipe)) {
          ex.fromRecipes.push(item.fromRecipe);
        }
        continue;
      }
      map.set(`${key}__dup${map.size}`, {
        qty: item.qty, unit: item.unit, name: item.name,
        fromRecipes: [item.fromRecipe],
      });
    } else {
      map.set(key, {
        qty: item.qty, unit: item.unit, name: item.name,
        fromRecipes: [item.fromRecipe],
      });
    }
  }

  renderShopping(byCategory);
  document.getElementById('shopping').classList.remove('hidden');
  document.getElementById('shopping').scrollIntoView({ behavior: 'smooth' });
}

function renderShopping(byCategory) {
  const root = document.getElementById('shopping-list');
  root.innerHTML = '';

  const order = [
    'Viandes & charcuterie',
    'Produits laitiers & œufs',
    'Fruits & légumes',
    'Conserves & bocaux',
    'Pain, pâtes & céréales',
    'Sauces & condiments',
    'Bouillons & vins',
    'Sucré & sirops',
    'Huiles',
    'Épices & herbes séchées',
    'Autres',
  ];

  for (const cat of order) {
    if (!byCategory[cat]) continue;
    const div = document.createElement('div');
    div.className = 'category';
    div.innerHTML = `<h3>${cat}</h3>`;
    const items = Array.from(byCategory[cat].values())
      .sort((a, b) => a.name.localeCompare(b.name));
    for (const it of items) {
      div.appendChild(renderItem(it));
    }
    root.appendChild(div);
  }
}

function renderItem(it) {
  const row = document.createElement('div');
  row.className = 'item';
  const key = `${nameForMatching(it.name)}||${it.unit || ''}`;
  if (state.checked[key]) row.classList.add('checked');

  const cb = document.createElement('input');
  cb.type = 'checkbox';
  cb.checked = !!state.checked[key];
  cb.addEventListener('change', () => {
    state.checked[key] = cb.checked;
    saveState();
    row.classList.toggle('checked', cb.checked);
  });

  const text = document.createElement('div');
  text.className = 'item-text';
  const qtyStr = it.qty !== null ? `${formatQty(it.qty)} ` : '';
  const unitStr = it.unit ? `${it.unit} ` : '';
  text.innerHTML = `<div>${qtyStr}${unitStr}${it.name}</div>`;
  if (it.fromRecipes.length >= 1) {
    const from = document.createElement('div');
    from.className = 'item-from';
    from.textContent = `↳ ${it.fromRecipes.join(' + ')}`;
    text.appendChild(from);
  }

  row.appendChild(cb);
  row.appendChild(text);
  return row;
}

// ---------- Orchestration ----------

function rerenderAll() {
  renderCategories();
  renderHero();
  renderNutrition();
  render();
}

document.getElementById('reset-filters').addEventListener('click', () => {
  filters.search = '';
  filters.folders.clear();
  document.getElementById('search').value = '';
  renderCategories();
  render();
});

document.getElementById('search').addEventListener('input', e => {
  filters.search = e.target.value.trim();
  render();
});

rerenderAll();
</script>
