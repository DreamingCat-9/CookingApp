<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#c2185b">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Bittle — Recettes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700;9..144,900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --text: #2a1810;
    --text-soft: #5a4838;
    --muted: #8a7866;
    --panel: #ffffff;
    --radius: 18px;
    --radius-lg: 24px;
    --radius-pill: 999px;
    --tab-h: 76px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  /* ============ Thèmes (couleurs accent + fond) ============ */
  /* Lin et framboise (par défaut) */
  :root, body.theme-framboise {
    --bg: #f7f0e6;
    --bg-soft: #efe5d6;
    --border: #ecdfc8;
    --border-soft: #f1e7d4;
    --orange: #c2185b;
    --orange-deep: #9d1148;
    --orange-bright: #d63970;
    --orange-light: #fadce6;
    --orange-pale: #fdedf3;
    --accent-rgb: 194, 24, 91;
    --shadow-sm: 0 2px 8px rgba(160, 30, 80, 0.08);
    --shadow-md: 0 6px 20px rgba(160, 30, 80, 0.15);
    --shadow-lg: 0 16px 40px rgba(160, 30, 80, 0.18);
    --hero-grad: linear-gradient(135deg, #c2185b 0%, #e94986 100%);
    --hero-grad-empty: linear-gradient(135deg, #fadce6 0%, #fdedf3 100%);
    --detail-grad: linear-gradient(160deg, #c2185b 0%, #e94986 90%);
    --hero-shadow: 0 18px 40px rgba(180, 30, 80, 0.25);
    --grad-shadow: 0 12px 28px rgba(180, 30, 80, 0.25);
  }

  /* Crème */
  body.theme-creme {
    --bg: #fdf5e6;
    --bg-soft: #f8edd9;
    --border: #efe2cf;
    --border-soft: #f5e8d6;
    --orange: #ee6e2c;
    --orange-deep: #d8541a;
    --orange-bright: #f5783a;
    --orange-light: #fde0d0;
    --orange-pale: #fff1e6;
    --accent-rgb: 238, 110, 44;
    --shadow-sm: 0 2px 8px rgba(180, 110, 50, 0.08);
    --shadow-md: 0 6px 20px rgba(180, 110, 50, 0.15);
    --shadow-lg: 0 16px 40px rgba(180, 110, 50, 0.18);
    --hero-grad: linear-gradient(135deg, #ed5e1f 0%, #f48b3a 100%);
    --hero-grad-empty: linear-gradient(135deg, #fde0d0 0%, #fef0e0 100%);
    --detail-grad: linear-gradient(160deg, #ee6e2c 0%, #f5894a 90%);
    --hero-shadow: 0 18px 40px rgba(220, 90, 30, 0.25);
    --grad-shadow: 0 12px 28px rgba(220, 90, 30, 0.25);
  }

  /* Beurre et olive */
  body.theme-olive {
    --bg: #fef8e8;
    --bg-soft: #f8eccd;
    --border: #e8dfb8;
    --border-soft: #f0e8c4;
    --orange: #7a8c3a;
    --orange-deep: #5d6e23;
    --orange-bright: #97a85d;
    --orange-light: #dde2bd;
    --orange-pale: #f0f3dc;
    --accent-rgb: 122, 140, 58;
    --shadow-sm: 0 2px 8px rgba(110, 130, 60, 0.08);
    --shadow-md: 0 6px 20px rgba(110, 130, 60, 0.15);
    --shadow-lg: 0 16px 40px rgba(110, 130, 60, 0.18);
    --hero-grad: linear-gradient(135deg, #7a8c3a 0%, #a6b85a 100%);
    --hero-grad-empty: linear-gradient(135deg, #dde2bd 0%, #f0f3dc 100%);
    --detail-grad: linear-gradient(160deg, #7a8c3a 0%, #a6b85a 90%);
    --hero-shadow: 0 18px 40px rgba(110, 130, 60, 0.25);
    --grad-shadow: 0 12px 28px rgba(110, 130, 60, 0.25);
  }

  /* Sauge et abricot */
  body.theme-sauge {
    --bg: #eef0e6;
    --bg-soft: #e2e6d4;
    --border: #d6dac8;
    --border-soft: #e0e3d2;
    --orange: #d68a5c;
    --orange-deep: #b86d3f;
    --orange-bright: #e29e75;
    --orange-light: #f5d8c2;
    --orange-pale: #faece0;
    --accent-rgb: 214, 138, 92;
    --shadow-sm: 0 2px 8px rgba(180, 120, 80, 0.08);
    --shadow-md: 0 6px 20px rgba(180, 120, 80, 0.15);
    --shadow-lg: 0 16px 40px rgba(180, 120, 80, 0.18);
    --hero-grad: linear-gradient(135deg, #d68a5c 0%, #e8a785 100%);
    --hero-grad-empty: linear-gradient(135deg, #f5d8c2 0%, #faece0 100%);
    --detail-grad: linear-gradient(160deg, #d68a5c 0%, #e8a785 90%);
    --hero-shadow: 0 18px 40px rgba(180, 120, 80, 0.25);
    --grad-shadow: 0 12px 28px rgba(180, 120, 80, 0.25);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    overflow-x: hidden;
  }
  .display {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1.05;
  }
  .hidden { display: none !important; }

  /* ============ Layout : mobile-first, centré sur grand écran ============ */
  .app {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    background: var(--bg);
    position: relative;
    padding-bottom: calc(var(--tab-h) + var(--safe-bottom) + 12px);
  }
  .view {
    padding: 1rem 1.25rem 0;
    animation: fade-in 0.18s ease-out;
  }
  @keyframes fade-in {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ============ Header de page ============ */
  .page-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 1rem;
    padding: 1rem 0 1.25rem;
  }
  .hello {
    margin: 0 0 0.15rem 0;
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.16em;
    text-transform: uppercase;
    font-weight: 600;
  }
  .page-title {
    margin: 0;
    font-size: 2.5rem;
  }
  .icon-btn-circle {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 0;
    background: var(--orange);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    box-shadow: 0 6px 14px rgba(var(--accent-rgb), 0.35);
    transition: transform 0.12s;
  }
  .icon-btn-circle:active { transform: scale(0.94); }
  .icon-btn-circle.sm {
    width: 38px;
    height: 38px;
    box-shadow: var(--shadow-sm);
  }
  .icon-btn-circle.outline {
    background: var(--panel);
    color: var(--orange-deep);
    border: 1px solid var(--orange-light);
    box-shadow: var(--shadow-sm);
  }
  .header-actions {
    display: flex;
    gap: 0.4rem;
    align-items: center;
  }
  .icon-btn-ghost {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 0;
    background: rgba(255,255,255,0.18);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    backdrop-filter: blur(4px);
  }
  .icon-btn-ghost:active { background: rgba(255,255,255,0.3); }

  .search-input {
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0.85rem 1.1rem;
    font-size: 0.95rem;
    margin-bottom: 1rem;
    box-shadow: var(--shadow-sm);
  }
  .search-input:focus {
    outline: 2px solid var(--orange-light);
    border-color: var(--orange);
  }

  /* ============ Hero card (recettes vue) ============ */
  .hero {
    border-radius: var(--radius-lg);
    background: var(--hero-grad);
    padding: 1.4rem 1.4rem 1rem;
    color: white;
    box-shadow: var(--hero-shadow);
    position: relative;
    overflow: hidden;
    margin-bottom: 1.5rem;
  }
  .hero::after {
    content: '';
    position: absolute;
    right: -20px; top: -20px;
    width: 140px; height: 140px;
    background: radial-gradient(circle at center, rgba(255,255,255,0.15), transparent 70%);
    pointer-events: none;
  }
  .hero-eyebrow {
    font-size: 0.7rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    opacity: 0.85;
    margin: 0 0 0.6rem;
    font-weight: 600;
  }
  .hero-title {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 700;
    font-size: 1.55rem;
    line-height: 1.15;
    margin: 0 0 0.6rem;
    letter-spacing: -0.01em;
  }
  .hero-meta {
    font-size: 0.85rem;
    opacity: 0.9;
    margin: 0 0 1.1rem;
  }
  .hero-cta {
    display: block;
    width: 100%;
    background: white;
    color: var(--orange-deep);
    border: 0;
    padding: 0.85rem 1rem;
    border-radius: var(--radius);
    font-weight: 600;
    font-size: 0.95rem;
    cursor: pointer;
    text-align: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
  }
  .hero-cta:active { transform: scale(0.99); }

  .hero-empty {
    background: var(--hero-grad-empty);
    color: var(--text);
    box-shadow: var(--shadow-sm);
  }
  .hero-empty .hero-title { color: var(--text); font-size: 1.3rem; }
  .hero-empty .hero-meta { color: var(--muted); }
  .hero-empty .hero-eyebrow { color: var(--orange-deep); opacity: 1; }

  /* ============ Pills catégories (scroll horizontal) ============ */
  .cat-pills {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    margin: 0 -1.25rem 1.25rem;
    padding: 0 1.25rem 0.4rem;
  }
  .cat-pills-row {
    display: flex;
    gap: 0.55rem;
    overflow-x: auto;
    scrollbar-width: none;
    margin: 0 -1.25rem;
    padding: 0 1.25rem;
  }
  .cat-pills-row::-webkit-scrollbar { display: none; }
  .filter-toggle {
    display: inline-flex;
    background: var(--bg-soft);
    border: 1px solid var(--border);
    border-radius: var(--radius-pill);
    padding: 0.22rem;
    align-self: flex-start;
    box-shadow: var(--shadow-sm);
  }
  .toggle-opt {
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    background: transparent;
    border: none;
    padding: 0.45rem 0.95rem;
    border-radius: var(--radius-pill);
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.18s;
    white-space: nowrap;
  }
  .toggle-opt .count {
    background: var(--panel);
    color: var(--muted);
    font-size: 0.7rem;
    padding: 0.08rem 0.4rem;
    border-radius: var(--radius-pill);
    font-weight: 700;
  }
  .toggle-opt.active.opt-certifie {
    background: linear-gradient(135deg, #fde68a 0%, #f59e0b 100%);
    color: #78350f;
    box-shadow: 0 2px 6px rgba(245, 158, 11, 0.35);
  }
  .toggle-opt.active.opt-certifie .count {
    background: rgba(120, 53, 15, 0.18);
    color: #78350f;
  }
  .toggle-opt.active.opt-decouverte {
    background: var(--panel);
    color: var(--text);
    box-shadow: 0 2px 6px rgba(0,0,0,0.12);
  }
  .toggle-opt.active.opt-decouverte .count {
    background: var(--bg-soft);
    color: var(--text-soft);
  }
  .cat-pill {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius-pill);
    padding: 0.5rem 0.7rem;
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--text-soft);
    cursor: pointer;
    flex-shrink: 0;
    box-shadow: var(--shadow-sm);
    transition: all 0.15s;
  }
  .cat-pill.icon-only {
    padding: 0.5rem 0.65rem;
    min-width: 2.4rem;
    justify-content: center;
  }
  .cat-pill:active { transform: scale(0.96); }
  .cat-pill .icon { font-size: 1.1rem; }
  .cat-pill .count {
    background: var(--bg-soft);
    color: var(--muted);
    font-size: 0.72rem;
    padding: 0.1rem 0.45rem;
    border-radius: var(--radius-pill);
    margin-left: 0.15rem;
    font-weight: 600;
  }
  .cat-pill.active {
    background: var(--orange);
    border-color: var(--orange);
    color: white;
    box-shadow: 0 4px 12px rgba(var(--accent-rgb), 0.35);
  }
  .cat-pill.active .count {
    background: rgba(255,255,255,0.25);
    color: white;
  }

  /* ============ Recipe feed cards ============ */
  .recipe-feed {
    display: flex;
    flex-direction: column;
    gap: 0.85rem;
  }
  .recipe-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
    cursor: pointer;
    transition: all 0.15s;
    overflow: hidden;
  }
  .recipe-card:active { transform: scale(0.99); }
  .recipe-card.selected {
    border-color: var(--orange);
    box-shadow: 0 0 0 2px var(--orange-light), var(--shadow-md);
  }
  .recipe-card-image {
    position: relative;
    aspect-ratio: 16 / 9;
    background: var(--bg-soft);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  /* Gradients placeholders par catégorie */
  .recipe-card-image[data-folder="Volaille"] { background: linear-gradient(135deg, #fcd34d 0%, #f59e0b 100%); }
  .recipe-card-image[data-folder="Boeuf"]    { background: linear-gradient(135deg, #fca5a5 0%, #dc2626 100%); }
  .recipe-card-image[data-folder="Porc"]     { background: linear-gradient(135deg, #fbcfe8 0%, #ec4899 100%); }
  .recipe-card-image[data-folder="Poisson"]  { background: linear-gradient(135deg, #7dd3fc 0%, #0ea5e9 100%); }
  .recipe-card-image[data-folder="Végé"]     { background: linear-gradient(135deg, #bef264 0%, #65a30d 100%); }
  .recipe-card-image[data-folder="Divers"]   { background: linear-gradient(135deg, #ddd6fe 0%, #8b5cf6 100%); }
  .recipe-card-image[data-folder="Autres"]   { background: linear-gradient(135deg, #d1d5db 0%, #6b7280 100%); }
  .recipe-card-image::before {
    content: '';
    position: absolute;
    top: -20%; left: -10%;
    width: 60%; height: 60%;
    background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, transparent 70%);
    pointer-events: none;
  }
  .recipe-card-image img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 1;
  }
  .recipe-card-image.has-photo .placeholder-emoji,
  .recipe-card-image.has-photo .placeholder-badge {
    display: none;
  }
  .placeholder-emoji {
    font-size: 3.5rem;
    line-height: 1;
    filter: drop-shadow(0 4px 10px rgba(0,0,0,0.18));
    z-index: 1;
  }
  .placeholder-badge {
    position: absolute;
    top: 0.7rem;
    left: 0.7rem;
    background: rgba(0,0,0,0.45);
    color: white;
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 0.28rem 0.6rem;
    border-radius: var(--radius-pill);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 3;
  }
  .recipe-checkbox-overlay {
    position: absolute;
    top: 0.6rem;
    right: 0.6rem;
    z-index: 3;
  }
  .certifie-badge {
    position: absolute;
    bottom: 0.55rem;
    left: 0.6rem;
    z-index: 3;
    display: inline-flex;
    align-items: center;
    gap: 0.32rem;
    background: linear-gradient(135deg, #fde68a 0%, #f59e0b 100%);
    color: #78350f;
    font-size: 0.62rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.28rem 0.55rem;
    border-radius: var(--radius-pill);
    box-shadow: 0 2px 6px rgba(0,0,0,0.18);
  }
  .certifie-badge .crown {
    font-size: 0.85rem;
    line-height: 1;
  }
  .detail-certifie-pill {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    background: linear-gradient(135deg, #fde68a 0%, #f59e0b 100%);
    color: #78350f;
    padding: 0.3rem 0.75rem;
    border-radius: var(--radius-pill);
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 0.85rem;
    margin-left: 0.5rem;
    box-shadow: 0 2px 6px rgba(0,0,0,0.18);
  }
  .recipe-card-content {
    padding: 0.85rem 1rem 1rem;
  }
  .recipe-tag {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--orange-deep);
    font-weight: 700;
    margin-bottom: 0.35rem;
  }
  .recipe-card-title {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 700;
    font-size: 1.05rem;
    line-height: 1.25;
    color: var(--text);
    margin: 0 0 0.5rem;
  }
  .recipe-card-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem 0.85rem;
    font-size: 0.78rem;
    color: var(--muted);
  }
  .recipe-card-meta span {
    display: inline-flex;
    align-items: center;
    gap: 0.25rem;
  }
  .recipe-checkbox {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    border: 2px solid white;
    background: rgba(255,255,255,0.55);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--orange-deep);
    font-size: 0.95rem;
    font-weight: 700;
    transition: all 0.15s;
    box-shadow: 0 2px 6px rgba(0,0,0,0.12);
  }
  .recipe-card.selected .recipe-checkbox {
    background: var(--orange);
    border-color: white;
    color: white;
  }

  .empty-msg {
    text-align: center;
    color: var(--muted);
    padding: 3rem 1rem;
    font-style: italic;
  }

  /* ============ Vue détail recette ============ */
  .view-detail {
    padding: 0 0 1rem;
  }
  .detail-hero {
    background: var(--detail-grad);
    color: white;
    padding: 1.25rem 1.25rem 1.5rem;
    position: relative;
    overflow: hidden;
  }
  .detail-hero::after {
    content: '';
    position: absolute;
    right: -30px; bottom: -30px;
    width: 220px; height: 220px;
    background: radial-gradient(circle at center, rgba(255,255,255,0.18), transparent 70%);
    pointer-events: none;
  }
  .detail-hero-top {
    display: flex;
    justify-content: space-between;
    margin-bottom: 1.5rem;
  }
  .detail-hero-actions {
    display: flex;
    gap: 0.5rem;
  }
  .detail-tag-pill {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    background: rgba(0,0,0,0.18);
    color: white;
    padding: 0.3rem 0.75rem;
    border-radius: var(--radius-pill);
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 0.85rem;
    backdrop-filter: blur(6px);
  }
  .detail-title {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 2rem;
    font-weight: 700;
    line-height: 1.1;
    margin: 0 0 1rem;
    letter-spacing: -0.02em;
  }
  .detail-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    margin-bottom: 0.5rem;
  }
  .detail-mini-tag {
    background: rgba(255,255,255,0.22);
    color: white;
    padding: 0.3rem 0.75rem;
    border-radius: var(--radius-pill);
    font-size: 0.78rem;
    backdrop-filter: blur(6px);
  }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0.55rem;
    padding: 0 1.25rem;
    margin-top: -1.25rem;
    position: relative;
    z-index: 2;
  }
  .stat-card {
    background: var(--orange-deep);
    color: white;
    border-radius: var(--radius);
    padding: 0.75rem 0.4rem;
    text-align: center;
    box-shadow: 0 6px 14px rgba(180,80,30,0.3);
  }
  .stat-value {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 700;
    font-size: 1.05rem;
    line-height: 1.1;
  }
  .stat-label {
    font-size: 0.62rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    opacity: 0.85;
    margin-top: 0.2rem;
    font-weight: 600;
  }

  .portion-card {
    margin: 1.25rem 1.25rem 0;
    background: var(--panel);
    border-radius: var(--radius);
    padding: 0.85rem 1.1rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--border);
  }
  .portion-info {
    display: flex;
    flex-direction: column;
  }
  .portion-info .lbl {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-weight: 600;
  }
  .portion-info .val {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 700;
    font-size: 1.15rem;
  }
  .portion-controls {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .portion-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 0;
    background: var(--orange);
    color: white;
    font-size: 1.15rem;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 3px 8px rgba(var(--accent-rgb), 0.35);
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  .portion-btn:disabled {
    background: var(--border);
    box-shadow: none;
    cursor: not-allowed;
  }
  .portion-btn:active:not(:disabled) { transform: scale(0.94); }

  .detail-tabs {
    display: flex;
    margin: 1.25rem 1.25rem 0;
    border-bottom: 1px solid var(--border);
    gap: 1.25rem;
  }
  .detail-tab {
    background: transparent;
    border: 0;
    padding: 0.85rem 0;
    font-size: 0.95rem;
    color: var(--muted);
    cursor: pointer;
    font-weight: 500;
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
  }
  .detail-tab .badge {
    background: var(--bg-soft);
    color: var(--muted);
    font-size: 0.7rem;
    padding: 0.05rem 0.4rem;
    border-radius: var(--radius-pill);
    font-weight: 600;
  }
  .detail-tab.active {
    color: var(--orange-deep);
    font-weight: 700;
  }
  .detail-tab.active::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 0; right: 0;
    height: 3px;
    background: var(--orange);
    border-radius: 2px;
  }
  .detail-tab.active .badge { background: var(--orange-light); color: var(--orange-deep); }

  .tab-content {
    padding: 1.25rem 1.25rem 6rem;
  }
  .tab-hint {
    font-size: 0.85rem;
    color: var(--muted);
    margin: 0 0 1rem;
  }
  .ingr-list, .prep-list {
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .ingr-subhead {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 700;
    font-size: 1rem;
    color: var(--orange-deep);
    margin: 1rem 0 0.5rem;
  }
  .ingr-subhead:first-of-type { margin-top: 0; }
  .ingr-item {
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
    padding: 0.65rem 0;
    border-bottom: 1px solid var(--border);
  }
  .ingr-item:last-child { border-bottom: 0; }
  .ingr-check {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
    cursor: pointer;
    margin-top: 0.1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 0.7rem;
    font-weight: 700;
  }
  .ingr-check.checked {
    background: var(--orange);
    border-color: var(--orange);
  }
  .ingr-text { flex: 1; line-height: 1.4; }
  .ingr-text.struck { text-decoration: line-through; color: var(--muted); }
  .ingr-qty { color: var(--orange-deep); font-weight: 600; }

  .prep-step {
    display: flex;
    gap: 0.85rem;
    padding: 0.85rem 0;
    border-bottom: 1px solid var(--border);
  }
  .prep-step:last-child { border-bottom: 0; }
  .prep-step-num {
    flex-shrink: 0;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--orange-pale);
    color: var(--orange-deep);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 700;
    font-size: 0.95rem;
  }
  .prep-step-text { flex: 1; line-height: 1.5; padding-top: 0.2rem; }

  .nutri-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
    margin-bottom: 1.25rem;
  }
  .nutri-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0.85rem 1rem;
    box-shadow: var(--shadow-sm);
  }
  .nutri-card .lbl {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 0.25rem;
    font-weight: 600;
  }
  .nutri-card .val {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 700;
    font-size: 1.5rem;
    color: var(--orange-deep);
    line-height: 1;
  }
  .nutri-card .sub {
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 0.15rem;
  }
  .nutri-note {
    font-size: 0.78rem;
    color: var(--muted);
    text-align: center;
    margin-top: 0.5rem;
    font-style: italic;
  }
  .nutri-breakdown {
    margin-top: 1.5rem;
  }
  .nutri-breakdown h4 {
    font-size: 0.95rem;
    margin: 0 0 0.6rem 0;
    color: var(--text);
  }
  .nutri-breakdown-note {
    font-size: 0.72rem;
    color: var(--muted);
    margin: 0 0 0.7rem 0;
  }
  .im-row {
    display: grid;
    grid-template-columns: 1fr 3rem 3.2rem 2.4rem 2.4rem 2.4rem;
    gap: 0.5rem;
    align-items: center;
    padding: 0.45rem 0.55rem;
    border-bottom: 1px solid var(--border);
    font-size: 0.85rem;
  }
  .im-row.im-header {
    font-weight: 600;
    font-size: 0.72rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    border-bottom: 2px solid var(--border);
    padding-bottom: 0.35rem;
  }
  .im-row.im-skip {
    color: var(--muted);
    font-style: italic;
  }
  .im-name {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    position: relative;
  }
  .im-name .im-bar {
    position: absolute;
    bottom: -2px;
    left: 0;
    height: 2px;
    background: var(--accent);
    border-radius: 1px;
    opacity: 0.55;
  }
  .im-num {
    text-align: right;
    font-variant-numeric: tabular-nums;
  }
  .im-row.im-total {
    font-weight: 700;
    border-top: 2px solid var(--border);
    border-bottom: none;
    padding-top: 0.55rem;
  }

  /* ============ Bouton flottant CTA détail ============ */
  .detail-cta {
    position: fixed;
    bottom: calc(var(--tab-h) + var(--safe-bottom) + 14px);
    left: 50%;
    transform: translateX(-50%);
    width: calc(100% - 2.5rem);
    max-width: 432px;
    background: var(--orange);
    color: white;
    border: 0;
    padding: 1rem;
    border-radius: var(--radius);
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 12px 28px rgba(var(--accent-rgb), 0.4);
    z-index: 50;
  }
  .detail-cta.in-selection {
    background: white;
    color: var(--orange-deep);
    border: 2px solid var(--orange);
  }
  .detail-cta:active { transform: translateX(-50%) scale(0.99); }

  /* ============ Vue Semaine ============ */
  .week-summary {
    background: var(--hero-grad);
    color: white;
    border-radius: var(--radius-lg);
    padding: 1.1rem 1.25rem 1.25rem;
    margin-bottom: 1.25rem;
    box-shadow: var(--grad-shadow);
  }
  .week-summary-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 0.85rem;
  }
  .week-summary-macros {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.4rem;
    padding-top: 0.85rem;
    border-top: 1px solid rgba(255,255,255,0.25);
  }
  .week-summary-macros .m {
    text-align: center;
    display: flex;
    flex-direction: column;
    gap: 0.05rem;
  }
  .week-summary-macros .m .v {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 700;
    font-size: 1.05rem;
    line-height: 1;
  }
  .week-summary-macros .m .l {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    opacity: 0.85;
    margin-top: 0.15rem;
  }
  .week-summary-num {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 2.2rem;
    font-weight: 800;
    line-height: 1;
  }
  .week-summary-lbl {
    font-size: 0.78rem;
    opacity: 0.9;
    margin-top: 0.25rem;
  }
  .week-stat-block {
    text-align: right;
    font-size: 0.85rem;
  }
  .week-stat-block .v {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 1.25rem;
    font-weight: 700;
    line-height: 1;
  }
  .week-stat-block .l {
    font-size: 0.7rem;
    opacity: 0.85;
    margin-top: 0.2rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .week-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0.95rem 1rem 0.85rem;
    box-shadow: var(--shadow-sm);
    margin-bottom: 0.7rem;
  }
  .week-card-top {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 0.7rem;
  }
  .week-card-thumb {
    width: 58px;
    height: 58px;
    border-radius: 12px;
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.6rem;
    box-shadow: var(--shadow-sm);
  }
  .week-card-thumb[data-folder="Volaille"] { background: linear-gradient(135deg, #fcd34d 0%, #f59e0b 100%); }
  .week-card-thumb[data-folder="Boeuf"]    { background: linear-gradient(135deg, #fca5a5 0%, #dc2626 100%); }
  .week-card-thumb[data-folder="Porc"]     { background: linear-gradient(135deg, #fbcfe8 0%, #ec4899 100%); }
  .week-card-thumb[data-folder="Poisson"]  { background: linear-gradient(135deg, #7dd3fc 0%, #0ea5e9 100%); }
  .week-card-thumb[data-folder="Végé"]     { background: linear-gradient(135deg, #bef264 0%, #65a30d 100%); }
  .week-card-thumb[data-folder="Divers"]   { background: linear-gradient(135deg, #ddd6fe 0%, #8b5cf6 100%); }
  .week-card-thumb[data-folder="Autres"]   { background: linear-gradient(135deg, #d1d5db 0%, #6b7280 100%); }
  .week-card-thumb img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 1;
  }
  .week-card-thumb-emoji {
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.18));
    line-height: 1;
  }
  .week-card-thumb.has-photo .week-card-thumb-emoji { display: none; }
  .week-card-title-block {
    flex: 1;
    min-width: 0;
    cursor: pointer;
  }
  .week-card-tag {
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--orange-deep);
    font-weight: 700;
    margin-bottom: 0.15rem;
  }
  .week-card-title {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 700;
    font-size: 1rem;
    line-height: 1.25;
    margin: 0;
    cursor: pointer;
  }
  .week-macros {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0.35rem;
    margin-bottom: 0.55rem;
  }
  .week-macro {
    background: var(--orange-pale);
    border-radius: 10px;
    padding: 0.45rem 0.2rem;
    text-align: center;
  }
  .week-macro .v {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 700;
    font-size: 0.92rem;
    color: var(--orange-deep);
    line-height: 1;
  }
  .week-macro .l {
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-top: 0.18rem;
    font-weight: 600;
  }
  .week-per-portion {
    font-size: 0.74rem;
    color: var(--muted);
    margin-bottom: 0.6rem;
    padding-left: 0.1rem;
  }
  .week-per-portion .pp-tag {
    color: var(--text-soft);
    font-weight: 600;
  }
  .week-card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 0.5rem;
  }
  .week-card-time {
    font-size: 0.75rem;
    color: var(--muted);
    display: inline-flex;
    align-items: center;
    gap: 0.25rem;
  }
  .week-card-controls {
    display: flex;
    align-items: center;
    gap: 0.35rem;
    background: var(--bg-soft);
    border-radius: var(--radius-pill);
    padding: 0.2rem 0.4rem;
  }
  .week-card-controls button {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 0;
    background: white;
    color: var(--orange-deep);
    font-weight: 700;
    cursor: pointer;
    font-size: 0.95rem;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .week-card-controls .qty {
    min-width: 22px;
    text-align: center;
    font-weight: 700;
    font-size: 0.82rem;
    color: var(--text);
    padding: 0 0.15rem;
  }
  .week-remove {
    background: transparent;
    border: 0;
    color: var(--muted);
    font-size: 1.4rem;
    line-height: 1;
    padding: 0.1rem 0.45rem;
    cursor: pointer;
    flex-shrink: 0;
  }
  .week-remove:hover { color: var(--orange); }
  .week-cta {
    margin: 1.25rem 0;
    width: 100%;
    background: var(--orange);
    color: white;
    border: 0;
    padding: 1rem;
    border-radius: var(--radius);
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 8px 20px rgba(var(--accent-rgb), 0.3);
  }
  .week-cta:active { transform: scale(0.99); }

  /* ============ Vue Liste ============ */
  .list-empty {
    text-align: center;
    padding: 4rem 1.5rem;
    color: var(--muted);
  }
  .list-empty .emoji { font-size: 3rem; display: block; margin-bottom: 0.5rem; }
  .list-cat {
    margin-bottom: 1.5rem;
  }
  .list-cat-h {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 700;
    font-size: 1.1rem;
    color: var(--orange-deep);
    margin: 0 0 0.6rem;
    padding-bottom: 0.4rem;
    border-bottom: 2px solid var(--orange-light);
  }
  .list-item {
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
    padding: 0.7rem 0;
    border-bottom: 1px solid var(--border);
  }
  .list-item:last-child { border-bottom: 0; }
  .list-item.checked .list-item-text { text-decoration: line-through; color: var(--muted); }
  .list-item-text { flex: 1; line-height: 1.35; }
  .list-item-from {
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 0.15rem;
  }

  /* ============ Vue Profil ============ */
  .profile-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
    margin-bottom: 1rem;
    box-shadow: var(--shadow-sm);
  }
  .profile-stat-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
  }
  .profile-stat {
    background: var(--orange-pale);
    border-radius: var(--radius);
    padding: 0.85rem 1rem;
    text-align: center;
  }
  .profile-stat .v {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 700;
    font-size: 1.6rem;
    color: var(--orange-deep);
    line-height: 1;
  }
  .profile-stat .l {
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 0.25rem;
  }
  .profile-action {
    display: block;
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0.95rem 1.1rem;
    color: var(--text);
    text-align: left;
    cursor: pointer;
    margin-bottom: 0.5rem;
    font-size: 0.95rem;
    box-shadow: var(--shadow-sm);
  }
  .profile-action.danger { color: #b91c1c; }

  /* ============ Sélecteur de thème ============ */
  .theme-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 0.6rem;
    margin-bottom: 0.5rem;
  }
  .theme-swatch {
    background: var(--panel);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 0.7rem 0.6rem 0.65rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
    cursor: pointer;
    box-shadow: var(--shadow-sm);
    transition: all 0.15s;
    width: 100%;
  }
  .theme-swatch:active { transform: scale(0.98); }
  .theme-swatch.active {
    border-color: var(--orange);
    background: var(--orange-pale);
  }
  .swatch-color {
    width: 100%;
    height: 36px;
    border-radius: 10px;
    display: block;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.25);
  }
  .swatch-creme     { background: linear-gradient(135deg, #ed5e1f 0%, #f48b3a 100%); }
  .swatch-framboise { background: linear-gradient(135deg, #c2185b 0%, #e94986 100%); }
  .swatch-olive     { background: linear-gradient(135deg, #7a8c3a 0%, #a6b85a 100%); }
  .swatch-sauge     { background: linear-gradient(135deg, #d68a5c 0%, #e8a785 100%); }
  .swatch-label {
    font-size: 0.78rem;
    color: var(--text);
    text-align: center;
    font-weight: 500;
    line-height: 1.15;
  }

  /* ============ Avatar profil ============ */
  .avatar {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    overflow: hidden;
    flex-shrink: 0;
    border: 3px solid var(--orange-light);
    box-shadow: var(--shadow-md);
    position: relative;
    background: var(--orange-pale);
  }
  .avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .avatar-fallback {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 700;
    font-size: 1.7rem;
    color: var(--orange-deep);
  }
  .avatar img.loaded + .avatar-fallback { display: none; }

  /* ============ Confirm / Alert dialogs ============ */
  .dialog-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(40, 25, 10, 0.5);
    backdrop-filter: blur(3px);
    -webkit-backdrop-filter: blur(3px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.25rem;
    z-index: 200;
    animation: dialog-fade 0.18s ease-out;
  }
  @keyframes dialog-fade {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  .dialog {
    background: var(--panel);
    border-radius: var(--radius);
    max-width: 360px;
    width: 100%;
    padding: 1.5rem 1.4rem 1.25rem;
    box-shadow: var(--shadow-lg);
    text-align: center;
    animation: dialog-pop 0.22s cubic-bezier(.2,1.2,.4,1);
  }
  @keyframes dialog-pop {
    from { opacity: 0; transform: scale(0.92) translateY(8px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }
  .dialog-icon {
    width: 54px;
    height: 54px;
    margin: 0 auto 0.85rem;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.6rem;
    font-weight: 700;
    line-height: 1;
  }
  .dialog-icon.success { background: var(--orange-pale); color: var(--orange-deep); }
  .dialog-icon.error   { background: #fee2e2; color: #b91c1c; }
  .dialog-icon.warn    { background: #fef3c7; color: #b45309; }
  .dialog-icon.info    { background: var(--bg-soft); color: var(--text); }
  .dialog-title {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 700;
    font-size: 1.15rem;
    color: var(--text);
    margin: 0 0 0.5rem;
    line-height: 1.25;
  }
  .dialog-message {
    font-size: 0.9rem;
    color: var(--text-soft);
    margin: 0 0 1.25rem;
    line-height: 1.45;
    white-space: pre-line;
  }
  .dialog-message ul {
