 de Dijon", "grams": 5.3, "kcal": 3.2, "prot": 0.2, "gluc": 0.31, "lip": 0.18, "canonical": "moutarde_dijon", "status": "ok"}, {"raw": "1/2 c. à thé (2,5 ml) sel", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}, {"raw": "1 petite gousse d'ail", "grams": 3.0, "kcal": 4.5, "prot": 0.19, "gluc": 0.99, "lip": 0.01, "canonical": "ail_gousse", "status": "ok"}, {"raw": "Poivre, au goût", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}]}, {"folder": "Volaille", "filename": "brochettes-poulet-halloumi.md", "id": "Volaille__brochettes-poulet-halloumi", "raw": "---\ntitre: Brochettes de poulet et de halloumi\nportions: 6\ntemps_prep: 20 min\ntemps_cuisson: 10 min\ntags: [brochettes, four, libanais]\ncertifie_bittle: true\n---\n\n## Ingrédients\n\n### Marinade\n- 30 ml (2 c. à soupe) huile d'olive\n- 30 ml (2 c. à soupe) zaatar\n- 15 ml (1 c. à soupe) ail haché en pot (ou 3 gousses d'ail)\n- Le zeste de 1 citron\n- Sel\n\n### Brochettes\n- 450 g (1 lb) poitrines de poulet désossées (environ 2 poitrines)\n- 1 paquet de 160 g (5 oz) fromage halloumi\n- 1/2 oignon rouge\n- 2 poivrons (rouge, orange ou jaune)\n- 1 courgette verte (zucchini)\n- 4 oignons verts\n\n## Préparation\n1. Couper le poulet en petits cubes. Couper le halloumi en morceaux d'environ 2 cm x 0,5 cm. Couper l'oignon rouge et les poivrons en cubes. Trancher la courgette en tranches minces. Couper les oignons verts en tronçons de 2,5 cm. Zester le citron. Si vous utilisez des gousses d'ail fraîches : les hacher finement.\n2. Placer la grille au centre du four. Tapisser une plaque de cuisson de papier d'aluminium.\n3. Dans un grand bol, mélanger tous les ingrédients de la marinade et ajouter une pincée de sel.\n4. Déposer le poulet dans la marinade et bien mélanger pour l'enrober. Incorporer le fromage et les légumes.\n5. Enfiler les ingrédients sur 12 brochettes de 20 cm (8 po) de longueur en alternant les légumes, le poulet et le fromage. Prévoir environ 4 morceaux de poulet et 3 morceaux de fromage par brochette. Déposer sur la plaque de cuisson.\n6. Cuire au four sous le gril (broil) 5 minutes. Retourner les brochettes et poursuivre la cuisson 5 minutes ou jusqu'à ce que le poulet soit cuit et que les légumes soient grillés.\n7. Servir sur un nid de semoule de blé entier (couscous) et garnir des quartiers du citron zesté.\n\n## Notes\n- 6 portions = 2 brochettes par portion.\n- Se conserve 3 jours au réfrigérateur ou 1 mois au congélateur.\n- Le zaatar est composé de thym séché, sumac et graines de sésame. Pour version maison : mélanger ces épices en quantités égales.\n- Variante : servir le poulet et les légumes dans des pitas de blé entier garnis de mayo à l'ail.\n", "macros_par_ingredient": [{"raw": "30 ml (2 c. à soupe) huile d'olive", "grams": 27.4, "kcal": 242.4, "prot": 0.0, "gluc": 0.0, "lip": 27.39, "canonical": "huile_olive", "status": "ok"}, {"raw": "30 ml (2 c. à soupe) zaatar", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": "herbes_seches_generic", "status": "skip"}, {"raw": "15 ml (1 c. à soupe) ail haché en pot (ou 3 gousses d'ail)", "grams": 8.6, "kcal": 12.8, "prot": 0.55, "gluc": 2.85, "lip": 0.04, "canonical": "ail_pot", "status": "ok"}, {"raw": "Le zeste de 1 citron", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}, {"raw": "Sel", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}, {"raw": "450 g (1 lb) poitrines de poulet désossées (environ 2 poitrines)", "grams": 450.0, "kcal": 540.0, "prot": 101.25, "gluc": 0.0, "lip": 11.79, "canonical": "poulet_poitrine", "status": "ok"}, {"raw": "1 paquet de 160 g (5 oz) fromage halloumi", "grams": 141.7, "kcal": 374.2, "prot": 20.14, "gluc": 5.8, "lip": 30.16, "canonical": "halloumi", "status": "ok"}, {"raw": "1/2 oignon rouge", "grams": 55.0, "kcal": 22.0, "prot": 0.61, "gluc": 5.14, "lip": 0.06, "canonical": "oignon_jaune", "status": "ok"}, {"raw": "2 poivrons (rouge, orange ou jaune)", "grams": 240.0, "kcal": 74.4, "prot": 2.38, "gluc": 14.47, "lip": 0.72, "canonical": "poivron_generic", "status": "ok"}, {"raw": "1 courgette verte (zucchini)", "grams": 200.0, "kcal": 42.0, "prot": 5.42, "gluc": 6.22, "lip": 0.8, "canonical": "courgette", "status": "ok"}, {"raw": "4 oignons verts", "grams": 60.0, "kcal": 20.4, "prot": 1.14, "gluc": 3.9, "lip": 0.24, "canonical": "oignon_vert", "status": "ok"}]}, {"folder": "Volaille", "filename": "burger-dinde-legumes.md", "id": "Volaille__burger-dinde-legumes", "raw": "---\ntitre: Burger de dinde aux légumes\nportions: 4\ntemps_prep: 15 min\ntemps_cuisson: 15 min\ntags: [burger, poêle]\ncertifie_bittle: true\n---\n\n## Ingrédients\n\n### Galettes\n- 450 g (1 lb) dinde hachée extra-maigre\n- 250 ml (1 tasse) julienne de légumes (mélange du commerce de carotte, navet et brocoli, type Saladexpress)\n- 60 ml (1/4 tasse) oignon rouge\n- 125 ml (1/2 tasse) fromage râpé à l'italienne (mélange du commerce)\n- 15 ml (1 c. à soupe) assaisonnement cajun ou tex-mex\n- 5 ml (1 c. à thé) huile de canola\n- 4 pains à hamburger\n\n### Garniture\n- Tomate\n- Feuilles de laitue ou de chou\n- Mayonnaise allégée\n- Pickles\n\n## Préparation\n1. Trancher l'oignon rouge en fines lamelles. Trancher la tomate et les pickles. Émincer le chou si utilisé.\n2. Dans un grand bol, mélanger la dinde, les légumes, l'oignon, le fromage et l'assaisonnement.\n3. Diviser la préparation en 4 et façonner en galettes.\n4. Dans un grand poêlon antiadhésif, chauffer l'huile à feu moyen-vif. Cuire les galettes de 5 à 7 minutes de chaque côté. Éviter de les manipuler durant la cuisson pour ne pas que les jus s'échappent.\n5. Pendant ce temps, déposer les pains à hamburger sur une plaque de cuisson, l'intérieur vers le haut. Cuire au four sous le gril (broil) 5 minutes ou jusqu'à ce que les pains soient dorés.\n6. Pour servir, garnir de tomate, de pickle, de chou et de mayonnaise allégée.\n\n## Notes\n- Les galettes sans garniture se conservent 3 jours au réfrigérateur ou 4 mois au congélateur. Insérer une feuille de papier parchemin entre elles avant de congeler.\n- Inutile de saler : les mélanges cajun ou tex-mex contiennent déjà du sel.\n- Astuce : râper les légumes du frigo si pas de sac de julienne. Éviter les légumes gorgés d'eau (poivrons, concombres, tomates).\n", "macros_par_ingredient": [{"raw": "450 g (1 lb) dinde hachée extra-maigre", "grams": 450.0, "kcal": 657.0, "prot": 85.05, "gluc": 0.0, "lip": 32.54, "canonical": "dinde_hachee", "status": "ok"}, {"raw": "250 ml (1 tasse) julienne de légumes (mélange du commerce de carotte, navet et brocoli, type Saladexpress)", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": "legumes_julienne", "status": "skip"}, {"raw": "60 ml (1/4 tasse) oignon rouge", "grams": 40.6, "kcal": 16.2, "prot": 0.45, "gluc": 3.79, "lip": 0.04, "canonical": "oignon_jaune", "status": "ok"}, {"raw": "125 ml (1/2 tasse) fromage râpé à l'italienne (mélange du commerce)", "grams": 69.7, "kcal": 283.1, "prot": 16.76, "gluc": 0.93, "lip": 23.59, "canonical": "cheddar", "status": "ok"}, {"raw": "15 ml (1 c. à soupe) assaisonnement cajun ou tex-mex", "grams": 7.0, "kcal": 19.7, "prot": 0.99, "gluc": 3.78, "lip": 0.9, "canonical": "paprika", "status": "ok"}, {"raw": "5 ml (1 c. à thé) huile de canola", "grams": 4.6, "kcal": 40.8, "prot": 0.0, "gluc": 0.0, "lip": 4.61, "canonical": "huile_canola", "status": "ok"}, {"raw": "4 pains à hamburger", "grams": 240.0, "kcal": 660.0, "prot": 21.84, "gluc": 133.68, "lip": 2.88, "canonical": "pain_burger", "status": "ok"}, {"raw": "Tomate", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}, {"raw": "Feuilles de laitue ou de chou", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}, {"raw": "Mayonnaise allégée", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}, {"raw": "Pickles", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}]}, {"folder": "Volaille", "filename": "couscous-poulet.md", "id": "Volaille__couscous-poulet", "raw": "---\ntitre: Couscous au poulet\nportions: 8\ntemps_prep: 10 min\ntemps_cuisson: 20 min\ntags: [marocain, casserole]\ncertifie_bittle: true\n---\n\n## Ingrédients\n- 30 ml (2 c. à soupe) huile de canola\n- 1 gros oignon rouge\n- 450 g (1 lb) poitrines de poulet (environ 2 poitrines)\n- 3 poivrons (rouge, orange et jaune)\n- 1 boîte de 540 ml (19 oz) pois chiches\n- 1 L (4 tasses) bouillon de poulet réduit en sodium\n- 500 ml (2 tasses) semoule de blé entier (couscous)\n- 30 ml (2 c. à soupe) assaisonnement ras-el-hanout\n\n## Préparation\n1. Couper l'oignon en cubes. Couper le poulet en cubes. Couper les poivrons en cubes. Rincer et égoutter les pois chiches.\n2. Dans une casserole, chauffer l'huile à feu vif. Dorer l'oignon et le poulet.\n3. Ajouter tous les autres ingrédients. Réduire à feu moyen, couvrir et poursuivre la cuisson 5 minutes ou jusqu'à ce que la semoule soit gonflée et que le bouillon soit complètement absorbé.\n4. Mélanger après la cuisson. Servir immédiatement au centre de la table.\n\n## Notes\n- Se conserve 3 jours au réfrigérateur ou 3 mois au congélateur.\n- Le ras-el-hanout est un mélange d'épices marocain pouvant contenir une trentaine d'épices selon la personne qui le prépare.\n- Astuce : préparer son propre ras-el-hanout — dorer 15 ml (1 c. à soupe) de graines de cumin, moutarde, fenouil et coriandre, puis broyer avec 7,5 ml (1/2 c. à soupe) de cannelle et de gingembre moulus.\n", "macros_par_ingredient": [{"raw": "30 ml (2 c. à soupe) huile de canola", "grams": 27.6, "kcal": 244.6, "prot": 0.0, "gluc": 0.0, "lip": 27.64, "canonical": "huile_canola", "status": "ok"}, {"raw": "1 gros oignon rouge", "grams": 110.0, "kcal": 44.0, "prot": 1.21, "gluc": 10.27, "lip": 0.11, "canonical": "oignon_jaune", "status": "ok"}, {"raw": "450 g (1 lb) poitrines de poulet (environ 2 poitrines)", "grams": 450.0, "kcal": 540.0, "prot": 101.25, "gluc": 0.0, "lip": 11.79, "canonical": "poulet_poitrine", "status": "ok"}, {"raw": "3 poivrons (rouge, orange et jaune)", "grams": 360.0, "kcal": 111.6, "prot": 3.56, "gluc": 21.71, "lip": 1.08, "canonical": "poivron_generic", "status": "ok"}, {"raw": "1 boîte de 540 ml (19 oz) pois chiches", "grams": 538.6, "kcal": 743.3, "prot": 37.92, "gluc": 123.19, "lip": 13.3, "canonical": "pois_chiches_conserve", "status": "ok"}, {"raw": "1 L (4 tasses) bouillon de poulet réduit en sodium", "grams": 1035.3, "kcal": 31.1, "prot": 5.07, "gluc": 2.48, "lip": 0.21, "canonical": "bouillon_poulet", "status": "ok"}, {"raw": "500 ml (2 tasses) semoule de blé entier (couscous)", "grams": 331.8, "kcal": 371.6, "prot": 12.57, "gluc": 77.04, "lip": 0.53, "canonical": "couscous", "status": "ok"}, {"raw": "30 ml (2 c. à soupe) assaisonnement ras-el-hanout", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": "herbes_seches_generic", "status": "skip"}]}, {"folder": "Volaille", "filename": "cubain-mojo-poulet.md", "id": "Volaille__cubain-mojo-poulet", "raw": "---\ntitre: Cubain-Mojo\nportions: 5\ntemps_prep: 25 min\ntemps_cuisson: 40 min\ntags: [cubain, poêle, marinade]\ncertifie_bittle: true\n---\n\n## Ingrédients\n\n### Poulet\n- 850 g poitrines de poulet\n- 1 oignon jaune\n- 30 ml (2 c. à soupe) ail haché en pot\n- 15 ml (1 c. à soupe) épices passe-partout\n- 10 ml (2 c. à thé) cumin\n- Jus de 3 oranges\n- Jus de 2 limes\n- Jus de 1 citron\n- Sel et poivre\n- 80 ml (1/3 tasse) coriandre fraîche\n\n### Riz aux haricots\n- 1 oignon jaune\n- 1 poivron vert\n- 1 poivron rouge\n- 15 ml (1 c. à soupe) ail haché en pot\n- 250 ml (1 tasse) riz blanc sec\n- 1 conserve de haricots noirs de 540 ml\n- 500 ml (2 tasses) bouillon de poulet sans sel ajouté\n\n## Préparation\n1. Couper le poulet en morceaux de 3 cm. Couper l'oignon jaune (section poulet) en lanières. Hacher l'oignon jaune (section riz) et les poivrons. Hacher la coriandre. Rincer et égoutter le riz. Rincer et égoutter les haricots noirs.\n2. Dans un bol, mélanger l'oignon, l'ail, le mélange d'épices passe-partout, le cumin et le jus des agrumes. Déposer le poulet dans un bol avec la moitié du mélange de jus et d'épices. Dans un autre bol, verser le reste du jus avec les oignons. Laisser mariner 30 minutes.\n3. Pendant ce temps, vaporiser une casserole d'huile et la chauffer à feu moyen. Cuire l'oignon pour le riz pendant 2 minutes.\n4. Ajouter le poivron et l'ail dans la casserole, puis remuer. Poursuivre la cuisson 2 minutes en remuant régulièrement.\n5. Ajouter le riz et les haricots. Prolonger la cuisson de 2 minutes, puis verser le bouillon. Porter à ébullition, couvrir et cuire à feu doux 15 à 18 minutes, jusqu'à ce que le liquide soit complètement absorbé. Retirer du feu et laisser reposer 5 minutes avant de remuer le riz à la fourchette.\n6. Au moment de la cuisson du poulet, égoutter les morceaux en conservant la marinade. Vaporiser une poêle d'huile et la chauffer à feu moyen. Cuire la moitié des morceaux de poulet 4 minutes de chaque côté. Réserver dans une assiette et répéter avec le reste.\n7. Transvider la marinade et l'oignon dans la poêle. Déglacer en raclant le fond de la poêle pour détacher les sucs de cuisson. Ajouter de l'eau au besoin. Chauffer 3 minutes en remuant régulièrement et retirer du feu.\n8. Servir le riz, avec le poulet, les oignons et la coriandre.\n", "macros_par_ingredient": [{"raw": "850 g poitrines de poulet", "grams": 850.0, "kcal": 1020.0, "prot": 191.25, "gluc": 0.0, "lip": 22.27, "canonical": "poulet_poitrine", "status": "ok"}, {"raw": "1 oignon jaune", "grams": 110.0, "kcal": 44.0, "prot": 1.21, "gluc": 10.27, "lip": 0.11, "canonical": "oignon_jaune", "status": "ok"}, {"raw": "30 ml (2 c. à soupe) ail haché en pot", "grams": 17.2, "kcal": 25.7, "prot": 1.1, "gluc": 5.7, "lip": 0.09, "canonical": "ail_pot", "status": "ok"}, {"raw": "15 ml (1 c. à soupe) épices passe-partout", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": "herbes_seches_generic", "status": "skip"}, {"raw": "10 ml (2 c. à thé) cumin", "grams": 4.1, "kcal": 15.2, "prot": 0.72, "gluc": 1.79, "lip": 0.9, "canonical": "cumin", "status": "ok"}, {"raw": "Jus de 3 oranges", "grams": 220.1, "kcal": 99.1, "prot": 1.54, "gluc": 22.89, "lip": 0.44, "canonical": "orange_jus", "status": "ok"}, {"raw": "Jus de 2 limes", "grams": 52.0, "kcal": 13.0, "prot": 0.22, "gluc": 4.38, "lip": 0.04, "canonical": "lime_jus", "status": "ok"}, {"raw": "Jus de 1 citron", "grams": 30.9, "kcal": 6.8, "prot": 0.11, "gluc": 2.13, "lip": 0.07, "canonical": "citron_jus", "status": "ok"}, {"raw": "Sel et poivre", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}, {"raw": "80 ml (1/3 tasse) coriandre fraîche", "grams": 5.4, "kcal": 1.2, "prot": 0.12, "gluc": 0.2, "lip": 0.03, "canonical": "coriandre_fraiche", "status": "ok"}, {"raw": "1 oignon jaune", "grams": 110.0, "kcal": 44.0, "prot": 1.21, "gluc": 10.27, "lip": 0.11, "canonical": "oignon_jaune", "status": "ok"}, {"raw": "1 poivron vert", "grams": 120.0, "kcal": 24.0, "prot": 1.03, "gluc": 5.57, "lip": 0.2, "canonical": "poivron_vert", "status": "ok"}, {"raw": "1 poivron rouge", "grams": 120.0, "kcal": 37.2, "prot": 1.19, "gluc": 7.24, "lip": 0.36, "canonical": "poivron_rouge", "status": "ok"}, {"raw": "15 ml (1 c. à soupe) ail haché en pot", "grams": 8.6, "kcal": 12.8, "prot": 0.55, "gluc": 2.85, "lip": 0.04, "canonical": "ail_pot", "status": "ok"}, {"raw": "250 ml (1 tasse) riz blanc sec", "grams": 211.3, "kcal": 756.6, "prot": 13.74, "gluc": 167.27, "lip": 1.1, "canonical": "riz_blanc_sec", "status": "ok"}, {"raw": "1 conserve de haricots noirs de 540 ml", "grams": 547.8, "kcal": 498.5, "prot": 33.03, "gluc": 90.66, "lip": 1.59, "canonical": "haricots_noirs_conserve", "status": "ok"}, {"raw": "500 ml (2 tasses) bouillon de poulet sans sel ajouté", "grams": 517.7, "kcal": 15.5, "prot": 2.54, "gluc": 1.24, "lip": 0.1, "canonical": "bouillon_poulet", "status": "ok"}]}, {"folder": "Volaille", "filename": "escalopes-poulet-citronnees.md", "id": "Volaille__escalopes-poulet-citronnees", "raw": "---\ntitre: Escalopes de poulet citronnées\nportions: 6\ntemps_prep: 15 min\ntemps_cuisson: 20 min\ntags: [four]\ncertifie_bittle: true\n---\n\n## Ingrédients\n- Un filet d'huile d'olive\n- 250 ml (1 tasse) chapelure panko\n- 15 ml (1 c. à soupe) origan séché (ou fines herbes séchées mélange à l'italienne)\n- 1 ml (1/4 c. à thé) sel\n- 1 pincée de piment de Cayenne moulu\n- 1 citron\n- Poivre\n- 30 ml (2 c. à soupe) moutarde de Dijon\n- 6 escalopes de poulet (environ 450 g / 1 lb, voir notes)\n\n## Préparation\n1. Zester le citron (réservé pour l'étape 2). Couper le citron zesté en 6 quartiers (réservés pour l'étape 4).\n2. Préchauffer le four à 220 °C (425 °F). Placer la grille à la position la plus basse du four. Tapisser une plaque de cuisson de papier parchemin. À l'aide d'un pinceau de cuisine, badigeonner le papier parchemin d'huile.\n3. Dans une assiette creuse, déposer la chapelure, l'origan, le sel, le piment de Cayenne et le zeste de citron. Poivrer généreusement et mélanger avec les doigts.\n4. À l'aide du pinceau de cuisine, badigeonner de moutarde les 2 côtés de chaque escalope. Déposer une escalope dans la chapelure assaisonnée et la retourner pour bien l'enrober. Placer l'escalope panée sur la plaque de cuisson. Répéter l'opération pour les autres escalopes.\n5. Répartir les quartiers de citron autour des escalopes. Cuire au four 20 minutes.\n6. Servir les escalopes et le citron rôti avec des tagliatelles enrobées d'un filet d'huile d'olive et une salade verte. Si désiré, accompagner de mayo à l'ail.\n\n## Notes\n- Se conserve 3 jours au réfrigérateur et 4 mois au congélateur.\n- Astuce : à défaut d'escalopes au supermarché, acheter 2 poitrines de poulet et les couper 2 fois sur l'épaisseur pour former 3 escalopes par poitrine.\n", "macros_par_ingredient": [{"raw": "Un filet d'huile d'olive", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}, {"raw": "250 ml (1 tasse) chapelure panko", "grams": 126.8, "kcal": 486.9, "prot": 17.92, "gluc": 86.84, "lip": 6.95, "canonical": "chapelure", "status": "ok"}, {"raw": "15 ml (1 c. à soupe) origan séché (ou fines herbes séchées mélange à l'italienne)", "grams": 4.6, "kcal": 12.1, "prot": 0.41, "gluc": 3.14, "lip": 0.2, "canonical": "origan_seche", "status": "ok"}, {"raw": "1 ml (1/4 c. à thé) sel", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}, {"raw": "1 pincée de piment de Cayenne moulu", "grams": 0.5, "kcal": 1.6, "prot": 0.06, "gluc": 0.28, "lip": 0.09, "canonical": "cayenne", "status": "ok"}, {"raw": "1 citron", "grams": 60.0, "kcal": 17.4, "prot": 0.66, "gluc": 5.59, "lip": 0.18, "canonical": "citron", "status": "ok"}, {"raw": "Poivre", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}, {"raw": "30 ml (2 c. à soupe) moutarde de Dijon", "grams": 31.6, "kcal": 18.9, "prot": 1.18, "gluc": 1.84, "lip": 1.05, "canonical": "moutarde_dijon", "status": "ok"}, {"raw": "6 escalopes de poulet (environ 450 g / 1 lb, voir notes)", "grams": 2700.0, "kcal": 3240.0, "prot": 607.5, "gluc": 0.0, "lip": 70.74, "canonical": "poulet_poitrine", "status": "ok"}]}, {"folder": "Volaille", "filename": "plaque-poulet-grecque.md", "id": "Volaille__plaque-poulet-grecque", "raw": "---\ntitre: Plaque de poulet à la grecque\nportions: 4\ntemps_prep: 25 min\ntemps_cuisson: 25 min\ntags: [grec, plaque, four]\ncertifie_bittle: true\n---\n\n## Ingrédients\n- 80 ml (1/3 tasse) huile d'olive\n- 60 ml (1/4 tasse) jus de citron\n- 2 gousses d'ail\n- 15 ml (1 c. à soupe) origan séché\n- 7,5 ml (1 1/2 c. à thé) paprika\n- 5 ml (1 c. à thé) sel\n- Poivre, au goût\n- 4 poitrines de poulet\n- 675 g (1 1/2 lb) pommes de terre grelot\n- 2 poivrons rouges\n- 1 oignon rouge\n- 1 citron bien lavé\n- Brins d'aneth (pour garnir)\n\n## Préparation\n1. Hacher l'ail. Couper les pommes de terre grelot en 4 selon la grosseur. Trancher les poivrons rouges. Couper l'oignon rouge en petits quartiers. Couper le citron en 2.\n2. Préchauffer le four à 180 °C (350 °F) et tapisser 1 ou 2 plaques à biscuits de papier parchemin.\n3. Dans un grand bol, mélanger l'huile d'olive, le jus de citron, l'ail, l'origan, le paprika et le sel. Poivrer.\n4. Ajouter le reste des ingrédients (sauf l'aneth) et mélanger.\n5. Répartir le mélange sur la ou les plaques, en laissant de l'espace entre les ingrédients.\n6. Cuire au four 35 minutes. Régler la température à broil et cuire encore 3 minutes en surveillant bien le poulet pour qu'il ne brûle pas.\n7. Garnir de brins d'aneth. Servir avec de la sauce tzatzíki du commerce.\n", "macros_par_ingredient": [{"raw": "80 ml (1/3 tasse) huile d'olive", "grams": 73.0, "kcal": 646.4, "prot": 0.0, "gluc": 0.0, "lip": 73.03, "canonical": "huile_olive", "status": "ok"}, {"raw": "60 ml (1/4 tasse) jus de citron", "grams": 61.9, "kcal": 13.6, "prot": 0.22, "gluc": 4.27, "lip": 0.15, "canonical": "citron_jus", "status": "ok"}, {"raw": "2 gousses d'ail", "grams": 6.0, "kcal": 8.9, "prot": 0.38, "gluc": 1.98, "lip": 0.03, "canonical": "ail_gousse", "status": "ok"}, {"raw": "15 ml (1 c. à soupe) origan séché", "grams": 4.6, "kcal": 12.1, "prot": 0.41, "gluc": 3.14, "lip": 0.2, "canonical": "origan_seche", "status": "ok"}, {"raw": "7,5 ml (1 1/2 c. à thé) paprika", "grams": 3.5, "kcal": 9.9, "prot": 0.49, "gluc": 1.89, "lip": 0.45, "canonical": "paprika", "status": "ok"}, {"raw": "5 ml (1 c. à thé) sel", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}, {"raw": "Poivre, au goût", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}, {"raw": "4 poitrines de poulet", "grams": 800.0, "kcal": 960.0, "prot": 180.0, "gluc": 0.0, "lip": 20.96, "canonical": "poulet_poitrine", "status": "ok"}, {"raw": "675 g (1 1/2 lb) pommes de terre grelot", "grams": 675.0, "kcal": 519.8, "prot": 13.63, "gluc": 117.92, "lip": 0.61, "canonical": "pomme_de_terre", "status": "ok"}, {"raw": "2 poivrons rouges", "grams": 240.0, "kcal": 74.4, "prot": 2.38, "gluc": 14.47, "lip": 0.72, "canonical": "poivron_rouge", "status": "ok"}, {"raw": "1 oignon rouge", "grams": 110.0, "kcal": 44.0, "prot": 1.21, "gluc": 10.27, "lip": 0.11, "canonical": "oignon_jaune", "status": "ok"}, {"raw": "1 citron bien lavé", "grams": 60.0, "kcal": 17.4, "prot": 0.66, "gluc": 5.59, "lip": 0.18, "canonical": "citron", "status": "ok"}, {"raw": "Brins d'aneth (pour garnir)", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}]}, {"folder": "Volaille", "filename": "poitrines-poulet-grecque.md", "id": "Volaille__poitrines-poulet-grecque", "raw": "---\ntitre: Poitrines de poulet à la grecque\nportions: 4\ntemps_prep: 20 min\ntemps_cuisson: 35 min\ntags: [grec, four, marinade]\ncertifie_bittle: true\n---\n\n## Ingrédients\n\n### Marinade\n- 125 ml (1/2 tasse) yogourt grec nature\n- 60 ml (1/4 tasse) huile d'olive\n- 30 ml (2 c. à soupe) jus de citron\n- Zeste de 1 citron\n- 30 ml (2 c. à soupe) origan frais\n- 30 ml (2 c. à soupe) épices grecques\n- 15 ml (1 c. à soupe) ail haché en pot\n- 7,5 ml (1/2 c. à soupe) miel\n- 5 ml (1 c. à thé) moutarde de Dijon\n- 2,5 ml (1/2 c. à thé) concentré de bouillon de poulet liquide\n- 1,25 ml (1/4 c. à thé) sel\n- 1,25 ml (1/4 c. à thé) poivre du moulin\n\n### Poulet\n- 908 g (2 lb) poitrines de poulet\n- Origan frais, pour garnir\n\n## Préparation\n1. Hacher l'origan frais. Zester le citron.\n2. Dans un grand bol, mélanger tous les ingrédients de la marinade : yogourt grec, huile d'olive, zeste et jus de citron, origan, épices grecques, ail, miel, moutarde, concentré de bouillon, sel et poivre.\n3. À l'aide de papier absorbant, éponger l'excédent d'humidité sur les poitrines. Retirer le surplus de gras visible à l'aide d'un couteau bien aiguisé.\n4. Incorporer le poulet à la marinade. Pour un maximum de saveurs, réfrigérer 12 heures.\n5. Préchauffer le four à 205 °C (400 °F).\n6. Transférer le poulet et la marinade dans un grand plat de cuisson légèrement huilé. Badigeonner les morceaux avec le surplus de marinade.\n7. Cuire au four 35 minutes ou jusqu'à ce que le poulet soit complètement cuit, en retournant aux 15 minutes.\n8. Garnir le poulet d'origan frais et servir immédiatement.\n\n## Notes\n- Prévoir 12 heures de marinade au réfrigérateur pour un maximum de saveurs (non comptées dans le temps de préparation).\n- La recette d'origine utilise « zeste de citron » dans les étapes mais ne le listait pas explicitement dans les ingrédients de la marinade — je l'ai ajouté.\n", "macros_par_ingredient": [{"raw": "125 ml (1/2 tasse) yogourt grec nature", "grams": 126.3, "kcal": 87.1, "prot": 12.26, "gluc": 5.05, "lip": 2.53, "canonical": "yogourt_grec", "status": "ok"}, {"raw": "60 ml (1/4 tasse) huile d'olive", "grams": 54.8, "kcal": 484.8, "prot": 0.0, "gluc": 0.0, "lip": 54.78, "canonical": "huile_olive", "status": "ok"}, {"raw": "30 ml (2 c. à soupe) jus de citron", "grams": 30.9, "kcal": 6.8, "prot": 0.11, "gluc": 2.13, "lip": 0.07, "canonical": "citron_jus", "status": "ok"}, {"raw": "Zeste de 1 citron", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}, {"raw": "30 ml (2 c. à soupe) origan frais", "grams": 9.1, "kcal": 24.2, "prot": 0.82, "gluc": 6.29, "lip": 0.39, "canonical": "origan_frais", "status": "ok"}, {"raw": "30 ml (2 c. à soupe) épices grecques", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": "herbes_seches_generic", "status": "skip"}, {"raw": "15 ml (1 c. à soupe) ail haché en pot", "grams": 8.6, "kcal": 12.8, "prot": 0.55, "gluc": 2.85, "lip": 0.04, "canonical": "ail_pot", "status": "ok"}, {"raw": "7,5 ml (1/2 c. à soupe) miel", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": "miel", "status": "skip"}, {"raw": "5 ml (1 c. à thé) moutarde de Dijon", "grams": 5.3, "kcal": 3.2, "prot": 0.2, "gluc": 0.31, "lip": 0.18, "canonical": "moutarde_dijon", "status": "ok"}, {"raw": "2,5 ml (1/2 c. à thé) concentré de bouillon de poulet liquide", "grams": 2.6, "kcal": 0.1, "prot": 0.01, "gluc": 0.01, "lip": 0.0, "canonical": "bouillon_poulet", "status": "ok"}, {"raw": "1,25 ml (1/4 c. à thé) sel", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}, {"raw": "1,25 ml (1/4 c. à thé) poivre du moulin", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}, {"raw": "908 g (2 lb) poitrines de poulet", "grams": 908.0, "kcal": 1089.6, "prot": 204.3, "gluc": 0.0, "lip": 23.79, "canonical": "poulet_poitrine", "status": "ok"}, {"raw": "Origan frais, pour garnir", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}]}, {"folder": "Volaille", "filename": "poivrons-farcis-dinde.md", "id": "Volaille__poivrons-farcis-dinde", "raw": "---\ntitre: Poivrons farcis à la dinde\nportions: 6\ntemps_prep: 10 min\ntemps_cuisson: 35 min\ntags: [italien, four, farci]\ncertifie_bittle: true\n---\n\n## Ingrédients\n- 6 poivrons\n- 45 ml (3 c. à soupe) huile d'olive extra-vierge\n- 3 gousses d'ail\n- 1/2 oignon jaune\n- 2 branches de céleri\n- 450 g (1 lb) dinde hachée\n- 700 ml coulis de tomates\n- 500 ml (2 tasses) jeunes épinards\n- 375 ml (1 1/2 tasse) riz cuit\n- 7,5 ml (1/2 c. à soupe) assaisonnement italien\n- Sel casher et poivre noir moulu, au goût\n- 125 ml (1/2 tasse) fromage Monterey Jack ou cheddar\n- Persil frais (pour garnir)\n\n## Préparation\n1. Hacher l'ail. Couper l'oignon en dés. Couper le céleri en dés. Hacher grossièrement les épinards. Hacher le persil pour la garniture.\n2. Préchauffer le four à 175 °C (350 °F). Couper les poivrons en deux dans le sens de la longueur et retirer les graines et la membrane.\n3. Arroser les poivrons avec 15 ml (1 c. à soupe) d'huile et frotter l'intérieur et l'extérieur pour bien les enrober. Disposer à l'envers dans deux plats de cuisson ou sur une grande plaque, puis précuire 15 minutes.\n4. Pendant ce temps, faire chauffer les 30 ml (2 c. à soupe) d'huile restantes dans une grande poêle à feu moyen-vif. Faire revenir l'oignon et l'ail environ 2 minutes, jusqu'à ce qu'ils soient légèrement attendris. Ajouter le céleri et cuire environ 2 minutes.\n5. Ajouter la dinde hachée et faire cuire jusqu'à ce qu'elle soit bien dorée, en la défaisant avec une spatule au besoin.\n6. Égoutter l'excédent de liquide, puis incorporer le coulis de tomates, le riz, les épinards, l'assaisonnement italien, le sel et le poivre. Mélanger 1 à 2 minutes, jusqu'à ce que les épinards tombent.\n7. Retirer les poivrons du four et les retourner avec des pinces. Farcir du mélange de dinde, puis parsemer de fromage. Remettre au four et cuire 15 à 20 minutes, ou jusqu'à ce que les poivrons soient tendres.\n8. Avant de servir, garnir de persil.\n\n## Notes\n- L'étape 4 de la recette originale parlait du « bœuf haché », mais l'ingrédient principal est la dinde — j'ai corrigé.\n", "macros_par_ingredient": [{"raw": "6 poivrons", "grams": 720.0, "kcal": 223.2, "prot": 7.13, "gluc": 43.42, "lip": 2.16, "canonical": "poivron_generic", "status": "ok"}, {"raw": "45 ml (3 c. à soupe) huile d'olive extra-vierge", "grams": 41.1, "kcal": 363.6, "prot": 0.0, "gluc": 0.0, "lip": 41.08, "canonical": "huile_olive", "status": "ok"}, {"raw": "3 gousses d'ail", "grams": 9.0, "kcal": 13.4, "prot": 0.57, "gluc": 2.98, "lip": 0.04, "canonical": "ail_gousse", "status": "ok"}, {"raw": "1/2 oignon jaune", "grams": 55.0, "kcal": 22.0, "prot": 0.61  de poivre. Dans une grande poêle en fonte émaillée ou antiadhésive, chauffer 30 ml (2 c. à soupe) d'huile d'olive à feu moyen-élevé et saisir les poitrines 4 minutes de chaque côté, jusqu'à ce qu'elles soient bien dorées. Réserver dans une assiette.\n3. Dans la même poêle, chauffer le reste de l'huile à feu élevé et faire revenir les asperges 2 minutes maximum en brassant souvent. Réserver dans l'assiette avec le poulet.\n4. Réduire le feu à moyen et ajouter les échalotes françaises. Cuire environ 3 minutes en brassant souvent.\n5. Ajouter l'ail, le romarin et les graines de fenouil, et cuire encore 1 minute en brassant.\n6. Déglacer avec le vinaigre de xérès et le vin blanc, et cuire 2 minutes en brassant, jusqu'à ce que le liquide soit presque complètement évaporé.\n7. Ajouter le bouillon de poulet, la moutarde de Dijon, le parmesan et le sel en brassant au fouet. Remettre les poitrines dans la poêle et cuire encore 5 minutes, à couvert, ou jusqu'à ce que les poitrines soient cuites.\n8. Ajouter les épinards et le mélange de crème de soya et d'eau, et bien brasser. Remettre les asperges et cuire encore 2 minutes, jusqu'à ce que les épinards soient tombés et que la sauce épaississe.\n9. Poivrer, garnir d'estragon et saupoudrer de fleur de sel.\n\n## Notes\n- La recette originale présente quelques incohérences : la liste d'ingrédients indiquait « vinaigre de vin rouge » mais les étapes parlent de « xérès » (j'ai gardé xérès). De même, « parmesan » dans la liste vs « levure alimentaire » dans les étapes — j'ai gardé parmesan en mentionnant l'alternative sans produits laitiers.\n- L'estragon en garniture n'apparaissait pas dans la liste d'origine mais est mentionné à l'étape finale.\n", "macros_par_ingredient": [{"raw": "4 poitrines de poulet désossées et sans peau", "grams": 800.0, "kcal": 960.0, "prot": 180.0, "gluc": 0.0, "lip": 20.96, "canonical": "poulet_poitrine", "status": "ok"}, {"raw": "Sel et poivre", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "li 0 ml (3 tasses, 75 g) bébés épinards", "grams": 95.1, "kcal": 21.9, "prot": 2.72, "gluc": 3.45, "lip": 0.37, "canonical": "epinards", "status": "ok"}, {"raw": "250 ml (1 tasse) crème de soya ou d'avoine de type Belsoy + 60 ml (1/4 tasse) eau très chaude", "grams": 258.9, "kcal": 139.8, "prot": 8.47, "gluc": 16.26, "lip": 4.53, "canonical": "creme_soya", "status": "ok"}, {"raw": "Estragon frais et fleur de sel, pour garnir", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}]}, {"folder": "Volaille", "filename": "poulet-cremeux-poivrons-rotis.md", "id": "Volaille__poulet-cremeux-poivrons-rotis", "raw": "---\ntitre: Poulet sauce crémeuse aux poivrons rôtis\nportions: 4\ntemps_prep: 20 min\ntemps_cuisson: 25 min\ntags: [méditerranéen, poêle, four, sauce-cremeuse]\ncertifie_bittle: true\n---\n\n## Ingrédients\n\n### Sauce crémeuse aux poivrons rôtis\n- 1 pot de 340 ml poivrons rôtis, bien égouttés\n- 250 ml (1 tasse) lait de coco en conserve, bien brassé\n- 15 ml (1 c. à soupe) vinaigre de vin rouge\n- 2 gousses d'ail\n- 5 ml (1 c. à thé) paprika\n- 5 ml (1 c. à thé) origan séché\n- 5 ml (1 c. à thé) sel\n- 60 ml (1/4 tasse, 5 g) persil frais\n\n### Poulet\n- 4 poitrines de poulet, sans la peau\n- Sel et poivre, au goût\n- 30 ml (2 c. à soupe) huile d'olive\n- 1 oignon\n- 1 poivron rouge\n- 60 ml (1/4 tasse, 10 g) persil frais (pour garnir)\n\n## Préparation\n1. Hacher le persil (sauce et garniture). Émincer l'oignon. Émincer le poivron rouge.\n2. Dans un mélangeur, mixer tous les ingrédients de la sauce jusqu'à l'obtention d'un mélange plus ou moins lisse. Réserver.\n3. Préchauffer le four à 200 °C (400 °F) et placer la grille au centre.\n4. Saler et poivrer le poulet. Dans une grande poêle antiadhésive, chauffer l'huile à feu élevé et dorer les poitrines 3 minutes de chaque côté. Réserver dans une assiette.\n5. Baisser le feu à moyen, ajouter les oignons et les faire dorer 6 minutes en brassant souvent.\n6. Ajouter le poivron rouge et cuire encore 1 minute seulement.\n7. Remettre le poulet dans la poêle et arroser de sauce crémeuse aux poivrons rôtis. Cuire au four 15 minutes.\n8. À la sortie du four, ajouter le persil. Servir avec des pâtes à l'huile d'olive et ciboulette ou avec un riz blanc.\n", "macros_par_ingredient": [{"raw": "1 pot de 340 ml poivrons rôtis, bien égouttés", "grams": 201.2, "kcal": 36.2, "prot": 1.61, "gluc": 7.85, "lip": 0.6, "canonical": "poivrons_rotis", "status": "ok"}, {"raw": "250 ml (1 tasse) lait de coco en conserve, bien brassé", "grams": 238.8, "kcal": 470.4, "prot": 4.82, "gluc": 6.71, "lip": 50.94, "canonical": "lait_coco", "status": "ok"}, {"raw": "15 ml (1 c. à soupe) vinaigre de vin rouge", "grams": 15.2, "kcal": 2.7, "prot": 0.0, "gluc": 0.01, "lip": 0.0, "canonical": "vinaigre_blanc", "status": "ok"}, {"raw": "2 gousses d'ail", "grams": 6.0, "kcal": 8.9, "prot": 0.38, "gluc": 1.98, "lip": 0.03, "canonical": "ail_gousse", "status": "ok"}, {"raw": "5 ml (1 c. à thé) paprika", "grams": 2.3, "kcal": 6.6, "prot": 0.33, "gluc": 1.26, "lip": 0.3, "canonical": "paprika", "status": "ok"}, {"raw": "5 ml (1 c. à thé) origan séché", "grams": 1.5, "kcal": 4.0, "prot": 0.14, "gluc": 1.05, "lip": 0.07, "canonical": "origan_seche", "status": "ok"}, {"raw": "5 ml (1 c. à thé) sel", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}, {"raw": "60 ml (1/4 tasse, 5 g) persil frais", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}, {"raw": "4 poitrines de poulet, sans la peau", "grams": 800.0, "kcal": 960.0, "prot": 180.0, "gluc": 0.0, "lip": 20.96, "canonical": "poulet_poitrine", "status": "ok"}, {"raw": "Sel et poivre, au goût", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}, {"raw": "30 ml (2 c. à soupe) huile d'olive", "grams": 27.4, "kcal": 242.4, "prot": 0.0, "gluc": 0.0, "lip": 27.39, "canonical": encore 1 minute, jusqu'à ce que les arômes se dégagent.\n6. Ajouter les épinards et faire sauter encore 1 minute, juste le temps qu'ils commencent à flétrir.\n7. Ajouter la crème épaisse et le parmesan. Mélanger bien et laisser la sauce mijoter.\n8. Remettre le poulet dans la poêle et laisser cuire dans la sauce environ 5 minutes, jusqu'à ce qu'il soit bien chaud.\n", "macros_par_ingredient": [{"raw": "4 poitrines de poulet désossées et sans peau (environ 170 g chacune)", "grams": 680.0, "kcal": 816.0, "prot": 153.0, "gluc": 0.0, "lip": 17.82, "canonical": "poulet_poitrine", "status": "ok"}, {"raw": "5 ml (1 c. à thé) assaisonnement italien (ou un mélange d'épices comme l'origan, le thym, le basilic et le romarin)", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": "herbes_seches_generic", "status": "skip"}, {"raw": "5 ml (1 c. à thé) sel casher", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}, {"raw": "2,5 ml (1/2 c. à thé) poivre noir fraîchement moulu", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}, {"raw": "45 ml (3 c. à soupe) huile d'olive extra vierge", "grams": 41.1, "kcal": 363.6, "prot": 0.0, "gluc": 0.0, "lip": 41.08, "canonical": "huile_olive", "status": "ok"}, {"raw": "4 gousses d'ail", "grams": 12.0, "kcal": 17.9, "prot": 0.76, "gluc": 3.97, "lip": 0.06, "canonical": "ail_gousse", "status": "ok"}, {"raw": "60 ml (1/4 tasse) oignon jaune", "grams": 40.6, "kcal": 16.2, "prot": 0.45, "gluc": 3.79, "lip": 0.04, "canonical": "oignon_jaune", "status": "ok"}, {"raw": "125 ml (1/2 tasse) tomates séchées", "grams": 58.1, "kcal": 123.8, "prot": 2.94, "gluc": 13.56, "lip": 8.18, "canonical": "tomates_sechees", "status": "ok"}, {"raw": "500 ml (2 tasses) jeunes pousses d'épinards", "grams": 63.4, "kcal": 14.6, "prot": 1.81, "gluc": 2.3, "lip": 0.25, "canonical": "epinards", "status": "ok"}, {"raw": "375 ml (1 1/2 tasse) crème épaisse", "grams": 377.2, "kcal": 1237.3, "prot": 7.88, "gluc": 10.75, "lip": 132.03, "canonical": "creme_35", "status": "ok"}, {"raw": "60 ml (1/4 tasse) parmesan fraîchement râpé", "grams": 25.4, "kcal": 106.5, "prot": 7.21, "gluc": 3.53, "lip": 7.06, "canonical": "parmesan", "status": "ok"}]}, {"folder": "Volaille", "filename": "poulet-noix-cajou.md", "id": "Volaille__poulet-noix-cajou", "raw": "---\ntitre: Poulet aux noix de cajou\nportions: 5\ntemps_prep: 10 min\ntemps_cuisson: 1 h\ntags: [four, asiatique]\ncertifie_bittle: true\n---\n\n## Ingrédients\n- 125 ml (1/2 tasse) sauce chili\n- 60 ml (1/4 tasse) cassonade légèrement tassée\n- 60 ml (1/4 tasse) vinaigre de riz\n- 30 ml (2 c. à soupe) ail haché en pot (ou 6 gousses d'ail)\n- 15 ml (1 c. à soupe) sauce soya réduite en sodium\n- 15 ml (1 c. à soupe) gingembre haché en pot\n- 12 pilons de poulet sans la peau (environ 1,5 kg / 3 lb)\n- 125 ml (1/2 tasse) noix de cajou naturelles\n- 2 oignons verts\n\n## Préparation\n1. Trancher finement les oignons verts en biseau. Si vous utilisez des gousses d'ail fraîches : les hacher finement.\n2. Préchauffer le four à 200 °C (400 °F). Placer la grille au centre du four.\n3. Dans un plat rectangulaire allant au four de 23 cm x 33 cm (9 po x 13 po), mélanger la sauce chili, la cassonade, le vinaigre, l'ail, la sauce soya et le gingembre. Ajouter les pilons et mélanger de nouveau pour bien les enrober. Répartir les noix de cajou dans le plat.\n4. Cuire au four à découvert 1 heure ou jusqu'à ce que la chair se détache bien de l'os. Retourner les pilons à mi-cuisson.\n5. Garnir d'oignons verts et servir avec un riz basmati et des légumes.\n\n## Notes\n- 4 à 6 portions de 2 ou 3 pilons (5 portions retenu en moyenne).\n- Se conserve 3 jours au réfrigérateur ou 4 mois au congélateur, sans la garniture.\n- Choisir des noix de cajou naturelles non rôties dans l'huile.\n- Astuce : les pilons sans la peau coûtent ~0,20 $ de plus mais épargnent le travail de retrait et coupent le gras de moitié.\n", "macros_par_ingredient": [{"raw": "125 ml (1/2 tasse) sauce chili", "grams": 126.7, "kcal": 26.6, "prot": 1.14, "gluc": 4.94, "lip": 0.76, "canonical": "sauce_chili", "status": "ok"}, {"raw": "60 ml (1/4 tasse) cassonade légèrement tassée", "grams": 36.8, "kcal": 139.7, "prot": 0.04, "gluc": 36.07, "lip": 0.0, "canonical": "cassonade", "status": "ok"}, {"raw": "60 ml (1/4 tasse) vinaigre de riz", "grams": 60.9, "kcal": 11.0, "prot": 0.0, "gluc": 0.02, "lip": 0.0, "canonical": "vinaigre_riz", "status": "ok"}, {"raw": "30 ml (2 c. à soupe) ail haché en pot (ou 6 gousses d'ail)", "grams": 17.2, "kcal": 25.7, "prot": 1.1, "gluc": 5.7, "lip": 0.09, "canonical": "ail_pot", "status": "ok"}, {"raw": "15 ml (1 c. à soupe) sauce soya réduite en sodium", "grams": 14.7, "kcal": 13.2, "prot": 1.2, "gluc": 2.12, "lip": 0.05, "canonical": "sauce_soya", "status": "ok"}, {"raw": "15 ml (1 c. à soupe) gingembre haché en pot", "grams": 6.1, "kcal": 4.9, "prot": 0.11, "gluc": 1.08, "lip": 0.05, "canonical": "gingembre_frais", "status": "ok"}, {"raw": "12 pilons de poulet sans la peau (environ 1,5 kg / 3 lb)", "grams": 18000.0, "kcal": 21600.0, "prot": 4050.0, "gluc": 0.0, "lip": 471.6, "canonical": "poulet_pilon", "status": "ok"}, {"raw": "125 ml (1/2 tasse) noix de cajou naturelles", "grams": 72.4, "kcal": 415.5, "prot": 11.08, "gluc": 23.66, "lip": 33.55, "canonical": "noix_cajou", "status": "ok"}, {"raw": "2 oignons verts", "grams": 30.0, "kcal": 10.2, "prot": 0.57, "gluc": 1.95, "lip": 0.12, "canonical": "oignon_vert", "status": "ok"}]}, {"folder": "Volaille", "filename": "poulet-shish-taouk.md", "id": "Volaille__poulet-shish-taouk", "raw": "---\ntitre: Poulet shish taouk\nportions: 8\ntemps_prep: 15 min\ntemps_cuisson: 15 min\ntags: [libanais, poêle, rapide]\ncertifie_bittle: true\n---\n\n## Ingrédients\n- 375 ml (1 1/2 tasse) yogourt nature\n- Le zeste et le jus de 1 citron\n- 30 ml (2 c. à soupe) beurre de sésame (tahini)\n- 30 ml (2 c. à soupe) ail haché en pot (ou 6 gousses d'ail)\n- 5 ml (1 c. à thé) cumin moulu\n- 5 ml (1 c. à thé) thym séché\n- Poivre et sel\n- 80 ml (1/3 tasse) mayonnaise allégée\n- 750 g (1 2/3 lb) poitrines de poulet désossées (environ 4 petites poitrines)\n- 5 ml (1 c. à thé) huile de canola\n- 1 citron (facultatif, pour le service)\n\n## Préparation\n1. Zester et presser le citron de la marinade. Couper le citron du service en quartiers (si utilisé). Si vous utilisez des gousses d'ail fraîches : les hacher finement.\n2. Dans un grand bol, préparer la marinade en mélangeant le yogourt, le zeste et le jus de citron, le beurre de sésame, l'ail et les épices. Poivrer généreusement et ajouter une pincée de sel.\n3. Prélever 250 ml (1 tasse) de la marinade et la transvider dans un bol moyen. Incorporer la mayonnaise et réserver cette sauce pour le service.\n4. Couper le poulet en 2 ou en 3 sur le sens de l'épaisseur pour obtenir des tranches de 1,5 cm (1/2 po). Ajouter le poulet dans le bol de marinade et bien mélanger.\n5. À l'aide d'un pinceau de cuisine, badigeonner d'huile un poêlon strié antiadhésif et préchauffer à feu moyen. Retirer l'excédent de marinade sur le poulet en le raclant avec le dos d'un couteau et déposer le poulet dans le poêlon. Cuire 5 ou 6 minutes de chaque côté. Au besoin, procéder en deux temps selon la taille du poêlon.\n6. Servir avec la sauce réservée et des quartiers de citron. Accompagner de riz et de salade fattouche, ou servir dans un pita garni de laitue, de concombres et de tomates.\n\n## Notes\n- Se conserve 3 jours au réfrigérateur ou 3 mois au congélateur.\n- En cas d'allergie au sésame : remplacer le tahini par du beurre de soya (de type Wowbutter).\n", "macros_par_ingredient": [{"raw": "375 ml (1 1/2 tasse) yogourt nature", "grams": 378.8, "kcal": 261.4, "prot": 36.78, "gluc": 15.15, "lip": 7.58, "canonical": "yogourt_nature", "status": "ok"}, {"raw": "Le zeste et le jus de 1 citron", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": se de poulet désossés, sans la peau (environ 800 g / 1 3/4 lb)\n- Poivre et sel\n- 30 ml (2 c. à soupe) feuilles de thym frais (3 ou 4 branches)\n\n## Préparation\n1. Hacher l'oignon. Si vous utilisez des gousses d'ail fraîches : les hacher finement.\n2. Préchauffer le four à 180 °C (350 °F). Placer la grille au centre du four.\n3. Dans un grand poêlon allant au four, mélanger le bouillon, le riz, l'oignon et l'ail.\n4. Zester les 2 citrons au-dessus du poêlon, puis ajouter le jus du premier citron. Mélanger.\n5. Couper le deuxième citron en tranches de 1 cm (3/8 po) d'épaisseur.\n6. Répartir le poulet et les tranches de citron sur le riz et le bouillon, sans mélanger. Poivrer généreusement et ajouter une pincée de sel.\n7. Couvrir et cuire au four 30 minutes.\n8. Poursuivre la cuisson 30 minutes à découvert.\n9. Compléter la cuisson sous le gril (broil) 5 à 7 minutes ou jusqu'à ce que le poulet et le citron soient grillés.\n10. Garnir de thym. Servir accompagné d'une salade verte.\n\n## Notes\n- Se conserve 4 jours au réfrigérateur ou 3 mois au congélateur.\n- Choisir le riz étuvé (aussi appelé « converti » ou « conditionné »), qui reste ferme et devient moins collant à la cuisson que le riz blanc à grains longs régulier. À ne pas confondre avec le riz minute (instantané, précuit ou à cuisson rapide) ni avec le riz prêt à servir (express).\n- Temps de préparation estimé (la valeur n'était pas visible sur la photo originale).\n", "macros_par_ingredient": [{"raw": "750 ml (3 tasses) bouillon de poulet réduit en sodium", "grams": 776.5, "kcal": 23.3, "prot": 3.8, "gluc": 1.86, "lip": 0.16, "canonical": "bouillon_poulet", "status": "ok"}, {"raw": "375 ml (1 1/2 tasse) riz blanc étuvé à grains longs", "grams": 317.0, "kcal": 1134.8, "prot": 20.6, "gluc": 250.9, "lip": 1.65, "canonical": "riz_blanc_sec", "status": "ok"}, {"raw": "1 oignon jaune", "grams": 110.0, "kcal": 44.0, "prot": 1.21, "gluc": 10.27, "lip": 0.11, "canonical": "oignon_jaune", "status": "ok"}, {"raw": "15 ml (1 c. à soupe) ail haché en pot (ou 3 gousses d'ail)", "grams": 8.6, "kcal": 12.8, "prot": 0.55, "gluc": 2.85, "lip": 0.04, "canonical": "ail_pot", "status": "ok"}, {"raw": "2 citrons", "grams": 120.0, "kcal": 34.8, "prot": 1.32, "gluc": 11.18, "lip": 0.36, "canonical": "citron", "status": "ok"}, {"raw": "12 hauts de cuisse de poulet désossés, sans la peau (environ 800 g / 1 3/4 lb)", "grams": 9600.0, "kcal": 11520.0, "prot": 2160.0, "gluc": 0.0, "lip": 251.52, "canonical": "poulet_haut_cuisse", "status": "ok"}, {"raw": "Poivre et sel", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}, {"raw": "30 ml (2 c. à soupe) feuilles de thym frais (3 ou 4 branches)", "grams": 4.9, "kcal": 4.9, "prot": 0.27, "gluc": 1.2, "lip": 0.08, "canonical": "thym_frais", "status": "ok"}]}, {"folder": "Volaille", "filename": "roulades-poulet-tomates-sechees.md", "id": "Volaille__roulades-poulet-tomates-sechees", "raw": "---\ntitre: Roulades de poulet aux tomates séchées\nportions: 6\ntemps_prep: 10 min\ntemps_cuisson: 15 min\ntags: [poêle]\ncertifie_bittle: true\n---\n\n## Ingrédients\n- 6 escalopes de poulet ou de dindon (environ 450 g / 1 lb, voir notes)\n- 500 ml (2 tasses) jeunes épinards\n- 125 ml (1/2 tasse) tomates séchées dans l'huile\n- 125 ml (1/2 tasse) fromage de chèvre non affiné à pâte molle\n- Poivre et sel\n- 5 ml (1 c. à thé) huile de canola\n\n## Préparation\n1. Égoutter et trancher les tomates séchées.\n2. Déposer les escalopes sur un plan de travail propre et les recouvrir d'épinards. Au centre et sur toute la longueur des escalopes, ajouter les tomates séchées et le fromage en s'assurant que les garnitures ne débordent pas.\n3. Rouler les escalopes sur la longueur. Insérer profondément un cure-dent pour maintenir chaque roulade fermée. Poivrer généreusement et ajouter une pincée de sel.\n4. Dans un grand poêlon antiadhésif, chauffer l'huile à feu moyen. Cuire les roulades 5 minutes sur le premier côté. Retourner et poursuivre la cuisson 5 minutes. Retourner sur le troisième côté et cuire encore 5 minutes. La viande doit être dorée sur toute la surface et cuite à l'intérieur. Pour servir, accompagner de riz, si désiré.\n\n## Notes\n- Se conserve 3 jours au réfrigérateur ou 3 mois au congélateur.\n- S'assurer d'avoir des escalopes assez minces, environ 0,5 cm (1/4 po) d'épaisseur. Si trop épaisses, les placer entre deux pellicules de plastique et les frapper avec un verre robuste à fond plat.\n- Astuce : badigeonner d'huile la surface du poêlon au pinceau pour utiliser moins de matières grasses.\n- Variante : remplacer le fromage de chèvre par un fromage de lait de vache et de chèvre non affiné à pâte molle (goût plus doux).\n", "macros_par_ingredient": [{"raw": "6 escalopes de poulet ou de dindon (environ 450 g / 1 lb, voir notes)", "grams": 2700.0, "kcal": 3240.0, "prot": 607.5, "gluc": 0.0, "lip": 70.74, "canonical": "poulet_poitrine", "status": "ok"}, {"raw": "500 ml (2 tasses) jeunes épinards", "grams": 63.4, "kcal": 14.6, "prot": 1.81, "gluc": 2.3, "lip": 0.25, "canonical": "epinards", "status": "ok"}, {"raw": "125 ml (1/2 tasse) tomates séchées dans l'huile", "grams": 58.1, "kcal": 123.8, "prot": 2.94, "gluc": 13.56, "lip": 8.18, "canonical": "tomates_sechees", "status": "ok"}, {"raw": "125 ml (1/2 tasse) fromage de chèvre non affiné à pâte molle", "grams": 69.7, "kcal": 283.1, "prot": 16.76, "gluc": 0.93, "lip": 23.59, "canonical": "fromage_chevre", "status": "ok"}, {"raw": "Poivre et sel", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}, {"raw": "5 ml (1 c. à thé) huile de canola", "grams": 4.6, "kcal": 40.8, "prot": 0.0, "gluc": 0.0, "lip": 4.61, "canonical": "huile_canola", "status": "ok"}]}, {"folder": "Volaille", "filename": "salade-asiatique-chou-nappa.md", "id": "Volaille__salade-asiatique-chou-nappa", "raw": "---\ntitre: Salade asiatique de chou nappa au poulet grillé\nportions: 6\ntemps_prep: 20 min\ntemps_cuisson: 6 min\ntags: [asiatique, salade, poêle, rapide]\ncertifie_bittle: true\n---\n\n## Ingrédients\n\n### Vinaigrette\n- 125 ml (1/2 tasse) jus d'orange pur\n- 60 ml (1/4 tasse) vinaigre de riz\n- 30 ml (2 c. à soupe) pâte de miso\n- 30 ml (2 c. à soupe) huile de sésame grillé\n- 10 ml (2 c. à thé) ail haché en pot\n- 10 ml (2 c. à thé) gingembre haché en pot\n- 10 ml (2 c. à thé) miel du Québec\n- 5 ml (1 c. à thé) sauce piquante sriracha\n\n### Salade\n- 2 poitrines de poulet désossées (450 g / 1 lb)\n- 1/2 chou chinois nappa moyen\n- 1/4 chou rouge moyen\n- 500 ml (2 tasses) pois mange-tout\n- 250 ml (1 tasse) menthe fraîche\n- 250 ml (1 tasse) coriandre fraîche\n- 3 grosses carottes\n- 3 oignons verts\n\n### Garniture\n- 250 ml (1 tasse) nouilles frites chow mein\n- 30 ml (2 c. à soupe) graines de sésame grillées\n\n## Préparation\n1. Couper le poulet en biseau. Trancher finement les choux nappa et rouge. Couper les pois mange-tout en biseau. Hacher la menthe et la coriandre. Couper les carottes en julienne (ou les râper). Hacher les oignons verts.\n2. Dans un grand bol de service, mélanger tous les ingrédients de la vinaigrette.\n3. Dans un bol moyen, déposer le poulet. Prélever 80 ml (1/3 tasse) de la vinaigrette, verser sur le poulet et remuer pour bien l'enrober. Réserver.\n4. Déposer les légumes et les herbes fraîches dans le bol de service, puis mélanger pour enrober de vinaigrette.\n5. Dans un poêlon strié antiadhésif préchauffé à feu moyen-vif, griller le poulet mariné 2 ou 3 minutes de chaque côté. Au besoin, procéder en 2 temps selon la taille du poêlon.\n6. Déposer le poulet sur les légumes, puis garnir de nouilles frites et de graines de sésame. Servir avec des vermicelles de riz.\n\n## Notes\n- Se conserve 4 jours au réfrigérateur sans la garniture, ne se congèle pas.\n- Les nouilles frites chow mein apportent du croquant à la salade ; on n'en utilise qu'une poignée pour la salade complète, ce qui ajoute donc très peu de gras.\n- Le chou nappa est polyvalent : cru en salade ou en wrap pour profiter de sa texture croquante, ou cuit dans un sauté.\n", "macros_par_ingredient": [{"raw": "125 ml (1/2 tasse) jus d'orange pur", "grams": 131.0, "kcal": 59.0, "prot": 0.92, "gluc": 13.63, "lip": 0.26, "canonical": "orange_jus", "status": "ok"}, {"raw": "60 ml (1/4 tasse) vinaigre de riz", "grams": 60.9, "kcal": 11.0, "prot": 0.0, "gluc": 0.02, "lip": 0.0, "canonical": "vinaigre_riz", "status": "ok"}, {"raw": "30 ml (2 c. à soupe) pâte de miso", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": "pate_miso", "status": "skip"}, {"raw": "30 ml (2 c. à soupe) huile de sésame grillé", "grams": 27.6, "kcal": 244.6, "prot": 0.0, "gluc": 0.0, "lip": 27.64, "canonical": "huile_sesame", "status": "ok"}, {"raw": "10 ml (2 c. à thé) ail haché en pot", "grams": 5.7, "kcal": 8.6, "prot": 0.37, "gluc": 1.9, "lip": 0.03, "canonical": "ail_pot", "status": "ok"}, {"raw": "10 ml (2 c. à thé) gingembre haché en pot", "grams": 4.1, "kcal": 3.2, "prot": 0.07, "gluc": 0.72, "lip": 0.03, "canonical": "gingembre_frais", "status": "ok"}, {"raw": "10 ml (2 c. à thé) miel du Québec", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": "miel", "status": "skip"}, {"raw": "5 ml (1 c. à thé) sauce piquante sriracha", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}, {"raw": "2 poitrines de poulet désossées (450 g / 1 lb)", "grams": 900.0, "kcal": 1080.0, "prot": 202.5, "gluc": 0.0, "lip": 23.58, "canonical": "poulet_poitrine", "status": "ok"}, {"raw": "1/2 chou chinois nappa moyen", "grams": 400.0, "kcal": 56.0, "prot": 3.6, "gluc": 11.88, "lip": 0.56, "canonical": "chou_nappa", "status": "ok"}, {"raw": "1/4 chou rouge moyen", "grams": 225.0, "kcal": 69.8, "prot": 3.22, "gluc": 16.58, "lip": 0.36, "canonical": "chou_rouge", "status": "ok"}, {"raw": "500 ml (2 tasses) pois mange-tout", "grams": 133.1, "kcal": 55.9, "prot": 3.73, "gluc": 10.05, "lip": 0.27, "canonical": "pois_mange_tout", "status": "ok"}, {"raw": "250 ml (1 tasse) menthe fraîche", "grams": 27.0, "kcal": 18.9, "prot": 1.01, "gluc": 4.03, "lip": 0.25, "canonical": "menthe_fraiche", "status": "ok"}, {"raw": "250 ml (1 tasse) coriandre fraîche", "grams": 16.9, "kcal": 3.9, "prot": 0.36, "gluc": 0.62, "lip": 0.09, "canonical": "coriandre_fraiche", "status": "ok"}, {"raw": "3 grosses carottes", "grams": 180.0, "kcal": 73.8, "prot": 1.67, "gluc": 17.24, "lip": 0.43, "canonical": "carotte", "status": "ok"}, {"raw": "3 oignons verts", "grams": 45.0, "kcal": 15.3, "prot": 0.85, "gluc": 2.93, "lip": 0.18, "canonical": "oignon_vert", "status": "ok"}, {"raw": "250 ml (1 tasse) nouilles frites chow mein", "grams": 47.5, "kcal": 225.9, "prot": 3.86, "gluc": 34.61, "lip": 7.34, "canonical": "nouilles_chow_mein", "status": "ok"}, {"raw": "30 ml (2 c. à soupe) graines de sésame grillées", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}]}, {"folder": "Volaille", "filename": "salade-ete-poulet-croustillant-erable.md", "id": "Volaille__salade-ete-poulet-croustillant-erable", "raw": "---\ntitre: Salade d'été au poulet croustillant piquant à l'érable\nportions: 4\ntemps_prep: 40 min\ntemps_cuisson: 20 min\ntags: [salade, four]\ncertifie_bittle: true\n---\n\n## Ingrédients\n\n### Poulet croustillant à l'érable\n- 80 ml (1/3 tasse) mayonnaise\n- 80 ml (1/3 tasse) yogourt grec nature\n- 5 ml (1 c. à thé) paprika\n- 2,5 ml (1/2 c. à thé) paprika fumé\n- 1 gousse d'ail\n- 375 ml (1 1/2 tasse, 210 g) chapelure\n- 2,5 ml (1/2 c. à thé) sel\n- 3 poitrines de poulet\n- 15 ml (1 c. à soupe) sauce piquante sriracha\n- 80 ml (1/3 tasse) sirop d'érable\n\n### Vinaigrette crémeuse au citron et à l'ail\n- 250 ml (1 tasse) crème de soya Belsoy\n- Zeste de 1 citron\n- 45 ml (3 c. à soupe) jus de citron\n- 15 ml (1 c. à soupe) vinaigre de vin blanc\n- 1 gousse d'ail\n- 15 ml (1 c. à soupe) moutarde de Dijon\n- 15 ml (1 c. à soupe) câpres\n- 3,75 ml (3/4 c. à thé) sel\n- Poivre, au goût\n\n### Salade\n- 180 g laitue iceberg\n- 180 g laitue romaine\n- 4 concombres libanais\n- 2 oignons verts\n- 300 g tomates cerises\n- 1 pomme rouge\n- 45 g basilic frais\n\n## Préparation\n1. Couper le poulet en cubes. Hacher les 2 gousses d'ail (1 pour le poulet, 1 pour la vinaigrette). Zester le citron et en presser le jus. Hacher grossièrement les câpres. Hacher grossièrement les laitues iceberg et romaine. Couper les concombres en petits cubes. Hacher grossièrement les oignons verts. Couper les tomates cerises en 4. Couper la pomme en petits cubes. Hacher grossièrement le basilic.\n2. Préchauffer le four à 230 °C (450 °F) et tapisser une plaque à biscuits de papier parchemin.\n3. Dans une première assiette, mélanger la mayonnaise, le yogourt, le paprika, le paprika fumé et l'ail. Dans une deuxième assiette, déposer la chapelure et le sel.\n4. Badigeonner les cubes de poulet avec le mélange de mayonnaise et les enrober de chapelure en pressant bien sur toute la surface. Déposer sur la plaque. À l'aide d'un pinceau, badigeonner doucement le dessus d'un peu d'huile.\n5. Cuire au four 15 à 18 minutes ou jusqu'à ce que les cubes soient bien dorés. Laisser tiédir 5 minutes sur la plaque.\n6. Dans un bol, mélanger le sirop d'érable et la sriracha. Badigeonner les cubes de poulet du mélange.\n7. Dans un petit bol, à l'aide d'un fouet, mélanger tous les ingrédients de la vinaigrette.\n8. Dans un grand bol, mélanger tous les ingrédients de la salade avec la vinaigrette. Servir avec le poulet croustillant.\n\n## Notes\n- L'étape « mélanger mayonnaise + paprika + ail » de la recette originale ne mentionnait pas le yogourt grec, mais il est dans la liste d'ingrédients de l'enrobage — je l'ai inclus dans le mélange.\n", "macros_par_ingredient": [{"raw": "80 ml (1/3 tasse) mayonnaise", "grams": 74.4, "kcal": 505.8, "prot": 0.71, "gluc": 0.42, "lip": 55.68, "canonical": "mayonnaise", "status": "ok"}, {"raw": "80 ml (1/3 tasse) yogourt grec nature", "grams": 80.8, "kcal": 55.8, "prot": 7.85, "gluc": 3.23, "lip": 1.62, "canonical": "yogourt_grec", "status": "ok"}, {"raw": "5 ml (1 c. à thé) paprika", "grams": 2.3, "kcal": 6.6, "prot": 0.33, "gluc": 1.26, "lip": 0.3, "canonical": "paprika", "status": "ok"}, {"raw": "2,5 ml (1/2 c. à thé) paprika fumé", "grams": 1.2, "kcal": 3.3, "prot": 0.16, "gluc": 0.63, "lip": 0.15, "canonical": "paprika", "status": "ok"}, {"raw": "1 gousse d'ail", "grams": 3.0, "kcal": 4.5, "prot": 0.19, "gluc": 0.99, "lip": 0.01, "canonical": "ail_gousse", "status": "ok"}, {"raw": "375 ml (1 1/2 tasse, 210 g) chapelure", "grams": 190.2, "kcal": 730.4, "prot": 26.87, "gluc": 130.27, "lip": 10.42, "canonical": "chapelure", "status": "ok"}, {"raw": "2,5 ml (1/2 c. à thé) sel", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}, {"raw": "3 poitrines de poulet", "grams": 600.0, "kcal": 720.0, "prot": 135.0, "gluc": 0.0, "lip": 15.72, "canonical": "poulet_poitrine", "status": "ok"}, {"raw": "15 ml (1 c. à soupe) sauce piquante sriracha", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}, {"raw": "80 ml (1/3 tasse) sirop d'érable", "grams": 106.5, "kcal": 276.9, "prot": 0.04, "gluc": 71.25, "lip": 0.26, "canonical": "sirop_erable", "status": "ok"}, {"raw": "250 ml (1 tasse) crème de soya Belsoy", "grams": 258.9, "kcal": 139.8, "prot": 8.47, "gluc": 16.26, "lip": 4.53, "canonical": "creme_soya", "status": "ok"}, {"raw": "Zeste de 1 citron", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}, {"raw": "45 ml (3 c. à soupe) jus de citron", "grams": 46.4, "kcal": 10.2, "prot": 0.16, "gluc": 3.2, "lip": 0.11, "canonical": "citron_jus", "status": "ok"}, {"raw": "15 ml (1 c. à soupe) vinaigre de vin blanc", "grams": 15.2, "kcal": 2.7, "prot": 0.0, "gluc": 0.01, "lip": 0.0, "canonical": "vinaigre_blanc", "status": "ok"} true\n---\n\n## Ingrédients\n- 60 ml (1/4 tasse) moutarde de Dijon\n- 2 poitrines de poulet désossées\n- Poivre et sel\n- 375 ml (1 1/2 tasse) orzo (ou 300 g / 10 1/2 oz)\n- 60 ml (1/4 tasse) huile d'olive\n- 80 ml (1/3 tasse) vinaigre de vin blanc\n- 250 ml (1 tasse) tomates cerises\n- 1 concombre libanais (ou 1/2 concombre moyen)\n- 1/2 poivron jaune\n- 1 pot de 200 g (7 oz) perles de bocconcini\n- 1/2 tasse basilic frais\n\n## Préparation\n1. Couper les tomates cerises en 2. Couper le concombre en dés. Couper le poivron jaune en petits dés. Égoutter les perles de bocconcini. Hacher finement le basilic.\n2. Dans un bol, mettre 30 ml (2 c. à soupe) de moutarde de Dijon, poivrer généreusement et ajouter une pincée de sel. Mélanger.\n3. Couper les poitrines de poulet en deux sur le sens de l'épaisseur et les déposer dans le bol. Mélanger pour bien enrober le poulet de moutarde.\n4. Dans un poêlon strié, cuire le poulet à feu moyen-vif 5 minutes de chaque côté. Laisser tiédir sur une planche à découper, puis tailler le poulet en cubes d'environ 1 cm (3/8 po) de côté.\n5. Pendant ce temps, cuire l'orzo dans l'eau bouillante selon la méthode inscrite sur l'emballage. Égoutter et réserver dans un grand bol. Ajouter l'huile, le vinaigre et 30 ml (2 c. à soupe) de moutarde de Dijon. Bien mélanger et laisser tiédir.\n6. Intégrer les tomates, le concombre, le poivron, le basilic, le bocconcini et le poulet. Poivrer généreusement, ajouter une pincée de sel, puis bien mélanger.\n\n## Notes\n- Se conserve 2 jours au réfrigérateur et ne se congèle pas.\n- Variante : un restant de rôti de porc ou de bœuf fait aussi l'affaire.\n", "macros_par_ingredient": [{"raw": "60 ml (1/4 tasse) moutarde de Dijon", "grams": 63.1, "kcal": 37.9, "prot": 2.36, "gluc": 3.68, "lip": 2.11, "canonical": "moutarde_dijon", "status": "ok"}, {"raw": "2 poitrines de poulet désossées", "grams": 400.0, "kcal": 480.0, "prot": 90.0, "gluc": 0.0, "lip": 10.48, "canonical": "poulet_poitrine", "status": "ok"}, { nts\n\n### Salade\n- 2 poitrines de poulet désossées (environ 450 g / 1 lb)\n- 30 ml (2 c. à soupe) pâte de cari tandoori\n- 1/2 laitue romaine\n- 250 ml (1 tasse) roquette\n- 20 pois mange-tout\n- 8 radis\n- 1 branche de céleri\n- 30 ml (2 c. à soupe) coriandre fraîche\n- 1 lime\n\n### Vinaigrette\n- 125 ml (1/2 tasse) yogourt grec nature\n- 30 ml (2 c. à soupe) lait\n- 2,5 ml (1/2 c. à thé) ail haché en pot (ou 1 petite gousse d'ail)\n- Poivre et sel\n\n## Préparation\n1. Couper les poitrines de poulet en 2 sur l'épaisseur. Émincer la laitue romaine. Couper les pois mange-tout en 4. Trancher finement les radis. Couper le céleri en biseau. Hacher la coriandre. Couper la lime en quartiers. Si vous utilisez une gousse d'ail fraîche : la hacher finement.\n2. Dans un grand bol, déposer les poitrines de poulet et la pâte de cari tandoori. Mélanger pour enrober la viande.\n3. Dans un poêlon strié antiadhésif préchauffé à feu moyen-vif, sans ajouter de matière grasse, cuire le poulet de 5 à 7 minutes de chaque côté.\n4. Réserver le poulet dans une assiette et laisser tiédir. Effilocher les poitrines avec les doigts.\n5. Dans un grand bol de service, mélanger la laitue, la roquette, les pois mange-tout, les radis et le céleri.\n6. Déposer le poulet effiloché au centre de la salade.\n7. Dans un petit bol, mélanger les ingrédients de la vinaigrette. Poivrer généreusement et ajouter une pincée de sel. Verser sur la salade.\n8. Garnir de coriandre. Accompagner de pains naans chauds et de quartiers de lime.\n\n## Notes\n- Sans la vinaigrette, la salade se conserve 2 jours au réfrigérateur, ne se congèle pas.\n- La pâte de cari tandoori est une marinade rougeâtre employée pour parfumer les viandes et les volailles. Peu piquante, préparée avec curcuma, gingembre, cumin, fenugrec et cannelle, entre autres. Disponible dans la section des produits ethniques de la plupart des supermarchés.\n", "macros_par_ingredient": [{"raw": "2 poitrines de poulet désossées (environ 450 g / 1 lb)", li.md", "id": "Volaille__saute-asiatique-poulet-brocoli", "raw": "---\ntitre: Sauté asiatique de poulet, brocoli, basilic et arachides\nportions: 4\ntemps_prep: 25 min\ntemps_cuisson: 15 min\ntags: [asiatique, wok, sauté]\ncertifie_bittle: true\n---\n\n## Ingrédients\n\n### Sauté\n- 4 poitrines de poulet\n- Sel et poivre, au goût\n- 30 ml (2 c. à soupe) huile végétale\n- 30 ml (2 c. à soupe) gingembre frais\n- 2 petites gousses d'ail\n- 5 ml (1 c. à thé) graines de coriandre\n- 30 ml (2 c. à soupe) huile de sésame grillé\n- 15 ml (1 c. à soupe) sauce piquante sriracha\n- 30 ml (2 c. à soupe) sauce tamari\n- 80 ml (1/3 tasse) sauce hoisin sans gluten\n- 30 ml (2 c. à soupe) sirop d'érable\n- 2 brocolis (environ 450 g)\n- 2 courgettes\n- 70 g oignons verts\n- 30 g feuilles de basilic frais\n\n### Garniture\n- 500 ml (2 tasses, 420 g) riz à sushi cuit\n- Feuilles de basilic frais\n\n## Préparation\n1. Couper le poulet en cubes. Râper finement le gingembre. Hacher l'ail. Broyer les graines de coriandre. Détailler les brocolis en fleurettes. Couper les courgettes en fines lanières. Hacher grossièrement les oignons verts.\n2. Saler et poivrer le poulet. Dans une grande poêle antiadhésive, chauffer l'huile à feu moyen-élevé et faire dorer le poulet environ 3 minutes, en brassant.\n3. Ajouter le gingembre, l'ail et les graines de coriandre, et cuire encore 2 minutes, en brassant.\n4. Ajouter l'huile de sésame grillé, la sauce sriracha, la sauce tamari, la sauce hoisin et le sirop d'érable. Poursuivre la cuisson 3 minutes.\n5. Ajouter les fleurettes de brocoli et cuire 3 minutes, en brassant souvent.\n6. Ajouter les courgettes, les oignons verts et le basilic, et cuire encore 1 minute.\n7. Servir le sauté de poulet dans des bols avec le riz et garnir des feuilles de basilic.\n\n## Notes\n- La recette originale mentionne « les petits pois » à l'étape 5 mais aucun petit pois n'apparaît dans la liste d'ingrédients — j'ai remplacé par les courgettes (déjà listées) qui sont l'ingrédient logique à ce moment.\n", "macros_par_ingredient": [{"raw": "4 poitrines de poulet", "grams": 800.0, "kcal": 960.0, "prot": 180.0, "gluc": 0.0, "lip": 20.96, "canonical": "poulet_poitrine", "status": "ok"}, {"raw": "Sel et poivre, au goût", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}, {"raw": "30 ml (2 c. à soupe) huile végétale", "grams": 27.6, "kcal": 244.4, "prot": 0.0, "gluc": 0.0, "lip": 27.64, "canonical": "huile_vegetale", "status": "ok"}, {"raw": "30 ml (2 c. à soupe) gingembre frais", "grams": 12.2, "kcal": 9.7, "prot": 0.22, "gluc": 2.16, "lip": 0.09, "canonical": "gingembre_frais", "status": "ok"}, {"raw": "2 petites gousses d'ail", "grams": 6.0, "kcal": 8.9, "prot": 0.38, "gluc": 1.98, "lip": 0.03, "canonical": "ail_gousse", "status": "ok"}, {"raw": "5 ml (1 c. à thé) graines de coriandre", "grams": 1.7, "kcal": 5.0, "prot": 0.21, "gluc": 0.93, "lip": 0.3, "canonical": "graines_coriandre", "status": "ok"}, {"raw": "30 ml (2 c. à soupe) huile de sésame grillé", "grams": 27.6, "kcal": 244.6, "prot": 0.0, "gluc": 0.0, "lip": 27.64, "canonical": "huile_sesame", "status": "ok"}, {"raw": "15 ml (1 c. à soupe) sauce piquante sriracha", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}, {"raw": "30 ml (2 c. à soupe) sauce tamari", "grams": 29.4, "kcal": 26.5, "prot": 2.41, "gluc": 4.25, "lip": 0.09, "canonical": "sauce_soya", "status": "ok"}, {"raw": "80 ml (1/3 tasse) sauce hoisin sans gluten", "grams": 86.5, "kcal": 190.3, "prot": 2.86, "gluc": 38.12, "lip": 2.93, "canonical": "sauce_hoisin", "status": "ok"}, {"raw": "30 ml (2 c. à soupe) sirop d'érable", "grams": 39.9, "kcal": 103.9, "prot": 0.02, "gluc": 26.72, "lip": 0.1, "canonical": "sirop_erable", "status": "ok"}, {"raw": "2 brocolis (environ 450 g)", "grams": 900.0, "kcal": 306.0, "prot": 25.38, "gluc": 59.76, "lip": 3.33, "canonical": "brocoli", "status": "ok"}, {"raw": "2 courgettes", "grams": 400.0, "kcal": 84.0, "prot": 10.84, "gluc": 12.44, "lip": 1.6, "canonical": "courgette", "status": "ok"}, {"raw": "70 g oignons verts", "grams": 70.0, "kcal": 23.8, "prot": 1.33, "gluc": 4.55, "lip": 0.28, "canonical": "oignon_vert", "status": "ok"}, {"raw": "30 g feuilles de basilic frais", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}, {"raw": "500 ml (2 tasses, 420 g) riz à sushi cuit", "grams": 333.9, "kcal": 434.1, "prot": 8.98, "gluc": 94.06, "lip": 0.93, "canonical": "riz_blanc_cuit", "status": "ok"}, {"raw": "Feuilles de basilic frais", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}]}, {"folder": "Volaille", "filename": "saute-poulet-vite-fait.md", "id": "Volaille__saute-poulet-vite-fait", "raw": "---\ntitre: Sauté au poulet vite fait\nportions: 6\ntemps_prep: 15 min\ntemps_cuisson: 15 min\ntags: [asiatique, wok, rapide, sauté]\ncertifie_bittle: true\n---\n\n## Ingrédients\n\n### Sauté\n- 15 ml (1 c. à soupe) huile de canola\n- 1,25 L (5 tasses) légumes au choix :\n  - **Cuisson longue** : oignons en fines tranches, carottes en rondelles, céleris tranchés en biseau, pieds de brocoli tranchés\n  - **Cuisson courte** : pois mange-tout, mini-bok choys tranchés, poivrons en lanières, fleurons de brocoli, chou chinois nappa en fines tranches, oignons verts en tronçons, courgettes tranchées en biseau, fèves germées\n- 450 g (1 lb) poulet cuit (environ 2 poitrines)\n\n### Sauce\n- 125 ml (1/2 tasse) eau\n- 30 ml (2 c. à soupe) sauce hoisin\n- 15 ml (1 c. à soupe) sauce soya\n- 15 ml (1 c. à soupe) miel du Québec\n- 7,5 ml (1/2 c. à soupe) fécule de maïs\n\n### Garniture (facultatif)\n- Graines de sésame grillées\n- Sauce piquante sriracha\n\n## Préparation\n1. Trancher le poulet cuit. Couper les légumes selon les indications de la liste d'ingrédients (tranches fines, rondelles, biseaux, lanières, etc.).\n2. Dans un wok ou un grand poêlon antiadhésif à haut rebord, chauffer l'huile à feu moyen-vif. Cuire les légumes à cuisson longue de 8 à 10 minutes ou jusqu'à ce qu'ils soient tendres et dorés, en remuant à l'occasion.\n3. Pendant ce temps, dans une tasse à mesurer, fouetter les ingrédients de la sauce pour dissoudre complètement la fécule.\n4. Ajouter la sauce, les légumes à cuisson courte et le poulet cuit dans le poêlon. Remuer pour enrober les ingrédients et poursuivre la cuisson de 3 à 5 minutes. Ne pas trop cuire pour que les légumes demeurent croquants.\n5. Servir sur du riz ou des nouilles asiatiques. Si désiré, garnir de graines de sésame et d'un trait de sauce piquante sriracha.\n\n## Notes\n- Se conserve 4 jours au réfrigérateur ou 3 mois au congélateur.\n- **Astuce — préparer le poulet à l'avance** : déposer 5 poitrines de poulet désossées (environ 1,25 kg / 2 1/2 lb) sur une plaque de cuisson tapissée de papier parchemin. Badigeonner de 15 ml (1 c. à soupe) d'huile de canola, poivrer et saler. Cuire au four à 180 °C (350 °F) 30 minutes ou jusqu'à ce que la chair n'ait plus de coloration rosée au centre. Laisser reposer 5 minutes.\n- **Variante** : remplacer le poulet par un reste de filet de porc, de rôti de bœuf ou par des crevettes surgelées et décongelées.\n- Temps de cuisson estimé d'après les étapes (la valeur n'était pas visible sur la photo originale).\n", "macros_par_ingredient": [{"raw": "15 ml (1 c. à soupe) huile de canola", "grams": 13.8, "kcal": 122.3, "prot": 0.0, "gluc": 0.0, "lip": 13.82, "canonical": "huile_canola", "status": "ok"}, {"raw": "1,25 L (5 tasses) légumes au choix :", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}, {"raw": "**Cuisson longue** : oignons en fines tranches, carottes en rondelles, céleris tranchés en biseau, pieds de brocoli tranchés", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}, {"raw": "**Cuisson courte** : pois mange-tout, mini-bok choys tranchés, poivrons en lanières, fleurons de brocoli, chou chinois nappa en fines tranches, oignons verts en tronçons, courgettes tranchées en biseau, fèves germées", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}, {"raw": "450 g (1 lb) poulet cuit (environ 2 poitrines)", "grams": 450.0, "kcal": 540.0, "prot": 101.25, "gluc": 0.0, "lip": 11.79, "canonical": "poulet_poitrine", "status": "ok"}, {"raw": "125 ml (1/2 tasse) eau", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}, {"raw": "30 ml (2 c. à soupe) sauce hoisin", "grams": 32.4, "kcal": 71.4, "prot": 1.07, "gluc": 14.3, "lip": 1.1, "canonical": "sauce_hoisin", "status": "ok"}, {"raw": "15 ml (1 c. à soupe) sauce soya", "grams": 14.7, "kcal": 13.2, "prot": 1.2, "gluc": 2.12, "lip": 0.05, "canonical": "sauce_soya", "status": "ok"}, {"raw": "15 ml (1 c. à soupe) miel du Québec", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": "miel", "status": "skip"}, {"raw": "7,5 ml (1/2 c. à soupe) fécule de maïs", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": "fecule_mais", "status": "skip"}, {"raw": "Graines de sésame grillées", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}, {"raw": "Sauce piquante sriracha", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}]}, {"folder": "Volaille", "filename": "supremes-volaille-sauce-minute.md", "id": "Volaille__supremes-volaille-sauce-minute", "raw": "---\ntitre: Suprêmes de volaille sauce minute\nportions: 6\ntemps_prep: 20 min\ntemps_cuisson: 15 min\ntags: [poêle, rapide]\ncertifie_bittle: true\n---\n\n## Ingrédients\n- 4 demi-poitrines de poulet désossées et sans peau\n- 30 ml (2 c. à soupe) beurre\n- 15 ml (1 c. à soupe) huile d'olive\n- 5 ml (1 c. à thé) poivre noir concassé\n- 10 ml (2 c. à thé) farine tout usage\n- 125 ml (1/2 tasse) bouillon de poulet\n- 60 ml (1/4 tasse) sirop d'érable\n- 15 ml (1 c. à soupe) sauce soya\n- Sel\n\n## Préparation\n1. Dans une grande poêle antiadhésive, dorer le poulet dans le beurre et l'huile environ 5 minutes de chaque côté ou jusqu'à ce qu'il soit bien cuit. Parsemer de poivre et saler. Réserver sur une assiette au chaud.\n2. Dans la même poêle, saupoudrer la farine sur le gras chaud et cuire 30 secondes en remuant.\n3. Ajouter le bouillon, le sirop d'érable et la sauce soya. Porter à ébullition en remuant et laisser mijoter de 1 à 2 minutes ou jusqu'à ce que la sauce soit sirupeuse. Rectifier l'assaisonnement.\n4. Trancher le poulet en aiguillettes et napper de sauce.\n\n## Notes\n- Le temps de cuisson original (« 8 heures ») dans la recette source est manifestement une coquille (s'agissant d'une cuisson à la poêle en 15 minutes max). J'ai mis 15 min comme valeur réaliste.\n- 4 demi-poitrines pour 6 portions semble peu — peut-être augmenter la quantité si servi seul, ou bien le poulet est complété par des accompagnements.\n", "macros_par_ingredient": [{"raw": "4 demi-poitrines de poulet désossées et sans peau", "grams": 800.0, "kcal": 960.0, "prot": 180.0, "gluc": 0.0, "lip": 20.96, "canonical": "poulet_poitrine", "status": "ok"}, {"raw": "30 ml (2 c. à soupe) beurre", "grams": 30.0, "kcal": 152.7, "prot": 0.99, "gluc": 0.0, "lip": 16.53, "canonical": "beurre", "status": "ok"}, {"raw": "15 ml (1 c. à soupe) huile d'olive", "grams": 13.7, "kcal": 121.2, "prot": 0.0, "gluc": 0.0, "lip": 13.69, "canonical": "huile_olive", "status": "ok"}, {"raw": "5 ml (1 c. à thé) poivre noir concassé", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}, {"raw": "10 ml (2 c. à thé) farine tout usage", "grams": 4.4, "kcal": 17.3, "prot": 0.63, "gluc": 3.03, "lip": 0.31, "canonical": "farine_blanche", "status": "ok"}, {"raw": "125 ml (1/2 tasse) bouillon de poulet", "grams": 129.4, "kcal": 3.9, "prot": 0.63, "gluc": 0.31, "lip": 0.03, "canonical": "bouillon_poulet", "status": "ok"}, {"raw": "60 ml (1/4 tasse) sirop d'érable", "grams": 79.9, "kcal": 207.7, "prot": 0.03, "gluc": 53.44, "lip": 0.19, "canonical": "sirop_erable", "status": "ok"}, {"raw": "15 ml (1 c. à soupe) sauce soya", "grams": 14.7, "kcal": 13.2, "prot": 1.2, "gluc": 2.12, "lip": 0.05, "canonical": "sauce_soya", "status": "ok"}, {"raw": "Sel", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}]}, {"folder": "Végé", "filename": "buddha-bowl-grecque.md", "id": "Végé__buddha-bowl-grecque", "raw": "---\ntitre: Buddha bowl à la grecque\nportions: 4\ntemps_prep: 20 min\ntemps_cuisson: 15 min\ntags: [végé, bowl, grec, four]\ncertifie_bittle: true\n---\n\n## Ingrédients\n\n### Légumes grillés\n- 1 courgette verte (zucchini) moyenne\n- 1 oignon rouge\n- 1 poivron rouge\n- 30 ml (2 c. à soupe) huile d'olive\n- 2,5 ml (1/2 c. à thé) thym séché\n- 2,5 ml (1/2 c. à thé) origan séché\n- Poivre\n\n### Base\n- 2 boîtes de 398 ml (14 oz) riz sauvage précuit (ou 500 ml / 2 tasses de riz sauvage cuit)\n\n### Sauce au yogourt\n- 125 ml (1/2 tasse) yogourt nature\n- 30 ml (2 c. à soupe) beurre de sésame (tahini)\n- 30 ml (2 c. à soupe) lait\n- 5 ml (1 c. à thé) ail haché en pot (ou 1 gousse d'ail)\n- 5 ml (1 c. à thé) miel du Québec\n- Poivre et sel\n\n### Garniture\n- 1 barquette de tomates cerises (environ 15 tomates)\n- 2 concombres libanais\n- 1 boîte de 540 ml (19 oz) pois chiches\n- 60 ml (1/4 tasse) fromage feta léger\n- 1 citron\n\n## Préparation\n1. Couper la courgette en rondelles. Couper l'oignon rouge en rondelles. Couper le poivron rouge en gros cubes. Couper les tomates cerises en 2. Trancher les concombres. Émietter le fromage feta. Couper le citron en quartiers. Rincer et égoutter le riz sauvage et les pois chiches. Si vous utilisez une gousse d'ail fraîche : la hacher finement.\n2. Placer la grille du four à la position la plus haute. Préchauffer le four à gril (broil). Tapisser une plaque de cuisson de papier d'aluminium.\n3. Déposer la courgette, l'oignon et le poivron sur la plaque. Ajouter l'huile et les herbes séchées. Mélanger avec les mains pour bien enrober les légumes et les répartir sur la plaque. Poivrer généreusement. Cuire sous le gril de 10 à 12 minutes ou jusqu'à ce que les légumes soient grillés.\n4. Pendant ce temps, dans un bol moyen, mélanger tous les ingrédients de la sauce au yogourt. Poivrer généreusement et ajouter une pincée de sel.\n5. Au moment de servir, dans un bol moyen allant au four à micro-ondes, chauffer le riz 1 minute.\n6. Dans 4 bols de service, répartir les légumes grillés, le riz et les garnitures côte à côte. Garnir chaque bol de 45 ml (3 c. à soupe) de sauce.\n\n## Notes\n- Cette recette est meilleure préparée à la dernière minute.\n- Variante : ajouter olives, cœurs d'artichauts, laitue ou herbes fraîches selon le contenu du frigo.\n", "macros_par_ingredient": [{"raw": "1 courgette verte (zucchini) moyenne", "grams": 200.0, "kcal": 42.0, "prot": 5.42, "gluc": 6.22, "lip": 0.8, "canonical": "courgette", "status": "ok"}, {"raw": "1 oignon rouge", "grams": 110.0, "kcal": 44.0, "prot": 1.21, "gluc": 10.27, "lip": 0.11, "canonical": "oignon_jaune", "status": "ok"}, {"raw": "1 poivron rouge", "grams": 120.0, "kcal": 37.2, "prot": 1.19, "gluc": 7.24, "lip": 0.36, "canonical": "poivron_rouge", "status": "ok"}, {"raw": "30 ml (2 c. à soupe) huile d'olive", "grams": 27.4, "kcal": 242.4, "prot": 0.0, "gluc": 0.0, "lip": 27.39, "canonical": "huile_olive", "status": "ok"}, {"raw": "2,5 ml (1/2 c. à thé) thym séché", "grams": 0.5, "kcal": 1.3, "prot": 0.04, "gluc": 0.29, "lip": 0.03, "canonical": "thym_seche", "status": "ok"}, {"raw": "2,5 ml (1/2 c. à thé) origan séché", "grams": 0.8, "kcal": 2.0, "prot": 0.07, "gluc": 0.52, "lip": 0.03, "canonical": "origan_seche", "status": "ok"}, {"raw": "Poivre", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "statu
