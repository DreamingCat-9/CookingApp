thé) assaisonnement italien (ou un mélange d'épices comme l'origan, le thym, le basilic et le romarin)\n- 5 ml (1 c. à thé) sel casher\n- 2,5 ml (1/2 c. à thé) poivre noir fraîchement moulu\n- 45 ml (3 c. à soupe) huile d'olive extra vierge\n- 4 gousses d'ail, hachées\n- 60 ml (1/4 tasse) oignon jaune, finement haché\n- 125 ml (1/2 tasse) tomates séchées, finement tranchées\n- 500 ml (2 tasses) jeunes pousses d'épinards\n- 375 ml (1 1/2 tasse) crème épaisse\n- 60 ml (1/4 tasse) parmesan fraîchement râpé\n\n## Préparation\n1. Assaisonner les deux côtés de chaque poitrine de poulet avec l'assaisonnement italien, le sel et le poivre.\n2. Dans une grande poêle, faire chauffer 30 ml (2 c. à soupe) d'huile d'olive à feu moyen. Saisir le poulet 3 à 4 minutes de chaque côté, jusqu'à ce qu'il soit bien doré. Retirer le poulet et réserver.\n3. Dans la même poêle, ajouter la dernière cuillère à soupe d'huile et l'oignon. Faire sauter 2 à 3 minutes, jusqu'à ce qu'il soit tendre.\n4. Ajouter les tomates séchées et l'ail et faire sauter encore 1 minute, jusqu'à ce que les arômes se dégagent.\n5. Ajouter les épinards et faire sauter encore 1 minute, juste le temps qu'ils commencent à flétrir.\n6. Ajouter la crème épaisse et le parmesan. Mélanger bien et laisser la sauce mijoter.\n7. Remettre le poulet dans la poêle et laisser cuire dans la sauce environ 5 minutes, jusqu'à ce qu'il soit bien chaud.\n"}, {"folder": "Volaille", "filename": "poulet-noix-cajou.md", "id": "Volaille__poulet-noix-cajou", "raw": "---\ntitre: Poulet aux noix de cajou\nportions: 5\ntemps_prep: 10 min\ntemps_cuisson: 1 h\ncalories: 372\nproteines: 38\nglucides: 32\nlipides: 20\ntags: [poulet, four, asiatique, pilons]\nderniere_fois: \n---\n\n## Ingrédients\n- 125 ml (1/2 tasse) sauce chili\n- 60 ml (1/4 tasse) cassonade légèrement tassée\n- 60 ml (1/4 tasse) vinaigre de riz\n- 30 ml (2 c. à soupe) ail haché en pot (ou 6 gousses hachées finement)\n- 15 ml (1 c. à soupe) sauce soya réduite en sodium\n- 15 ml (1 c. à soupe) gingembre haché en pot\n- 12 pilons de poulet sans la peau (environ 1,5 kg / 3 lb)\n- 125 ml (1/2 tasse) noix de cajou naturelles\n- 2 oignons verts tranchés finement en biseau\n\n## Préparation\n1. Préchauffer le four à 200 °C (400 °F). Placer la grille au centre du four.\n2. Dans un plat rectangulaire allant au four de 23 cm x 33 cm (9 po x 13 po), mélanger la sauce chili, la cassonade, le vinaigre, l'ail, la sauce soya et le gingembre. Ajouter les pilons et mélanger de nouveau pour bien les enrober. Répartir les noix de cajou dans le plat.\n3. Cuire au four à découvert 1 heure ou jusqu'à ce que la chair se détache bien de l'os. Retourner les pilons à mi-cuisson.\n4. Garnir d'oignons verts et servir avec un riz basmati et des légumes.\n\n## Notes\n- 4 à 6 portions de 2 ou 3 pilons (5 portions retenu en moyenne).\n- Se conserve 3 jours au réfrigérateur ou 4 mois au congélateur, sans la garniture.\n- Choisir des noix de cajou naturelles non rôties dans l'huile.\n- Astuce : les pilons sans la peau coûtent ~0,20 $ de plus mais épargnent le travail de retrait et coupent le gras de moitié.\n"}, {"folder": "Volaille", "filename": "poulet-shish-taouk.md", "id": "Volaille__poulet-shish-taouk", "raw": "---\ntitre: Poulet shish taouk\nportions: 8\ntemps_prep: 15 min\ntemps_cuisson: 15 min\ntags: [libanais, poêle, rapide]\ncalories: 230\nproteines: 35\nglucides: 5\nlipides: 8\nnutrition_estimee: true\nderniere_fois: \n---\n\n## Ingrédients\n- 375 ml (1 1/2 tasse) yogourt nature\n- Le zeste et le jus de 1 citron\n- 30 ml (2 c. à soupe) beurre de sésame (tahini)\n- 30 ml (2 c. à soupe) ail haché en pot (ou 6 gousses hachées finement)\n- 5 ml (1 c. à thé) cumin moulu\n- 5 ml (1 c. à thé) thym séché\n- Poivre et sel\n- 80 ml (1/3 tasse) mayonnaise allégée\n- 750 g (1 2/3 lb) poitrines de poulet désossées (environ 4 petites poitrines)\n- 5 ml (1 c. à thé) huile de canola\n- 1 citron en quartiers (facultatif)\n\n## Préparation\n1. Dans un grand bol, préparer la marinade en mélangeant le yogourt, le zeste et le jus de citron, le beurre de sésame, l'ail et les épices. Poivrer généreusement et ajouter une pincée de sel.\n2. Prélever 250 ml (1 tasse) de la marinade et la transvider dans un bol moyen. Incorporer la mayonnaise et réserver cette sauce pour le service.\n3. Couper le poulet en 2 ou en 3 sur le sens de l'épaisseur pour obtenir des tranches de 1,5 cm (1/2 po). Ajouter le poulet dans le bol de marinade et bien mélanger.\n4. À l'aide d'un pinceau de cuisine, badigeonner d'huile un poêlon strié antiadhésif et préchauffer à feu moyen. Retirer l'excédent de marinade sur le poulet en le raclant avec le dos d'un couteau et déposer le poulet dans le poêlon. Cuire 5 ou 6 minutes de chaque côté. Au besoin, procéder en deux temps selon la taille du poêlon.\n5. Servir avec la sauce réservée et des quartiers de citron. Accompagner de riz et de salade fattouche, ou servir dans un pita garni de laitue, de concombres et de tomates.\n\n## Notes\n- Se conserve 3 jours au réfrigérateur ou 3 mois au congélateur.\n- En cas d'allergie au sésame : remplacer le tahini par du beurre de soya (de type Wowbutter).\n"}, {"folder": "Volaille", "filename": "riz-citronne-poulet.md", "id": "Volaille__riz-citronne-poulet", "raw": "---\ntitre: Riz citronné au poulet tout-en-un\nportions: 6\ntemps_prep: 15 min\ntemps_cuisson: 1 h 10 min\ntags: [four, tout-en-un, citron]\ncalories: 465\nproteines: 38\nglucides: 40\nlipides: 15\nnutrition_estimee: true\nderniere_fois: \n---\n\n## Ingrédients\n- 750 ml (3 tasses) bouillon de poulet réduit en sodium\n- 375 ml (1 1/2 tasse) riz blanc étuvé à grains longs\n- 1 oignon jaune haché\n- 15 ml (1 c. à soupe) ail haché en pot (ou 3 gousses hachées finement)\n- 2 citrons\n- 12 hauts de cuisse de poulet désossés, sans la peau (environ 800 g / 1 3/4 lb)\n- Poivre et sel\n- 30 ml (2 c. à soupe) feuilles de thym frais (3 ou 4 branches)\n\n## Préparation\n1. Préchauffer le four à 180 °C (350 °F). Placer la grille au centre du four.\n2. Dans un grand poêlon allant au four, mélanger le bouillon, le riz, l'oignon et l'ail.\n3. Zester les 2 citrons au-dessus du poêlon, puis ajouter le jus du premier citron. Mélanger.\n4. Couper le deuxième citron en tranches de 1 cm (3/8 po) d'épaisseur.\n5. Répartir le poulet et les tranches de citron sur le riz et le bouillon, sans mélanger. Poivrer généreusement et ajouter une pincée de sel.\n6. Couvrir et cuire au four 30 minutes.\n7. Poursuivre la cuisson 30 minutes à découvert.\n8. Compléter la cuisson sous le gril (broil) 5 à 7 minutes ou jusqu'à ce que le poulet et le citron soient grillés.\n9. Garnir de thym. Servir accompagné d'une salade verte.\n\n## Notes\n- Se conserve 4 jours au réfrigérateur ou 3 mois au congélateur.\n- Choisir le riz étuvé (aussi appelé « converti » ou « conditionné »), qui reste ferme et devient moins collant à la cuisson que le riz blanc à grains longs régulier. À ne pas confondre avec le riz minute (instantané, précuit ou à cuisson rapide) ni avec le riz prêt à servir (express).\n- Temps de préparation estimé (la valeur n'était pas visible sur la photo originale).\n"}, {"folder": "Volaille", "filename": "roulades-poulet-tomates-sechees.md", "id": "Volaille__roulades-poulet-tomates-sechees", "raw": "---\ntitre: Roulades de poulet aux tomates séchées\nportions: 6\ntemps_prep: 10 min\ntemps_cuisson: 15 min\ncalories: 152\nproteines: 20\nglucides: 3\nlipides: 6\ntags: [poulet, poêle, élégant, tomates séchées]\nderniere_fois: \n---\n\n## Ingrédients\n- 6 escalopes de poulet ou de dindon (environ 450 g / 1 lb, voir notes)\n- 500 ml (2 tasses) jeunes épinards\n- 125 ml (1/2 tasse) tomates séchées dans l'huile, égouttées et tranchées\n- 125 ml (1/2 tasse) fromage de chèvre non affiné à pâte molle\n- Poivre et sel\n- 5 ml (1 c. à thé) huile de canola\n\n## Préparation\n1. Déposer les escalopes sur un plan de travail propre et les recouvrir d'épinards. Au centre et sur toute la longueur des escalopes, ajouter les tomates séchées et le fromage en s'assurant que les garnitures ne débordent pas.\n2. Rouler les escalopes sur la longueur. Insérer profondément un cure-dent pour maintenir chaque roulade fermée. Poivrer généreusement et ajouter une pincée de sel.\n3. Dans un grand poêlon antiadhésif, chauffer l'huile à feu moyen. Cuire les roulades 5 minutes sur le premier côté. Retourner et poursuivre la cuisson 5 minutes. Retourner sur le troisième côté et cuire encore 5 minutes. La viande doit être dorée sur toute la surface et cuite à l'intérieur. Pour servir, accompagner de riz, si désiré.\n\n## Notes\n- Se conserve 3 jours au réfrigérateur ou 3 mois au congélateur.\n- S'assurer d'avoir des escalopes assez minces, environ 0,5 cm (1/4 po) d'épaisseur. Si trop épaisses, les placer entre deux pellicules de plastique et les frapper avec un verre robuste à fond plat.\n- Astuce : badigeonner d'huile la surface du poêlon au pinceau pour utiliser moins de matières grasses.\n- Variante : remplacer le fromage de chèvre par un fromage de lait de vache et de chèvre non affiné à pâte molle (goût plus doux).\n"}, {"folder": "Volaille", "filename": "salade-asiatique-chou-nappa.md", "id": "Volaille__salade-asiatique-chou-nappa", "raw": "---\ntitre: Salade asiatique de chou nappa au poulet grillé\nportions: 6\ntemps_prep: 20 min\ntemps_cuisson: 6 min\ntags: [asiatique, salade, poêle, rapide]\ncalories: 295\nproteines: 28\nglucides: 18\nlipides: 12\nnutrition_estimee: true\nderniere_fois: \n---\n\n## Ingrédients\n\n### Vinaigrette\n- 125 ml (1/2 tasse) jus d'orange pur\n- 60 ml (1/4 tasse) vinaigre de riz\n- 30 ml (2 c. à soupe) pâte de miso\n- 30 ml (2 c. à soupe) huile de sésame grillé\n- 10 ml (2 c. à thé) ail haché en pot\n- 10 ml (2 c. à thé) gingembre haché en pot\n- 10 ml (2 c. à thé) miel du Québec\n- 5 ml (1 c. à thé) sauce piquante sriracha\n\n### Salade\n- 2 poitrines de poulet désossées, coupées en biseau (450 g / 1 lb)\n- 1 L (4 tasses) chou chinois nappa tranché finement (1/2 chou moyen)\n- 500 ml (2 tasses) chou rouge tranché finement (1/4 chou moyen)\n- 500 ml (2 tasses) pois mange-tout coupés en biseau\n- 250 ml (1 tasse) menthe fraîche hachée\n- 250 ml (1 tasse) coriandre fraîche hachée\n- 750 ml (3 tasses) carottes en julienne (ou 3 grosses carottes râpées)\n- 3 oignons verts hachés\n\n### Garniture\n- 250 ml (1 tasse) nouilles frites chow mein\n- 30 ml (2 c. à soupe) graines de sésame grillées\n\n## Préparation\n1. Dans un grand bol de service, mélanger tous les ingrédients de la vinaigrette.\n2. Dans un bol moyen, déposer le poulet. Prélever 80 ml (1/3 tasse) de la vinaigrette, verser sur le poulet et remuer pour bien l'enrober. Réserver.\n3. Pendant ce temps, préparer les légumes et les herbes fraîches. Déposer dans le bol de service, puis mélanger pour enrober de vinaigrette.\n4. Dans un poêlon strié antiadhésif préchauffé à feu moyen-vif, griller le poulet mariné 2 ou 3 minutes de chaque côté. Au besoin, procéder en 2 temps selon la taille du poêlon.\n5. Déposer le poulet sur les légumes, puis garnir de nouilles frites et de graines de sésame. Servir avec des vermicelles de riz.\n\n## Notes\n- Se conserve 4 jours au réfrigérateur sans la garniture, ne se congèle pas.\n- Les nouilles frites chow mein apportent du croquant à la salade ; on n'en utilise qu'une poignée pour la salade complète, ce qui ajoute donc très peu de gras.\n- Le chou nappa est polyvalent : cru en salade ou en wrap pour profiter de sa texture croquante, ou cuit dans un sauté.\n"}, {"folder": "Volaille", "filename": "salade-ete-poulet-croustillant-erable.md", "id": "Volaille__salade-ete-poulet-croustillant-erable", "raw": "---\ntitre: Salade d'été au poulet croustillant piquant à l'érable\nportions: 4\ntemps_prep: 40 min\ntemps_cuisson: 20 min\ntags: [salade, four, érable]\ncalories: 762\nproteines: 55\nglucides: 60\nlipides: 30\nnutrition_estimee: true\nderniere_fois: \n---\n\n## Ingrédients\n\n### Poulet croustillant à l'érable\n- 80 ml (1/3 tasse) mayonnaise\n- 80 ml (1/3 tasse) yogourt grec nature\n- 5 ml (1 c. à thé) paprika\n- 2,5 ml (1/2 c. à thé) paprika fumé\n- 1 gousse d'ail, hachée\n- 375 ml (1 1/2 tasse, 210 g) chapelure\n- 2,5 ml (1/2 c. à thé) sel\n- 3 poitrines de poulet en cubes\n- 15 ml (1 c. à soupe) sauce piquante sriracha\n- 80 ml (1/3 tasse) sirop d'érable\n\n### Vinaigrette crémeuse au citron et à l'ail\n- 250 ml (1 tasse) crème de soya Belsoy\n- Zeste de 1 citron\n- 45 ml (3 c. à soupe) jus de citron\n- 15 ml (1 c. à soupe) vinaigre de vin blanc\n- 1 gousse d'ail, hachée\n- 15 ml (1 c. à soupe) moutarde de Dijon\n- 15 ml (1 c. à soupe) câpres hachés grossièrement\n- 3,75 ml (3/4 c. à thé) sel\n- Poivre, au goût\n\n### Salade\n- 1 L (4 tasses, 180 g) laitue iceberg hachée grossièrement\n- 1 L (4 tasses, 180 g) laitue romaine hachée grossièrement\n- 4 concombres libanais, en petits cubes\n- 2 oignons verts, hachés grossièrement\n- 500 ml (2 tasses, 300 g) tomates cerises coupées en 4\n- 1 pomme rouge, en petits cubes\n- 250 ml (1 tasse, 45 g) basilic frais haché grossièrement\n\n## Préparation\n1. Préchauffer le four à 230 °C (450 °F) et tapisser une plaque à biscuits de papier parchemin.\n2. Dans une première assiette, mélanger la mayonnaise, le yogourt, le paprika, le paprika fumé et l'ail. Dans une deuxième assiette, déposer la chapelure et le sel.\n3. Badigeonner les cubes de poulet avec le mélange de mayonnaise et les enrober de chapelure en pressant bien sur toute la surface. Déposer sur la plaque. À l'aide d'un pinceau, badigeonner doucement le dessus d'un peu d'huile.\n4. Cuire au four 15 à 18 minutes ou jusqu'à ce que les cubes soient bien dorés. Laisser tiédir 5 minutes sur la plaque.\n5. Dans un bol, mélanger le sirop d'érable et la sriracha. Badigeonner les cubes de poulet du mélange.\n6. Dans un petit bol, à l'aide d'un fouet, mélanger tous les ingrédients de la vinaigrette.\n7. Dans un grand bol, mélanger tous les ingrédients de la salade avec la vinaigrette. Servir avec le poulet croustillant.\n\n## Notes\n- L'étape « mélanger mayonnaise + paprika + ail » de la recette originale ne mentionnait pas le yogourt grec, mais il est dans la liste d'ingrédients de l'enrobage — je l'ai inclus dans le mélange.\n"}, {"folder": "Volaille", "filename": "salade-orzo-poulet-grille.md", "id": "Volaille__salade-orzo-poulet-grille", "raw": "---\ntitre: Salade d'orzo au poulet grillé\nportions: 6\ntemps_prep: 15 min\ntemps_cuisson: 10 min\ncalories: 468\nproteines: 31\nglucides: 41\nlipides: 19\ntags: [poulet, salade, orzo, lunch]\nderniere_fois: \n---\n\n## Ingrédients\n- 60 ml (1/4 tasse) moutarde de Dijon\n- 2 poitrines de poulet désossées\n- Poivre et sel\n- 375 ml (1 1/2 tasse) orzo (ou 300 g / 10 1/2 oz)\n- 60 ml (1/4 tasse) huile d'olive\n- 80 ml (1/3 tasse) vinaigre de vin blanc\n- 250 ml (1 tasse) tomates cerises coupées en 2\n- 1 concombre libanais en dés (ou 1/2 concombre moyen)\n- 1/2 poivron jaune en petits dés\n- 1 pot de 200 g (7 oz) perles de bocconcini égouttées\n- 1/2 tasse basilic frais haché finement\n\n## Préparation\n1. Dans un bol, mettre 30 ml (2 c. à soupe) de moutarde de Dijon, poivrer généreusement et ajouter une pincée de sel. Mélanger.\n2. Couper les poitrines de poulet en deux sur le sens de l'épaisseur et les déposer dans le bol. Mélanger pour bien enrober le poulet de moutarde.\n3. Dans un poêlon strié, cuire le poulet à feu moyen-vif 5 minutes de chaque côté. Laisser tiédir sur une planche à découper, puis tailler le poulet en cubes d'environ 1 cm (3/8 po) de côté.\n4. Pendant ce temps, cuire l'orzo dans l'eau bouillante selon la méthode inscrite sur l'emballage. Égoutter et réserver dans un grand bol. Ajouter l'huile, le vinaigre et 30 ml (2 c. à soupe) de moutarde de Dijon. Bien mélanger et laisser tiédir.\n5. Intégrer les tomates, le concombre, le poivron, le basilic, le bocconcini et le poulet. Poivrer généreusement, ajouter une pincée de sel, puis bien mélanger.\n\n## Notes\n- Se conserve 2 jours au réfrigérateur et ne se congèle pas.\n- Variante : un restant de rôti de porc ou de bœuf fait aussi l'affaire.\n"}, {"folder": "Volaille", "filename": "salade-poulet-cesar.md", "id": "Volaille__salade-poulet-cesar", "raw": "---\ntitre: Salade poulet césar du fit cook\nportions: 4\ntemps_prep: 25 min\ntemps_cuisson: 1 h\ntags: [salade, four, césar]\ncalories: 365\nproteines: 45\nglucides: 22\nlipides: 12\nnutrition_estimee: true\nderniere_fois: \n---\n\n## Ingrédients\n\n### Salade\n- 4 concombres libanais coupés en tranches\n- 605 g (1 1/3 lb) poulet cuit effiloché\n- 12 radis en fines juliennes\n- 1 L (4 tasses) laitue romaine hachée\n\n### Sauce\n- 2 têtes d'ail\n- 1 filet d'huile (pour rôtir l'ail)\n- 250 ml (1 tasse) yogourt grec nature 0%\n- 30 ml (2 c. à soupe) mayonnaise légère\n- 30 ml (2 c. à soupe) parmesan râpé\n- 30 ml (2 c. à soupe) câpres hachées\n- 15 ml (1 c. à soupe) moutarde au miel\n- 15 ml (1 c. à soupe) épices passe-partout\n- 1 citron (zeste et jus)\n\n### Croûtons\n- 2 pitas de blé entier coupés en morceaux de 2 cm\n- 1 filet d'huile\n- Sel et poivre\n\n## Préparation\n1. Préchauffer le four à 175 °C (350 °F).\n2. Couper le dessus des têtes d'ail pour exposer les gousses. Déposer les têtes sur une feuille de papier aluminium, arroser d'huile, saler et poivrer. Emballer et cuire au four 1 heure.\n3. Pendant ce temps, sur une plaque tapissée de papier parchemin, étaler les morceaux de pitas. Arroser d'huile, saler et poivrer. Cuire au four de 10 à 15 minutes, jusqu'à ce que les croûtons soient dorés. Réserver.\n4. Retirer les têtes d'ail du four et les presser au-dessus d'un grand bol pour récupérer les gousses. Réduire les gousses en purée à l'aide d'une fourchette.\n5. Ajouter le reste des ingrédients de la sauce dans le bol. Saler et poivrer. Fouetter jusqu'à l'obtention d'une préparation la plus homogène possible.\n6. Assembler la salade en ajoutant les légumes, le poulet et les croûtons. Verser la sauce et mélanger.\n"}, {"folder": "Volaille", "filename": "salade-poulet-tandoori.md", "id": "Volaille__salade-poulet-tandoori", "raw": "---\ntitre: Salade de poulet tandoori\nportions: 4\ntemps_prep: 15 min\ntemps_cuisson: 15 min\ntags: [indien, salade, poêle, rapide]\ncalories: 240\nproteines: 35\nglucides: 8\nlipides: 5\nnutrition_estimee: true\nderniere_fois: \n---\n\n## Ingrédients\n\n### Salade\n- 2 poitrines de poulet désossées, coupées en 2 sur l'épaisseur (environ 450 g / 1 lb)\n- 30 ml (2 c. à soupe) pâte de cari tandoori\n- 1/2 laitue romaine émincée (environ 1 L / 4 tasses)\n- 250 ml (1 tasse) roquette\n- 250 ml (1 tasse) pois mange-tout coupés en 4 (environ 20 pois mange-tout)\n- 250 ml (1 tasse) radis tranchés finement (environ 8 radis)\n- 1 branche de céleri coupée en biseau\n- 30 ml (2 c. à soupe) coriandre fraîche hachée\n- 1 lime en quartiers\n\n### Vinaigrette\n- 125 ml (1/2 tasse) yogourt grec nature\n- 30 ml (2 c. à soupe) lait\n- 2,5 ml (1/2 c. à thé) ail haché en pot (ou 1 petite gousse hachée finement)\n- Poivre et sel\n\n## Préparation\n1. Dans un grand bol, déposer les poitrines de poulet et la pâte de cari tandoori. Mélanger pour enrober la viande.\n2. Dans un poêlon strié antiadhésif préchauffé à feu moyen-vif, sans ajouter de matière grasse, cuire le poulet de 5 à 7 minutes de chaque côté.\n3. Réserver le poulet dans une assiette et laisser tiédir. Effilocher les poitrines avec les doigts.\n4. Dans un grand bol de service, mélanger la laitue, la roquette, les pois mange-tout, les radis et le céleri.\n5. Déposer le poulet effiloché au centre de la salade.\n6. Dans un petit bol, mélanger les ingrédients de la vinaigrette. Poivrer généreusement et ajouter une pincée de sel. Verser sur la salade.\n7. Garnir de coriandre. Accompagner de pains naans chauds et de quartiers de lime.\n\n## Notes\n- Sans la vinaigrette, la salade se conserve 2 jours au réfrigérateur, ne se congèle pas.\n- La pâte de cari tandoori est une marinade rougeâtre employée pour parfumer les viandes et les volailles. Peu piquante, préparée avec curcuma, gingembre, cumin, fenugrec et cannelle, entre autres. Disponible dans la section des produits ethniques de la plupart des supermarchés.\n"}, {"folder": "Volaille", "filename": "saute-asiatique-poulet-brocoli.md", "id": "Volaille__saute-asiatique-poulet-brocoli", "raw": "---\ntitre: Sauté asiatique de poulet, brocoli, basilic et arachides\nportions: 4\ntemps_prep: 25 min\ntemps_cuisson: 15 min\ntags: [asiatique, wok, sauté]\ncalories: 720\nproteines: 60\nglucides: 55\nlipides: 25\nnutrition_estimee: true\nderniere_fois: \n---\n\n## Ingrédients\n\n### Sauté\n- 4 poitrines de poulet, en cubes\n- Sel et poivre, au goût\n- 30 ml (2 c. à soupe) huile végétale\n- 30 ml (2 c. à soupe) gingembre frais râpé finement\n- 2 petites gousses d'ail, hachées\n- 5 ml (1 c. à thé) graines de coriandre broyées\n- 30 ml (2 c. à soupe) huile de sésame grillé\n- 15 ml (1 c. à soupe) sauce piquante sriracha\n- 30 ml (2 c. à soupe) sauce tamari\n- 80 ml (1/3 tasse) sauce hoisin sans gluten\n- 30 ml (2 c. à soupe) sirop d'érable\n- 1,5 L (6 tasses, 450 g) brocolis en fleurettes (environ 2 brocolis)\n- 2 courgettes, en fines lanières\n- 125 ml (1/2 tasse, 70 g) oignons verts hachés grossièrement\n- 500 ml (2 tasses, 30 g) feuilles de basilic frais\n\n### Garniture\n- 500 ml (2 tasses, 420 g) riz à sushi cuit\n- Feuilles de basilic frais\n\n## Préparation\n1. Saler et poivrer le poulet. Dans une grande poêle antiadhésive, chauffer l'huile à feu moyen-élevé et faire dorer le poulet environ 3 minutes, en brassant.\n2. Ajouter le gingembre, l'ail et les graines de coriandre, et cuire encore 2 minutes, en brassant.\n3. Ajouter l'huile de sésame grillé, la sauce sriracha, la sauce tamari, la sauce hoisin et le sirop d'érable. Poursuivre la cuisson 3 minutes.\n4. Ajouter les fleurettes de brocoli et cuire 3 minutes, en brassant souvent.\n5. Ajouter les courgettes, les oignons verts et le basilic, et cuire encore 1 minute.\n6. Servir le sauté de poulet dans des bols avec le riz et garnir des feuilles de basilic.\n\n## Notes\n- La recette originale mentionne « les petits pois » à l'étape 5 mais aucun petit pois n'apparaît dans la liste d'ingrédients — j'ai remplacé par les courgettes (déjà listées) qui sont l'ingrédient logique à ce moment.\n"}, {"folder": "Volaille", "filename": "saute-poulet-vite-fait.md", "id": "Volaille__saute-poulet-vite-fait", "raw": "---\ntitre: Sauté au poulet vite fait\nportions: 6\ntemps_prep: 15 min\ntemps_cuisson: 15 min\ntags: [asiatique, wok, rapide, sauté]\ncalories: 215\nproteines: 25\nglucides: 14\nlipides: 6\nnutrition_estimee: true\nderniere_fois: \n---\n\n## Ingrédients\n\n### Sauté\n- 15 ml (1 c. à soupe) huile de canola\n- 1,25 L (5 tasses) légumes au choix :\n  - **Cuisson longue** : oignons en fines tranches, carottes en rondelles, céleris tranchés en biseau, pieds de brocoli tranchés\n  - **Cuisson courte** : pois mange-tout, mini-bok choys tranchés, poivrons en lanières, fleurons de brocoli, chou chinois nappa en fines tranches, oignons verts en tronçons, courgettes tranchées en biseau, fèves germées\n- 450 g (1 lb) poulet cuit tranché (environ 2 poitrines)\n\n### Sauce\n- 125 ml (1/2 tasse) eau\n- 30 ml (2 c. à soupe) sauce hoisin\n- 15 ml (1 c. à soupe) sauce soya\n- 15 ml (1 c. à soupe) miel du Québec\n- 7,5 ml (1/2 c. à soupe) fécule de maïs\n\n### Garniture (facultatif)\n- Graines de sésame grillées\n- Sauce piquante sriracha\n\n## Préparation\n1. Dans un wok ou un grand poêlon antiadhésif à haut rebord, chauffer l'huile à feu moyen-vif. Cuire les légumes à cuisson longue de 8 à 10 minutes ou jusqu'à ce qu'ils soient tendres et dorés, en remuant à l'occasion.\n2. Pendant ce temps, dans une tasse à mesurer, fouetter les ingrédients de la sauce pour dissoudre complètement la fécule.\n3. Ajouter la sauce, les légumes à cuisson courte et le poulet cuit dans le poêlon. Remuer pour enrober les ingrédients et poursuivre la cuisson de 3 à 5 minutes. Ne pas trop cuire pour que les légumes demeurent croquants.\n4. Servir sur du riz ou des nouilles asiatiques. Si désiré, garnir de graines de sésame et d'un trait de sauce piquante sriracha.\n\n## Notes\n- Se conserve 4 jours au réfrigérateur ou 3 mois au congélateur.\n- **Astuce — préparer le poulet à l'avance** : déposer 5 poitrines de poulet désossées (environ 1,25 kg / 2 1/2 lb) sur une plaque de cuisson tapissée de papier parchemin. Badigeonner de 15 ml (1 c. à soupe) d'huile de canola, poivrer et saler. Cuire au four à 180 °C (350 °F) 30 minutes ou jusqu'à ce que la chair n'ait plus de coloration rosée au centre. Laisser reposer 5 minutes.\n- **Variante** : remplacer le poulet par un reste de filet de porc, de rôti de bœuf ou par des crevettes surgelées et décongelées.\n- Temps de cuisson estimé d'après les étapes (la valeur n'était pas visible sur la photo originale).\n"}, {"folder": "Volaille", "filename": "supremes-volaille-sauce-minute.md", "id": "Volaille__supremes-volaille-sauce-minute", "raw": "---\ntitre: Suprêmes de volaille sauce minute\nportions: 6\ntemps_prep: 20 min\ntemps_cuisson: 15 min\ntags: [poêle, érable, rapide]\ncalories: 230\nproteines: 30\nglucides: 8\nlipides: 8\nnutrition_estimee: true\nderniere_fois: \n---\n\n## Ingrédients\n- 4 demi-poitrines de poulet désossées et sans peau\n- 30 ml (2 c. à soupe) beurre\n- 15 ml (1 c. à soupe) huile d'olive\n- 5 ml (1 c. à thé) poivre noir concassé\n- 10 ml (2 c. à thé) farine tout usage\n- 125 ml (1/2 tasse) bouillon de poulet\n- 60 ml (1/4 tasse) sirop d'érable\n- 15 ml (1 c. à soupe) sauce soya\n- Sel\n\n## Préparation\n1. Dans une grande poêle antiadhésive, dorer le poulet dans le beurre et l'huile environ 5 minutes de chaque côté ou jusqu'à ce qu'il soit bien cuit. Parsemer de poivre et saler. Réserver sur une assiette au chaud.\n2. Dans la même poêle, saupoudrer la farine sur le gras chaud et cuire 30 secondes en remuant.\n3. Ajouter le bouillon, le sirop d'érable et la sauce soya. Porter à ébullition en remuant et laisser mijoter de 1 à 2 minutes ou jusqu'à ce que la sauce soit sirupeuse. Rectifier l'assaisonnement.\n4. Trancher le poulet en aiguillettes et napper de sauce.\n\n## Notes\n- Le temps de cuisson original (« 8 heures ») dans la recette source est manifestement une coquille (s'agissant d'une cuisson à la poêle en 15 minutes max). J'ai mis 15 min comme valeur réaliste.\n- 4 demi-poitrines pour 6 portions semble peu — peut-être augmenter la quantité si servi seul, ou bien le poulet est complété par des accompagnements.\n"}, {"folder": "Végé", "filename": "buddha-bowl-grecque.md", "id": "Végé__buddha-bowl-grecque", "raw": "---\ntitre: Buddha bowl à la grecque\nportions: 4\ntemps_prep: 20 min\ntemps_cuisson: 15 min\ncalories: 395\nproteines: 16\nglucides: 51\nlipides: 16\ntags: [végé, bowl, grec, four]\nderniere_fois: \n---\n\n## Ingrédients\n\n### Légumes grillés\n- 1 courgette verte (zucchini) moyenne en rondelles\n- 1 oignon rouge en rondelles\n- 1 poivron rouge en gros cubes\n- 30 ml (2 c. à soupe) huile d'olive\n- 2,5 ml (1/2 c. à thé) thym séché\n- 2,5 ml (1/2 c. à thé) origan séché\n- Poivre\n\n### Base\n- 2 boîtes de 398 ml (14 oz) riz sauvage précuit, rincé et égoutté (ou 500 ml / 2 tasses de riz sauvage cuit)\n\n### Sauce au yogourt\n- 125 ml (1/2 tasse) yogourt nature\n- 30 ml (2 c. à soupe) beurre de sésame (tahini)\n- 30 ml (2 c. à soupe) lait\n- 5 ml (1 c. à thé) ail haché en pot (ou 1 gousse hachée finement)\n- 5 ml (1 c. à thé) miel du Québec\n- Poivre et sel\n\n### Garniture\n- 1 barquette de tomates cerises coupées en 2 (environ 15 tomates)\n- 2 concombres libanais en tranches\n- 1 boîte de 540 ml (19 oz) pois chiches rincés et égouttés\n- 60 ml (1/4 tasse) fromage feta léger émietté\n- 1 citron en quartiers\n\n## Préparation\n1. Placer la grille du four à la position la plus haute. Préchauffer le four à gril (broil). Tapisser une plaque de cuisson de papier d'aluminium.\n2. Déposer la courgette, l'oignon et le poivron sur la plaque. Ajouter l'huile et les herbes séchées. Mélanger avec les mains pour bien enrober les légumes et les répartir sur la plaque. Poivrer généreusement. Cuire sous le gril de 10 à 12 minutes ou jusqu'à ce que les légumes soient grillés.\n3. Pendant ce temps, dans un bol moyen, mélanger tous les ingrédients de la sauce au yogourt. Poivrer généreusement et ajouter une pincée de sel.\n4. Au moment de servir, dans un bol moyen allant au four à micro-ondes, chauffer le riz 1 minute.\n5. Dans 4 bols de service, répartir les légumes grillés, le riz et les garnitures côte à côte. Garnir chaque bol de 45 ml (3 c. à soupe) de sauce.\n\n## Notes\n- Cette recette est meilleure préparée à la dernière minute.\n- Variante : ajouter olives, cœurs d'artichauts, laitue ou herbes fraîches selon le contenu du frigo.\n"}, {"folder": "Végé", "filename": "pizza-mexicaine.md", "id": "Végé__pizza-mexicaine", "raw": "---\ntitre: Pizza mexicaine\nportions: 8\ntemps_prep: 5 min\ntemps_cuisson: 15 min\ncalories: 246\nproteines: 17\nglucides: 25\nlipides: 10\ntags: [végé, pizza, mexicain, four]\nderniere_fois: \n---\n\n## Ingrédients\n\n### Pizza\n- 2 croûtes souples à pizza (du commerce)\n- 250 ml (1 tasse) salsa douce ou piquante\n- 1 paquet de 340 g (3/4 lb) sans-viande haché à la mexicaine (de type Yves Veggie Cuisine)\n- 125 ml (1/2 tasse) maïs en grains surgelés non décongelés\n- 1 poivron rouge en petits dés\n- 60 ml (1/4 tasse) oignon rouge haché finement\n- 500 ml (2 tasses) fromage râpé tex-mex (mélange du commerce)\n\n### Garniture\n- 60 ml (1/4 tasse) yogourt grec nature\n- 125 ml (1/2 tasse) coriandre fraîche hachée finement\n\n## Préparation\n1. Préchauffer le four à 200 °C (400 °F). Placer la grille au centre du four.\n2. Dans l'ordre, garnir chaque croûte de salsa, de sans-viande haché, de maïs, de poivron, d'oignon et de fromage.\n3. Déposer directement les pizzas sur les grilles du four et cuire 15 minutes.\n4. Dorer le fromage sous le gril (broil) 2 minutes.\n5. Au moment de servir, garnir de yogourt et de coriandre.\n\n## Notes\n- Se conserve 4 jours au réfrigérateur sans le yogourt et la coriandre. Ne se congèle pas.\n- 8 portions = 2 pointes par portion.\n- Le sans-viande haché est ~10× moins gras et 30 % moins cher que le bœuf haché extra-maigre, mais 5× plus salé.\n"}, {"folder": "Végé", "filename": "salade-pommes-kale.md", "id": "Végé__salade-pommes-kale", "raw": "---\ntitre: Salade de pommes et de kale\nportions: 6\ntemps_prep: 10 min\ntemps_cuisson: aucune\ncalories: 217\nproteines: 10\nglucides: 26\nlipides: 10\ntags: [végé, salade, lunch]\nderniere_fois: \n---\n\n## Ingrédients\n- 1 échalote française hachée\n- 30 ml (2 c. à soupe) vinaigre de cidre\n- 30 ml (2 c. à soupe) huile d'olive\n- 15 ml (1 c. à soupe) moutarde à l'ancienne (ou moutarde de Meaux)\n- 15 ml (1 c. à soupe) sirop d'érable\n- 2 L (8 tasses) kale haché sans les tiges (chou frisé, environ 1 botte)\n- Poivre et sel\n- 3 pommes Honeycrisp ou Gala non pelées en fines lamelles\n- 125 ml (1/2 tasse) fromage feta léger émietté\n- 125 ml (1/2 tasse) graines de citrouille décortiquées\n\n## Préparation\n1. Dans un saladier ou un grand bol de service, mélanger l'échalote, le vinaigre, l'huile, la moutarde et le sirop d'érable.\n2. Ajouter le kale, poivrer généreusement et ajouter une pincée de sel. Mélanger en pressant avec les doigts pour faire pénétrer la vinaigrette dans le chou afin de l'attendrir. Incorporer les pommes.\n3. Au moment de servir, garnir de fromage feta et de graines de citrouille. Servir en accompagnement d'une poitrine de poulet ou d'une côtelette de porc grillée.\n\n## Notes\n- Se conserve 4 jours au réfrigérateur et ne se congèle pas. Encore meilleure le lendemain.\n- Honeycrisp et Gala ne brunissent pas et restent croquantes plusieurs jours.\n- Kale plus robuste que la laitue : idéal pour les lunchs sans salade détrempée.\n- En cas d'allergie aux produits laitiers : remplacer le feta par du tofu mariné.\n"}, {"folder": "Végé", "filename": "socca-pizza.md", "id": "Végé__socca-pizza", "raw": "---\ntitre: Socca pizza\nportions: 2\ntemps_prep: 10 min\ntemps_cuisson: 10 min\ntags: [méditerranéen, végé, pizza, four, rapide]\ncalories: 270\nproteines: 16\nglucides: 22\nlipides: 11\nnutrition_estimee: true\nderniere_fois: \n---\n\n## Ingrédients\n\n### Pâte\n- 125 ml (1/2 tasse) farine de pois chiches\n- 125 ml (1/2 tasse) eau\n- 1 œuf\n- 2,5 ml (1/2 c. à thé) graines de fenouil\n- Poivre et sel\n- 5 ml (1 c. à thé) huile d'olive\n\n### Garniture\n- 1/2 courgette (zucchini) tranchée très finement\n- 6 boules fromage bocconcini de taille cocktail (60 g / 2 oz)\n- 60 ml (1/4 tasse) sauce à pizza du commerce\n- Feuilles de basilic frais déchiquetées\n\n## Préparation\n1. Préchauffer le four à gril (broil).\n2. Dans un bol moyen, à l'aide d'un fouet, mélanger la farine, l'eau, l'œuf et les graines de fenouil. Poivrer généreusement et ajouter une pincée de sel.\n3. Dans un poêlon antiadhésif allant au four, chauffer l'huile à feu moyen-vif. Verser la pâte dans le poêlon et cuire 2 ou 3 minutes, sans remuer. Terminer la cuisson sous le gril (broil) 2 ou 3 minutes ou jusqu'à ce que la socca soit légèrement dorée.\n4. Répartir la courgette sur la socca. Déchirer le fromage en morceaux et répartir sur les courgettes. Parsemer de petites cuillerées de sauce à pizza.\n5. Poursuivre la cuisson sous le gril (broil) 2 minutes pour faire fondre le fromage.\n6. Pour servir, garnir de basilic frais. Accompagner d'une salade verte, si désiré.\n\n## Notes\n- Se conserve 3 jours au réfrigérateur, ne se congèle pas.\n- Originaire du sud de la France, la socca est un pain plat sans gluten préparé à base de farine de pois chiches. La cousine italienne s'appelle la farinata.\n- En cas d'allergie aux œufs : remplacer l'œuf par 15 ml (1 c. à soupe) de graines de lin moulues trempées 5 minutes dans 30 ml (2 c. à soupe) d'eau.\n"}];

const FOLDER_META = {
  'Volaille': { icon: '🍗', order: 0 },
  'Boeuf':    { icon: '🥩', order: 1 },
  'Porc':     { icon: '🐖', order: 2 },
  'Poisson':  { icon: '🐟', order: 3 },
  'Végé':     { icon: '🥦', order: 4 },
  'Divers':   { icon: '✨', order: 5 },
  'Autres':   { icon: '📦', order: 99 },
};
const folderIcon = f => (FOLDER_META[f] || {}).icon || '📦';
const folderOrder = f => (FOLDER_META[f] || {}).order ?? 50;

// ---------- Markdown parsing ----------

function parseRecipe(raw) {
  const fmMatch = raw.match(/^---\n([\s\S]*?)\n---\n([\s\S]*)$/);
  if (!fmMatch) return null;

  const fm = {};
  fmMatch[1].split('\n').forEach(line => {
    const m = line.match(/^([\w_]+):\s*(.*)$/);
    if (m) fm[m[1]] = m[2].trim();
  });

  const body = fmMatch[2];
  const ingrMatch = body.match(/##\s*Ingr[ée]dients\s*\n([\s\S]*?)(?=\n##\s|$)/);
  const ingredients = [];
  let currentSubsection = null;

  if (ingrMatch) {
    ingrMatch[1].split('\n').forEach(line => {
      const subMatch = line.match(/^###\s+(.+?)\s*$/);
      if (subMatch) {
        currentSubsection = subMatch[1].trim();
        return;
      }
      const itemMatch = line.match(/^-\s+(.+)$/);
      if (itemMatch) {
        ingredients.push({ raw: itemMatch[1].trim(), subsection: currentSubsection });
      }
    });
  }

  const tagsMatch = (fm.tags || '').match(/\[(.*)\]/);
  const tags = tagsMatch
    ? tagsMatch[1].split(',').map(t => t.trim()).filter(Boolean)
    : [];

  return {
    titre: fm.titre || '(sans titre)',
    portions: parseInt(fm.portions) || 1,
    tempsPrep: fm.temps_prep || '',
    tempsCuisson: fm.temps_cuisson || '',
    tags,
    ingredients,
    calories: parseInt(fm.calories) || null,
    proteines: parseInt(fm.proteines) || null,
    glucides: parseInt(fm.glucides) || null,
    lipides: parseInt(fm.lipides) || null,
    nutritionEstimee: (fm.nutrition_estimee || '').toLowerCase() === 'true',
  };
}

// ---------- Ingredient parsing ----------

const UNIT_PATTERN = '(?:g|kg|ml|l|L|lb|oz|tasses?|c\\.\\s*à\\s*th[ée]|c\\.\\s*à\\s*soupe|gousses?|bo[îi]tes?|pots?|feuilles?|brins?|pieds?|t[êe]tes?|bottes?|paquets?|filets?|tranches?|morceaux?|quartiers?|conserves?|sachets?|contenants?|branches?|pinc[ée]es?|cubes?)';

function parseQty(s) {
  s = s.replace(/\s+/g, ' ').trim().replace(',', '.');
  const mixed = s.match(/^(\d+)\s+(\d+)\/(\d+)$/);
  if (mixed) return parseInt(mixed[1]) + parseInt(mixed[2]) / parseInt(mixed[3]);
  const frac = s.match(/^(\d+)\/(\d+)$/);
  if (frac) return parseInt(frac[1]) / parseInt(frac[2]);
  const n = parseFloat(s);
  return isNaN(n) ? null : n;
}

function parseIngredient(raw) {
  const qtyRe = /^((?:\d+\s+\d+\/\d+)|(?:\d+[.,]\d+)|(?:\d+\/\d+)|(?:\d+))\s+/;
  const qtyMatch = raw.match(qtyRe);

  let qty = null;
  let rest = raw;
  if (qtyMatch) {
    qty = parseQty(qtyMatch[1]);
    rest = raw.slice(qtyMatch[0].length);
  }

  const unitRe = new RegExp('^(' + UNIT_PATTERN + ')\\s+', 'i');
  const unitMatch = rest.match(unitRe);
  let unit = null;
  if (unitMatch) {
    unit = unitMatch[1].toLowerCase().replace(/\s+/g, ' ').trim();
    rest = rest.slice(unitMatch[0].length);
  }

  rest = rest.replace(/^\([^)]*\)\s*/, '');
  rest = rest.replace(/^d['e]\s+/i, '');

  return { qty, unit, name: rest.trim() };
}

function formatQty(n) {
  if (n === null || n === undefined) return '';
  if (Math.abs(n - Math.round(n)) < 0.01) return String(Math.round(n));
  return n.toFixed(2).replace(/\.?0+$/, '').replace('.', ',');
}

// ---------- Categorization ----------

function normalizeName(name) {
  return name
    .toLowerCase()
    .replace(/œ/g, 'oe').replace(/æ/g, 'ae')
    .normalize('NFKD').replace(/[̀-ͯ]/g, '')
    .replace(/[,;:]/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

function nameForMatching(name) {
  return normalizeName(name)
    .replace(/\b(haches?|hachees?|finement|grossierement|tranches?|tranchees?|coupes?|coupees?|emincees?|en\s+(cubes?|des|lanieres|quartiers|biseau|julienne|petales?|rondelles|morceaux|tronc?ons|fines\s+tranches|fleurettes|bouquets?|aiguillettes))\b/g, '')
    .replace(/\b(divises?|divisees?|au\s+gout|au\s+choix|nature|moulus?|moulues?|broyes?|broyees?|rapes?|rapees?|effiloches?|effilochees?|battu|battue|legerement|emiette[es]?)\b/g, '')
    .replace(/\s+/g, ' ')
    .trim();
}

function normalizeUnit(u) {
  if (!u) return null;
  return u.replace(/s$/, '').replace(/\s+/g, ' ');
}

function categorize(name) {
  const n = nameForMatching(name);
  for (const [cat, kws] of CATEGORIES) {
    for (const kw of kws) {
      if (n.includes(kw)) return cat;
    }
  }
  return 'Autres';
}

// ---------- State ----------

const recipes = RECIPES_RAW.map(r => ({
  ...r,
  ...parseRecipe(r.raw),
}));

const STATE_KEY = 'gestion_alimentaire_state_v1';
const state = loadState();
const filters = {
  search: '',
  folders: new Set(),
};

function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem(STATE_KEY) || '{}');
    return {
      selected: s.selected || {},
      checked: s.checked || {},
    };
  } catch {
    return { selected: {}, checked: {} };
  }
}

function saveState() {
  localStorage.setItem(STATE_KEY, JSON.stringify(state));
}

function recipeMatchesFilters(r) {
  if (filters.search) {
    const q = filters.search.toLowerCase();
    if (!r.titre.toLowerCase().includes(q)) return false;
  }
  if (filters.folders.size > 0 && !filters.folders.has(r.folder)) return false;
  return true;
}

function selectedRecipes() {
  return recipes.filter(r => state.selected[r.id]);
}

// ---------- Sidebar gauche : catégories ----------

function renderCategories() {
  const counts = {};
  for (const r of recipes) counts[r.folder] = (counts[r.folder] || 0) + 1;

  const folders = Object.keys(counts).sort((a, b) => folderOrder(a) - folderOrder(b));

  const root = document.getElementById('cat-list');
  root.innerHTML = '';

  // « Tout »
  const allBtn = document.createElement('button');
  allBtn.type = 'button';
  allBtn.className = 'cat-item' + (filters.folders.size === 0 ? ' active' : '');
  allBtn.innerHTML = `
    <span class="cat-icon">🍽️</span>
    <span>Tout</span>
    <span class="cat-count">${recipes.length}</span>
  `;
  allBtn.addEventListener('click', () => {
    filters.folders.clear();
    renderCategories();
    render();
  });
  root.appendChild(allBtn);

  for (const f of folders) {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'cat-item' + (filters.folders.has(f) ? ' active' : '');
    btn.innerHTML = `
      <span class="cat-icon">${folderIcon(f)}</span>
      <span>${f}</span>
      <span class="cat-count">${counts[f]}</span>
    `;
    btn.addEventListener('click', () => {
      if (filters.folders.has(f)) filters.folders.delete(f);
      else filters.folders.add(f);
      renderCategories();
      render();
    });
    root.appendChild(btn);
  }
}

// ---------- Bannière sélection ----------

function renderHero() {
  const hero = document.getElementById('hero');
  const sel = selectedRecipes();

  if (sel.length === 0) {
    hero.innerHTML = `
      <div class="hero-empty">
        <div class="hero-empty-icon">👨‍🍳</div>
        <div>
          <h2>Bonjour Bittle&nbsp;!</h2>
          <p>Sélectionne des recettes pour générer ta liste de courses.</p>
        </div>
      </div>
    `;
    return;
  }

  hero.innerHTML = `
    <div class="hero-header">
      <h2>Recettes sélectionnées <span class="count-badge">${sel.length}</span></h2>
      <div style="display:flex; gap:0.5rem">
        <button class="btn-primary" id="generate-btn">Générer la liste de courses</button>
        <button class="reset-btn" id="clear-selection" style="margin:0; width:auto">Tout retirer</button>
      </div>
    </div>
    <div class="selected-grid" id="selected-grid"></div>
  `;

  const grid = document.getElementById('selected-grid');
  for (const r of sel) {
    grid.appendChild(renderMiniCard(r));
  }

  document.getElementById('generate-btn').addEventListener('click', generate);
  document.getElementById('clear-selection').addEventListener('click', () => {
    if (!confirm('Retirer toutes les recettes sélectionnées ?')) return;
    state.selected = {};
    state.checked = {};
    saveState();
    document.getElementById('shopping').classList.add('hidden');
    rerenderAll();

}

function renderMiniCard(r) {
  const card = document.createElement('div');
  card.className = 'mini-card';
  const sel = state.selected[r.id];
  const wanted = sel ? sel.wantedPortions : r.portions;

  card.innerHTML = `
    <div class="mini-card-header">
      <div class="mini-card-title">${folderIcon(r.folder)} ${r.titre}</div>
      <button class="mini-card-remove" title="Retirer">×</button>
    </div>
    <div class="mini-card-controls">
      <input type="number" min="1" value="${wanted}">
      <span>portions</span>
    </div>
  `;

  card.querySelector('.mini-card-remove').addEventListener('click', () => {
    delete state.selected[r.id];
    saveState();
    rerenderAll();
  });

  const input = card.querySelector('input');
  input.addEventListener('change', () => {
    const v = Math.max(1, parseInt(input.value) || r.portions);
    if (state.selected[r.id]) {
      state.selected[r.id].wantedPortions = v;
      saveState();
      renderNutrition();
    }
  });

  return card;
}

// ---------- Sidebar droite : nutrition ----------

function renderNutrition() {
  const root = document.getElementById('nutri-content');
  const sel = selectedRecipes();

  if (sel.length === 0) {
    root.innerHTML = `<p class="nutri-placeholder">Sélectionne des recettes pour voir les valeurs nutritionnelles.</p>`;
    return;
  }

  let totalCalories = 0, totalProteines = 0, totalGlucides = 0, totalLipides = 0;
  let totalPortions = 0;
  let recipesWithoutData = [];
  let hasEstimated = false;
  for (const r of sel) {
    const wanted = state.selected[r.id].wantedPortions;
    totalPortions += wanted;
    const factor = wanted / r.portions;
    if (r.calories !== null || r.proteines !== null || r.glucides !== null || r.lipides !== null) {
      if (r.nutritionEstimee) hasEstimated = true;
      if (r.calories !== null)  totalCalories  += r.calories  * factor;
      if (r.proteines !== null) totalProteines += r.proteines * factor;
      if (r.glucides !== null)  totalGlucides  += r.glucides  * factor;
      if (r.lipides !== null)   totalLipides   += r.lipides   * factor;
    } else {
      recipesWithoutData.push(r.titre);
    }
  }

  const fmt = v => v > 0 ? Math.round(v) : '—';
  const prefix = hasEstimated ? '≈ ' : '';
  const missingNote = recipesWithoutData.length > 0
    ? `<p class="nutri-placeholder" style="margin-top:1rem">⚠ ${recipesWithoutData.length} recette${recipesWithoutData.length > 1 ? 's' : ''} sans données nutritionnelles</p>`
    : '';
  const estimatedNote = hasEstimated
    ? `<p class="nutri-placeholder" style="margin-top:0.5rem; font-size:0.72rem">≈ inclut des valeurs estimées (USDA / Santé Canada)</p>`
    : '';

  root.innerHTML = `
    <div class="nutri-total">
      <div class="nutri-total-value">${prefix}${fmt(totalCalories)}</div>
      <div class="nutri-total-label">calories totales</div>
    </div>
    <div class="nutri-row">
      <span class="nutri-label">Protéines</span>
      <span class="nutri-value">${prefix}${fmt(totalProteines)} g</span>
    </div>
    <div class="nutri-row">
      <span class="nutri-label">Glucides</span>
      <span class="nutri-value">${prefix}${fmt(totalGlucides)} g</span>
    </div>
    <div class="nutri-row">
      <span class="nutri-label">Lipides</span>
      <span class="nutri-value">${prefix}${fmt(totalLipides)} g</span>
    </div>

    <div class="nutri-per-portion">
      <div class="panel-subtitle">Par portion (${totalPortions} au total)</div>
      <div class="nutri-row">
        <span class="nutri-label">Calories</span>
        <span class="nutri-value">${totalPortions && totalCalories ? prefix + fmt(totalCalories / totalPortions) : '—'}</span>
      </div>
      <div class="nutri-row">
        <span class="nutri-label">Protéines</span>
        <span class="nutri-value">${totalPortions && totalProteines ? prefix + fmt(totalProteines / totalPortions) + ' g' : '—'}</span>
      </div>
      <div class="nutri-row">
        <span class="nutri-label">Glucides</span>
        <span class="nutri-value">${totalPortions && totalGlucides ? prefix + fmt(totalGlucides / totalPortions) + ' g' : '—'}</span>
      </div>
      <div class="nutri-row">
        <span class="nutri-label">Lipides</span>
        <span class="nutri-value">${totalPortions && totalLipides ? prefix + fmt(totalLipides / totalPortions) + ' g' : '—'}</span>
      </div>
    </div>
    ${estimatedNote}
    ${missingNote}
  `;
}

// ---------- Liste de recettes ----------

function render() {
  const root = document.getElementById('recipes-section');
  root.innerHTML = '';

  const visible = recipes.filter(recipeMatchesFilters);

  if (visible.length === 0) {
    const msg = document.createElement('div');
    msg.className = 'empty-state';
    msg.textContent = 'Aucune recette ne correspond aux filtres.';
    root.appendChild(msg);
    return;
  }

  const byFolder = {};
  for (const r of visible) {
    if (!byFolder[r.folder]) byFolder[r.folder] = [];
    byFolder[r.folder].push(r);
  }

  const folders = Object.keys(byFolder).sort((a, b) => folderOrder(a) - folderOrder(b));

  for (const folder of folders) {
    const section = document.createElement('div');
    section.className = 'folder';
    section.innerHTML = `<h2>${folderIcon(folder)} ${folder}</h2>`;
    const list = document.createElement('div');
    list.className = 'recipe-list';
    for (const r of byFolder[folder].sort((a, b) => a.titre.localeCompare(b.titre))) {
      list.appendChild(renderRecipe(r));
    }
    section.appendChild(list);
    root.appendChild(section);
  }
}

function renderRecipe(r) {
  const card = document.createElement('div');
  card.className = 'recipe';
  const sel = state.selected[r.id];
  if (sel) card.classList.add('selected');

  const top = document.createElement('div');
  top.className = 'recipe-top';

  const title = document.createElement('div');
  title.className = 'recipe-title';
  title.textContent = r.titre;

  const cb = document.createElement('div');
  cb.className = 'recipe-checkbox' + (sel ? ' checked' : '');
  cb.innerHTML = sel ? '✓' : '';

  const toggleSelect = () => {
    if (state.selected[r.id]) {
      delete state.selected[r.id];
    } else {
      state.selected[r.id] = { wantedPortions: r.portions };
    }
    saveState();
    rerenderAll();
  };

  cb.addEventListener('click', toggleSelect);
  title.addEventListener('click', toggleSelect);

  top.appendChild(title);
  top.appendChild(cb);

  const meta = document.createElement('div');
  meta.className = 'recipe-meta';
  const metaParts = [`${r.portions} portions`];
  if (r.tempsPrep) metaParts.push(`prép. ${r.tempsPrep}`);
  if (r.tempsCuisson) metaParts.push(`cuisson ${r.tempsCuisson}`);
  if (r.calories) metaParts.push(`${r.nutritionEstimee ? '≈ ' : ''}${r.calories} cal`);
  meta.innerHTML = metaParts.map(p => `<span>${p}</span>`).join('');

  const actions = document.createElement('div');
  actions.className = 'recipe-actions';
  const viewBtn = document.createElement('button');
  viewBtn.type = 'button';
  viewBtn.className = 'btn-view';
  viewBtn.textContent = 'Voir les ingrédients';
  viewBtn.addEventListener('click', e => {
    e.stopPropagation();
    showIngredientsModal(r);
  });
  actions.appendChild(viewBtn);

  card.appendChild(top);
  card.appendChild(meta);
  card.appendChild(actions);
  return card;
}

// ---------- Modal ingrédients ----------

function showIngredientsModal(r) {
  const root = document.getElementById('modal-root');
  root.innerHTML = '';

  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop';
  backdrop.addEventListener('click', e => {
    if (e.target === backdrop) closeModal();
  });

  const modal = document.createElement('div');
  modal.className = 'modal';

  const header = document.createElement('div');
  header.className = 'modal-header';
  const titleWrap = document.createElement('div');
  const metaParts = [];
  if (r.portions) metaParts.push(`${r.portions} portions`);
  if (r.tempsPrep) metaParts.push(`prép. ${r.tempsPrep}`);
  if (r.tempsCuisson) metaParts.push(`cuisson ${r.tempsCuisson}`);
  if (r.calories) metaParts.push(`${r.nutritionEstimee ? '≈ ' : ''}${r.calories} cal`);
  titleWrap.innerHTML = `<h2>${folderIcon(r.folder)} ${r.titre}</h2>` +
    (metaParts.length ? `<div class="modal-meta">${metaParts.join(' · ')}</div>` : '');
  const closeBtn = document.createElement('button');
  closeBtn.className = 'modal-close';
  closeBtn.type = 'button';
  closeBtn.innerHTML = '×';
  closeBtn.setAttribute('aria-label', 'Fermer');
  closeBtn.addEventListener('click', closeModal);
  header.appendChild(titleWrap);
  header.appendChild(closeBtn);
  modal.appendChild(header);

  const bySub = {};
  const order = [];
  for (const ing of r.ingredients) {
    const key = ing.subsection || '';
    if (!(key in bySub)) {
      bySub[key] = [];
      order.push(key);
    }
    bySub[key].push(ing.raw);
  }

  if (r.ingredients.length === 0) {
    const p = document.createElement('p');
    p.className = 'empty-state';
    p.textContent = 'Aucun ingrédient listé.';
    modal.appendChild(p);
  } else {
    for (const sub of order) {
      if (sub) {
        const h3 = document.createElement('h3');
        h3.textContent = sub;
        modal.appendChild(h3);
      }
      const ul = document.createElement('ul');
      for (const item of bySub[sub]) {
        const li = document.createElement('li');
        li.textContent = item;
        ul.appendChild(li);
      }
      modal.appendChild(ul);
    }
  }

  backdrop.appendChild(modal);
  root.appendChild(backdrop);
  document.addEventListener('keydown', escClose);
}

function escClose(e) {
  if (e.key === 'Escape') closeModal();
}

function closeModal() {
  document.getElementById('modal-root').innerHTML = '';
  document.removeEventListener('keydown', escClose);
}

// ---------- Liste de courses ----------

function generate() {
  const items = [];
  for (const r of recipes) {
    const sel = state.selected[r.id];
    if (!sel) continue;
    const factor = sel.wantedPortions / r.portions;
    for (const ing of r.ingredients) {
      const parsed = parseIngredient(ing.raw);
      const scaledQty = parsed.qty !== null ? parsed.qty * factor : null;
      items.push({
        qty: scaledQty,
        unit: parsed.unit,
        unitKey: normalizeUnit(parsed.unit) || '',
        name: parsed.name,
        nameKey: nameForMatching(parsed.name),
        category: categorize(parsed.name),
        fromRecipe: r.titre,
      });
    }
  }

  const byCategory = {};
  for (const item of items) {
    if (!byCategory[item.category]) byCategory[item.category] = new Map();
    const map = byCategory[item.category];
    const key = `${item.nameKey}||${item.unitKey}`;

    if (map.has(key)) {
      const ex = map.get(key);
      if (ex.qty !== null && item.qty !== null) {
        ex.qty += item.qty;
        if (!ex.fromRecipes.includes(item.fromRecipe)) {
          ex.fromRecipes.push(item.fromRecipe);
        }
        continue;
      }
      map.set(`${key}__dup${map.size}`, {
        qty: item.qty, unit: item.unit, name: item.name,
        fromRecipes: [item.fromRecipe],
      });
    } else {
      map.set(key, {
        qty: item.qty, unit: item.unit, name: item.name,
        fromRecipes: [item.fromRecipe],
      });
    }
  }

  renderShopping(byCategory);
  document.getElementById('shopping').classList.remove('hidden');
  document.getElementById('shopping').scrollIntoView({ behavior: 'smooth' });
}

function renderShopping(byCategory) {
  const root = document.getElementById('shopping-list');
  root.innerHTML = '';

  const order = [
    'Viandes & charcuterie',
    'Produits laitiers & œufs',
    'Fruits & légumes',
    'Conserves & bocaux',
    'Pain, pâtes & céréales',
    'Sauces & condiments',
    'Bouillons & vins',
    'Sucré & sirops',
    'Huiles',
    'Épices & herbes séchées',
    'Autres',
  ];

  for (const cat of order) {
    if (!byCategory[cat]) continue;
    const div = document.createElement('div');
    div.className = 'category';
    div.innerHTML = `<h3>${cat}</h3>`;
    const items = Array.from(byCategory[cat].values())
      .sort((a, b) => a.name.localeCompare(b.name));
    for (const it of items) {
      div.appendChild(renderItem(it));
    }
    root.appendChild(div);
  }
}

function renderItem(it) {
  const row = document.createElement('div');
  row.className = 'item';
  const key = `${nameForMatching(it.name)}||${it.unit || ''}`;
  if (state.checked[key]) row.classList.add('checked');

  const cb = document.createElement('input');
  cb.type = 'checkbox';
  cb.checked = !!state.checked[key];
  cb.addEventListener('change', () => {
    state.checked[key] = cb.checked;
    saveState();
    row.classList.toggle('checked', cb.checked);
  });

  const text = document.createElement('div');
  text.className = 'item-text';
  const qtyStr = it.qty !== null ? `${formatQty(it.qty)} ` : '';
  const unitStr = it.unit ? `${it.unit} ` : '';
  text.innerHTML = `<div>${qtyStr}${unitStr}${it.name}</div>`;
  if (it.fromRecipes.length >= 1) {
    const from = document.createElement('div');
    from.className = 'item-from';
    from.textContent = `↳ ${it.fromRecipes.join(' + ')}`;
    text.appendChild(from);
  }

  row.appendChild(cb);
  row.appendChild(text);
  return row;
}

function rerenderAll() {
  renderCategories();
  renderHero();
  renderNutrition();
  render();
}

document.getElementById('reset-filters').addEventListener('click', () => {
  filters.search = '';
  filters.folders.clear();
  document.getElementById('search').value = '';
  renderCategories();
  render();
});

document.getElementById('search').addEventListener('input', e => {
  filters.search = e.target.value.trim();
  render();
});

rerenderAll();
</script>
</body>
</html>
