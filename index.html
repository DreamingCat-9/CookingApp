ique\n- 15 ml (1 c. à soupe) sauce Worcestershire (sauce anglaise)\n- 15 ml (1 c. à soupe) ail haché en pot (ou 3 gousses d'ail)\n\n## Préparation\n1. Dans le récipient de la mijoteuse, déposer le rôti et poivrer des 2 côtés.\n2. Si vous utilisez des gousses d'ail fraîches, les hacher finement. Dans un petit bol, mélanger tous les ingrédients de la marinade et verser uniformément sur le rôti.\n3. Couvrir et cuire à intensité maximale 5 heures ou jusqu'à ce que la viande se défasse à la fourchette.\n4. Servir sur une purée de légumes.\n\n## Notes\n- Se conserve 5 jours au réfrigérateur ou 6 mois au congélateur. Effilocher la viande et conserver dans son jus de cuisson pour qu'elle demeure juteuse.\n- Variante : utiliser les restes pour préparer un pâté chinois avec maïs en grains et purée de pommes de terre.\n- Astuce : à faible intensité, le rôti prendra 8 heures et restera en mode réchaud jusqu'au retour.\n", "macros_par_ingredient": [{"raw": "Poivre", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}, {"raw": "1 kg (2 lb) rôti de palette de bœuf", "grams": 1000.0, "kcal": 1470.0, "prot": 205.6, "gluc": 0.0, "lip": 67.3, "canonical": "boeuf_palette", "status": "ok"}, {"raw": "15 ml (1 c. à soupe) fines herbes séchées (mélange à l'italienne)", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": "herbes_seches_generic", "status": "skip"}, {"raw": "30 ml (2 c. à soupe) moutarde à l'ancienne (ou moutarde de Meaux)", "grams": 31.6, "kcal": 18.9, "prot": 1.18, "gluc": 1.84, "lip": 1.05, "canonical": "moutarde_ancienne", "status": "ok"}, {"raw": "15 ml (1 c. à soupe) vinaigre balsamique", "grams": 16.2, "kcal": 14.2, "prot": 0.08, "gluc": 2.75, "lip": 0.0, "canonical": "vinaigre_balsamique", "status": "ok"}, {"raw": "15 ml (1 c. à soupe) sauce Worcestershire (sauce anglaise)", "grams": 17.4, "kcal": 13.6, "prot": 0.0, "gluc": 3.39, "lip": 0.0, "canonical": "sauce_worcestershire", "status": "ok"}, {"raw": "15 ml (1 c. à soupe) ail haché en pot (ou 3 gousses d'ail)", "grams": 8.6, "kcal": 12.8, "prot": 0.55, "gluc": 2.85, "lip": 0.04, "canonical": "ail_pot", "status": "ok"}]}, {"folder": "Boeuf", "filename": "roti-palette-mijoteuse.md", "id": "Boeuf__roti-palette-mijoteuse", "raw": "---\ntitre: Rôti de palette à la mijoteuse\nportions: 15\ntemps_prep: 20 min\ntemps_cuisson: 8 h\ntags: [mijoteuse, rôti]\ncertifie_bittle: true\n---\n\n## Ingrédients\n\n### Bœuf\n- 30 ml (2 c. à soupe) beurre non salé\n- 1 kg (2,2 lb) rôti de palette de bœuf\n- 500 ml (2 tasses) eau\n- 1 mélange à soupe à l'oignon (1 sachet de 55 g)\n- 45 ml (3 c. à soupe) cassonade\n- 30 ml (2 c. à soupe) bouillon de bœuf liquide Bovril\n- 22 ml (1 1/2 c. à soupe) sauce soya régulière ou foncée (supérieure)\n- 3 gousses d'ail\n- 15 ml (1 c. à soupe) gingembre frais\n- 5 ml (1 c. à thé) moutarde de Dijon\n- 5 ml (1 c. à thé) moutarde à l'ancienne\n- Sel et poivre\n\n### Légumes (facultatifs)\n- 3 grosses carottes\n- 4 moyennes pommes de terre\n\n### Garniture\n- Persil ou thym frais\n\n## Préparation\n1. Hacher l'ail. Râper le gingembre. Couper les carottes en gros tronçons de 4 à 6 cm. Couper les pommes de terre en quartiers.\n2. Dans une grande poêle en acier inoxydable à feu moyen élevé, faire fondre le beurre. Saisir le rôti de palette environ 2 minutes de chaque côté pour lui donner une belle couleur.\n3. Déposer le rôti de palette saisi dans le fond de la mijoteuse.\n4. Dans un bol, mélanger l'eau avec le reste des ingrédients du bœuf. Verser le mélange sur le rôti saisi, ajouter les légumes (si désirés) dans la mijoteuse, couvrir et cuire 8 heures à faible intensité (basse température) ou 4 heures à intensité élevée pour une cuisson parfaite.\n5. Après le temps de cuisson, à l'aide de deux fourchettes, retirer les morceaux de gras ou les os de la viande et effilocher celle-ci.\n6. Servir les morceaux de viande avec la sauce au goût de bouillon de bœuf et les accompagnements désirés. Garnir de fines herbes comme du persil ou du thym frais.\n\n## Notes\n- 15 portions est ce qu'indique la recette originale, mais la quantité de viande (2,2 lb) suggère plutôt 6-8 portions raisonnables. À valider à la cuisson.\n", "macros_par_ingredient": [{"raw": "30 ml (2 c. à soupe) beurre non salé", "grams": 30.0, "kcal": 152.7, "prot": 0.99, "gluc": 0.0, "lip": 16.53, "canonical": "beurre", "status": "ok"}, {"raw": "1 kg (2,2 lb) rôti de palette de bœuf", "grams": 1000.0, "kcal": 1470.0, "prot": 205.6, "gluc": 0.0, "lip": 67.3, "canonical": "boeuf_palette", "status": "ok"}, {"raw": "500 ml (2 tasses) eau", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}, {"raw": "1 mélange à soupe à l'oignon (1 sachet de 55 g)", "grams": 55.0, "kcal": 188.1, "prot": 5.73, "gluc": 43.52, "lip": 0.57, "canonical": "poudre_oignon", "status": "ok"}, {"raw": "45 ml (3 c. à soupe) cassonade", "grams": 27.6, "kcal": 104.8, "prot": 0.03, "gluc": 27.05, "lip": 0.0, "canonical": "cassonade", "status": "ok"}, {"raw": "30 ml (2 c. à soupe) bouillon de bœuf liquide Bovril", "grams": 31.7, "kcal": 4.4, "prot": 0.62, "gluc": 0.48, "lip": 0.01, "canonical": "bouillon_boeuf", "status": "ok"}, {"raw": "22 ml (1 1/2 c. à soupe) sauce soya régulière ou foncée (supérieure)", "grams": 21.6, "kcal": 19.4, "prot": 1.77, "gluc": 3.12, "lip": 0.07, "canonical": "sauce_soya", "status": "ok"}, {"raw": "3 gousses d'ail", "grams": 9.0, "kcal": 13.4, "prot": 0.57, "gluc": 2.98, "lip": 0.04, "canonical": "ail_gousse", "status": "ok"}, {"raw": "15 ml (1 c. à soupe) gingembre frais", "grams": 6.1, "kcal": 4.9, "prot": 0.11, "gluc": 1.08, "lip": 0.05, "canonical": "gingembre_frais", "status": "ok"}, {"raw": "5 ml (1 c. à thé) moutarde de Dijon", "grams": 5.3, "kcal": 3.2, "prot": 0.2, "gluc": 0.31, "lip": 0.18, "canonical": "moutarde_dijon", "status": "ok"}, {"raw": "5 ml (1 c. à thé) moutarde à l'ancienne", "grams": 5.3, "kcal": 3.2, "prot": 0.2, "gluc": 0.31, "lip": 0.18, "canonical": "moutarde_ancienne", "status": "ok"}, {"raw": "Sel et poivre", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}, {"raw": "3 grosses carottes", "grams": 180.0, "kcal": 73.8, "prot": 1.67, "gluc": 17.24, "lip": 0.43, "canonical": "carotte", "status": "ok"}, {"raw": "4 moyennes pommes de terre", "grams": 120.0, "kcal": 92.4, "prot": 2.42, "gluc": 20.96, "lip": 0.11, "canonical": "pomme_de_terre", "status": "ok"}, {"raw": "Persil ou thym frais", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}]}, {"folder": "Boeuf", "filename": "roti-palette-oignons-erable.md", "id": "Boeuf__roti-palette-oignons-erable", "raw": "---\ntitre: Rôti de palette aux oignons et à l'érable à la mijoteuse\nportions: 6\ntemps_prep: 20 min\ntemps_cuisson: 8 h\ntags: [mijoteuse, rôti]\ncertifie_bittle: true\n---\n\n## Ingrédients\n- 30 ml (2 c. à soupe) poudre d'oignon\n- 5 ml (1 c. à thé) poudre d'ail\n- 30 ml (2 c. à soupe) moutarde de Dijon\n- 15 ml (1 c. à soupe) thym frais\n- Sel et poivre au goût\n- 1 rôti de palette de bœuf sans os de 900 g (2 lb)\n- 15 ml (1 c. à soupe) huile d'olive\n- 180 ml (3/4 tasse) bouillon de bœuf\n- 80 ml (1/3 tasse) sirop d'érable\n- 1 oignon\n- 4 carottes nantaises\n- 8 pommes de terre grelots\n- 1/2 petit rutabaga\n\n## Préparation\n1. Hacher le thym. Couper l'oignon en rondelles. Couper les carottes en morceaux. Couper le rutabaga en cubes.\n2. Dans un bol, mélanger la poudre d'oignon avec la poudre d'ail, la moutarde et le thym. Saler et poivrer.\n3. Retirer l'excédent de gras du rôti de palette.\n4. Dans une poêle, chauffer l'huile à feu moyen. Saisir le rôti de palette de 1 à 2 minutes de chaque côté. Transférer dans une assiette.\n5. Badigeonner les deux côtés du rôti avec la préparation à la moutarde. Déposer le rôti dans la mijoteuse.\n6. Ajouter le bouillon, le sirop d'érable et les légumes.\n7. Couvrir et cuire de 8 à 9 heures à faible intensité, jusqu'à ce que la viande se défasse facilement à la fourchette.\n", "macros_par_ingredient": [{"raw": "30 ml (2 c. à soupe) poudre d'oignon", "grams": 14.0, "kcal": 47.8, "prot": 1.46, "gluc": 11.07, "lip": 0.15, "canonical": "poudre_oignon", "status": "ok"}, {"raw": "5 ml (1 c. à thé) poudre d'ail", "grams": 2.8, "kcal": 9.4, "prot": 0.47, "gluc": 2.06, "lip": 0.02, "canonical": "poudre_ail", "status": "ok"}, {"raw": "30 ml (2 c. à soupe) moutarde de Dijon", "grams": 31.6, "kcal": 18.9, "prot": 1.18, "gluc": 1.84, "lip": 1.05, "canonical": "moutarde_dijon", "status": "ok"}, {"raw": "15 ml (1 c. à soupe) thym frais", "grams": 2.4, "kcal": 2.5, "prot": 0.14, "gluc": 0.6, "lip": 0.04, "canonical": "thym_frais", "status": "ok"}, {"raw": "Sel et poivre au goût", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}, {"raw": "1 rôti de palette de bœuf sans os de 900 g (2 lb)", "grams": 907.2, "kcal": 1333.6, "prot": 186.52, "gluc": 0.0, "lip": 61.05, "canonical": "boeuf_palette", "status": "ok"}, {"raw": "15 ml (1 c. à soupe) huile d'olive", "grams": 13.7, "kcal": 121.2, "prot": 0.0, "gluc": 0.0, "lip": 13.69, "canonical": "huile_olive", "status": "ok"}, {"raw": "180 ml (3/4 tasse) bouillon de bœuf", "grams": 190.2, "kcal": 26.6, "prot": 3.71, "gluc": 2.85, "lip": 0.04, "canonical": "bouillon_boeuf", "status": "ok"}, {"raw": "80 ml (1/3 tasse) sirop d'érable", "grams": 106.5, "kcal": 276.9, "prot": 0.04, "gluc": 71.25, "lip": 0.26, "canonical": "sirop_erable", "status": "ok"}, {"raw": "1 oignon", "grams": 110.0, "kcal": 44.0, "prot": 1.21, "gluc": 10.27, "lip": 0.11, "canonical": "oignon_jaune", "status": "ok"}, {"raw": "4 carottes nantaises", "grams": 240.0, "kcal": 98.4, "prot": 2.23, "gluc": 22.99, "lip": 0.58, "canonical": "carotte", "status": "ok"}, {"raw": "8 pommes de terre grelots", "grams": 240.0, "kcal": 184.8, "prot": 4.85, "gluc": 41.93, "lip": 0.22, "canonical": "pomme_de_terre", "status": "ok"}, {"raw": "1/2 petit rutabaga", "grams": 300.0, "kcal": 111.0, "prot": 3.24, "gluc": 25.86, "lip": 0.48, "canonical": "rutabaga", "status": "ok"}]}, {"folder": "Boeuf", "filename": "soupe-boeuf-udon.md", "id": "Boeuf__soupe-boeuf-udon", "raw": "---\ntitre: Soupe au boeuf et aux nouilles udon à la mijoteuse\nportions: 5\ntemps_prep: 20 min\ntemps_cuisson: 8 h\ntags: [asiatique, mijoteuse, soupe]\ncertifie_bittle: true\n---\n\n## Ingrédients\n\n### Soupe\n- 1 kg (2,2 lb) rôti de palette de boeuf désossé\n- 15 ml (1 c. à soupe) huile végétale\n- 1 oignon\n- 4 gousses d'ail\n- 15 ml (1 c. à soupe) gingembre frais\n- 1,5 litre (6 tasses) bouillon de boeuf\n- 75 ml (1/3 tasse) sauce hoisin, et plus pour le service\n- 5 ml (1 c. à thé) sauce sriracha, et plus pour le service\n- 2,5 ml (1/2 c. à thé) cinq-épices moulu\n\n### Garniture\n- 2 paquets de 200 g chacun de nouilles udon\n- 1 petit brocoli\n- 2 carottes\n\n## Préparation\n1. Couper le rôti de palette en 8 morceaux. Émincer l'oignon. Hacher l'ail et le gingembre. Couper le brocoli en petits bouquets. Couper les carottes en julienne.\n2. Dans une grande poêle antiadhésive à feu moyen-élevé, dorer le boeuf de chaque côté dans l'huile. Déposer dans la mijoteuse.\n3. Dans la même poêle à feu moyen, attendrir l'oignon, l'ail et le gingembre en remuant. Déglacer avec 250 ml (1 tasse) du bouillon. Transvider dans la mijoteuse. Ajouter le reste du bouillon, la sauce hoisin, la sauce sriracha et le cinq-épices.\n4. Couvrir et cuire à basse température (Low) 8 heures.\n5. Dans une grande casserole d'eau bouillante salée, cuire les nouilles et le brocoli 2 minutes. Ajouter les carottes et poursuivre la cuisson 30 secondes. Égoutter.\n6. Répartir les nouilles et les légumes dans des bols. Verser le bouillon chaud dans les bols. Garnir de la viande. Accompagner de sauce hoisin et de sauce sriracha, au goût.\n", "macros_par_ingredient": [{"raw": "1 kg (2,2 lb) rôti de palette de boeuf désossé", "grams": 1000.0, "kcal": 1470.0, "prot": 205.6, "gluc": 0.0, "lip": 67.3, "canonical": "boeuf_palette", "status": "ok"}, {"raw": "15 ml (1 c. à soupe) huile végétale", "grams": 13.8, "kcal": 122.2, "prot": 0.0, "gluc": 0.0, "lip": 13.82, "canonical": "huile_vegetale", "status": "ok"}, {"raw": "1 oignon", "grams": 110.0, "kcal": 44.0, "prot": 1.21, "gluc": 10.27, "lip": 0.11, "canonical": "oignon_jaune", "status": "ok"}, {"raw": "4 gousses d'ail", "grams": 12.0, "kcal": 17.9, "prot": 0.76, "gluc": 3.97, "lip": 0.06, "canonical": "ail_gousse", "status": "ok"}, {"raw": "15 ml (1 c. à soupe) gingembre frais", "grams": 6.1, "kcal": 4.9, "prot": 0.11, "gluc": 1.08, "lip": 0.05, "canonical": "gingembre_frais", "status": "ok"}, {"raw": "1,5 litre (6 tasses) bouillon de boeuf", "grams": 1585.4, "kcal": 222.0, "prot": 30.91, "gluc": 23.78, "lip": 0.32, "canonical": "bouillon_boeuf", "status": "ok"}, {"raw": "75 ml (1/3 tasse) sauce hoisin, et plus pour le service", "grams": 81.1, "kcal": 178.4, "prot": 2.68, "gluc": 35.74, "lip": 2.75, "canonical": "sauce_hoisin", "status": "ok"}, {"raw": "5 ml (1 c. à thé) sauce sriracha, et plus pour le service", "grams": 4.8, "kcal": 0.5, "prot": 0.02, "gluc": 0.08, "lip": 0.02, "canonical": "sauce_sriracha", "status": "ok"}, {"raw": "2,5 ml (1/2 c. à thé) cinq-épices moulu", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": "herbes_seches_generic", "status": "skip"}, {"raw": "2 paquets de 200 g chacun de nouilles udon", "grams": 400.0, "kcal": 552.0, "prot": 18.16, "gluc": 100.64, "lip": 8.28, "canonical": "nouilles_udon", "status": "ok"}, {"raw": "1 petit brocoli", "grams": 280.0, "kcal": 95.2, "prot": 7.9, "gluc": 18.59, "lip": 1.04, "canonical": "brocoli", "status": "ok"}, {"raw": "2 carottes", "grams": 120.0, "kcal": 49.2, "prot": 1.12, "gluc": 11.5, "lip": 0.29, "canonical": "carotte", "status": "ok"}]}, {"folder": "Divers", "filename": "bagels-air-fryer.md", "id": "Divers__bagels-air-fryer", "raw": "---\ntitre: Bagels au air-fryer\nportions: 4\ntemps_prep: \ntemps_cuisson: 15 min\ntags: [air-fryer, déjeuner]\ncertifie_bittle: true\n---\n\n## Ingrédients\n\n### Recette de base\n- 1 tasse de farine\n- 1 c. à soupe de poudre à pâte\n- 1/2 c. à thé de sel\n- 1 tasse de yogourt grec\n- Spray de cuisson\n\n### Variantes (au choix)\n- Pumpkin Spice : ajouter 3 c. à soupe de cassonade, 1 c. à soupe d'épices tarte à la citrouille et garnir de graines de citrouille\n- Garnir de graines de sésame\n- Garnir d'épices Everything Bagel\n- Ajouter 1/4 tasse de fromage râpé au mélange\n\n## Préparation\n1. Dans un bol, mesurer et ajouter la farine, la poudre à pâte et le sel. Fouetter pour bien mélanger.\n2. Ajouter ensuite le yogourt grec et remuer avec une cuillère en bois ou une spatule en caoutchouc jusqu'à ce que le tout soit combiné.\n3. Former une boule avec la pâte et la déposer sur une surface légèrement farinée.\n4. Pétrir la pâte pendant 2 à 3 minutes, puis la diviser en 4 portions égales.\n5. Rouler chaque morceau en un boudin de 20 à 25 cm (8 à 10 pouces) et pincer les extrémités pour former un bagel.\n6. Vaporiser les bagels de spray de cuisson et saupoudrer des garnitures préférées.\n7. Faire cuire les bagels à la friteuse à air à 390 °F (350 °F) pendant 15 minutes, en retournant à mi-cuisson.\n\n## Notes\n", "macros_par_ingredient": [{"raw": "1 tasse de farine", "grams": 110.9, "kcal": 431.6, "prot": 15.75, "gluc": 75.67, "lip": 7.77, "canonical": "farine_blanche", "status": "ok"}, {"raw": "1 c. à soupe de poudre à pâte", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": "poudre_a_pate", "status": "skip"}, {"raw": "1/2 c. à thé de sel", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}, {"raw": "1 tasse de yogourt grec", "grams": 252.5, "kcal": 174.2, "prot": 24.52, "gluc": 10.1, "lip": 5.05, "canonical": "yogourt_grec", "status": "ok"}, {"raw": "Spray de cuisson", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}, {"raw": "Pumpkin Spice : ajouter 3 c. à soupe de cassonade, 1 c. à soupe d'épices tarte à la citrouille et garnir de graines de citrouille", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": "herbes_seches_generic", "status": "skip"}, {"raw": "Garnir de graines de sésame", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}, {"raw": "Garnir d'épices Everything Bagel", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}, {"raw": "Ajouter 1/4 tasse de fromage râpé au mélange", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}]}, {"folder": "Divers", "filename": "croustade-dejeuner-petits-fruits.md", "id": "Divers__croustade-dejeuner-petits-fruits", "raw": "---\ntitre: Croustade déjeuner aux petits fruits\nportions: 8\ntemps_prep: 5 min\ntemps_cuisson: 30 min\ntags: [déjeuner, four]\ncertifie_bittle: true\n---\n\n## Ingrédients\n- 1 sac de 600 g (1 1/3 lb) petits fruits surgelés, non décongelés (ou 1 L / 4 tasses petits fruits frais)\n- 4 œufs\n- 250 ml (1 tasse) lait\n- 5 ml (1 c. à thé) extrait de vanille pur\n- 125 ml (1/2 tasse) cassonade légèrement tassée\n- 1 L (4 tasses) flocons d'avoine à cuisson rapide (gruau rapide)\n\n## Préparation\n1. Préchauffer le four à 180 °C (350 °F). Placer la grille au centre du four.\n2. Répartir les fruits dans un grand plat allant au four de 20 cm x 28 cm (8 po x 11 po).\n3. Dans un grand bol, fouetter les œufs. Incorporer le lait, la vanille et la cassonade.\n4. Ajouter l'avoine, bien mélanger puis étendre la préparation sur les fruits.\n5. Cuire au four 30 minutes. Laisser tiédir avant de servir.\n\n## Notes\n- Se conserve 4 jours au réfrigérateur ou 1 mois au congélateur.\n- Réchauffer au four à micro-ondes au moment de servir.\n- En cas d'allergie aux produits laitiers : remplacer le lait par de la boisson de soya enrichie non sucrée.\n", "macros_par_ingredient": [{"raw": "1 sac de 600 g (1 1/3 lb) petits fruits surgelés, non décongelés (ou 1 L / 4 tasses petits fruits frais)", "grams": 1360.8, "kcal": 775.6, "prot": 10.07, "gluc": 197.18, "lip": 4.49, "canonical": "petits_fruits", "status": "ok"}, {"raw": "4 œufs", "grams": 200.0, "kcal": 290.0, "prot": 23.6, "gluc": 1.96, "lip": 20.02, "canonical": "oeuf", "status": "ok"}, {"raw": "250 ml (1 tasse) lait", "grams": 257.8, "kcal": 128.9, "prot": 8.51, "gluc": 12.38, "lip": 5.1, "canonical": "lait", "status": "ok"}, {"raw": "5 ml (1 c. à thé) extrait de vanille pur", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": "extrait_vanille", "status": "skip"}, {"raw": "125 ml (1/2 tasse) cassonade légèrement tassée", "grams": 76.6, "kcal": 291.1, "prot": 0.09, "gluc": 75.14, "lip": 0.0, "canonical": "cassonade", "status": "ok"}, {"raw": "1 L (4 tasses) flocons d'avoine à cuisson rapide (gruau rapide)", "grams": 443.8, "kcal": 1726.4, "prot": 63.02, "gluc": 302.67, "lip": 31.07, "canonical": "flocons_avoine", "status": "ok"}]}, {"folder": "Divers", "filename": "soupe-chou.md", "id": "Divers__soupe-chou", "raw": "---\ntitre: Soupe au chou\nportions: 8\ntemps_prep: 20 min\ntemps_cuisson: 40 min\ntags: [soupe, hiver, économique]\ncertifie_bittle: true\n---\n\n## Ingrédients\n- 15 ml (1 c. à soupe) huile d'olive\n- 1/2 chou vert\n- 1/2 rutabaga (ou navet)\n- 2 carottes\n- 450 g (1 lb) pommes de terre grelots\n- 1 sac de 250 g (1/2 lb) poireaux tranchés du commerce (ou 2 poireaux, partie blanche seulement)\n- Poivre et sel\n- 2 L (8 tasses) bouillon de poulet réduit en sodium\n- 15 ml (1 c. à soupe) moutarde en poudre\n- 15 ml (1 c. à soupe) ail haché en pot (ou 3 gousses d'ail)\n\n## Préparation\n1. Couper le chou en fines lamelles (≈ 1 L). Peler le rutabaga et le couper en dés. Couper les carottes en rondelles. Couper les pommes de terre grelots en deux. Si vous utilisez des poireaux frais : trancher la partie blanche. Si vous utilisez des gousses d'ail fraîches : les hacher finement.\n2. Dans une grande casserole, chauffer l'huile à feu moyen-vif. Cuire le chou, le rutabaga et les carottes 4 ou 5 minutes en remuant fréquemment à l'aide d'une cuillère en bois.\n3. Ajouter les pommes de terre et le poireau. Poivrer généreusement, ajouter une pincée de sel et poursuivre la cuisson 2 ou 3 minutes.\n4. Verser le bouillon et incorporer la moutarde et l'ail. Porter à ébullition, couvrir et laisser mijoter 30 minutes à feu moyen-doux.\n5. Servir avec du pain ou des craquelins et du fromage.\n\n## Notes\n- Se conserve 3 jours au réfrigérateur ou 3 mois au congélateur.\n- Variante : ajouter fenouil, céleri, oignons, ou une boîte de tomates en dés. Garnir d'un peu de pesto au moment de servir.\n", "macros_par_ingredient": [{"raw": "15 ml (1 c. à soupe) huile d'olive", "grams": 13.7, "kcal": 121.2, "prot": 0.0, "gluc": 0.0, "lip": 13.69, "canonical": "huile_olive", "status": "ok"}, {"raw": "1/2 chou vert", "grams": 450.0, "kcal": 220.5, "prot": 19.26, "gluc": 39.38, "lip": 4.19, "canonical": "chou_vert", "status": "ok"}, {"raw": "1/2 rutabaga (ou navet)", "grams": 300.0, "kcal": 111.0, "prot": 3.24, "gluc": 25.86, "lip": 0.48, "canonical": "rutabaga", "status": "ok"}, {"raw": "2 carottes", "grams": 120.0, "kcal": 49.2, "prot": 1.12, "gluc": 11.5, "lip": 0.29, "canonical": "carotte", "status": "ok"}, {"raw": "450 g (1 lb) pommes de terre grelots", "grams": 450.0, "kcal": 346.5, "prot": 9.09, "gluc": 78.61, "lip": 0.4, "canonical": "pomme_de_terre", "status": "ok"}, {"raw": "1 sac de 250 g (1/2 lb) poireaux tranchés du commerce (ou 2 poireaux, partie blanche seulement)", "grams": 907.2, "kcal": 553.4, "prot": 13.61, "gluc": 128.37, "lip": 2.72, "canonical": "poireau", "status": "ok"}, {"raw": "Poivre et sel", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}, {"raw": "2 L (8 tasses) bouillon de poulet réduit en sodium", "grams": 2070.6, "kcal": 62.1, "prot": 10.15, "gluc": 4.97, "lip": 0.41, "canonical": "bouillon_poulet", "status": "ok"}, {"raw": "15 ml (1 c. à soupe) moutarde en poudre", "grams": 15.8, "kcal": 9.5, "prot": 0.59, "gluc": 0.92, "lip": 0.53, "canonical": "moutarde_ancienne", "status": "ok"}, {"raw": "15 ml (1 c. à soupe) ail haché en pot (ou 3 gousses d'ail)", "grams": 8.6, "kcal": 12.8, "prot": 0.55, "gluc": 2.85, "lip": 0.04, "canonical": "ail_pot", "status": "ok"}]}, {"folder": "Poisson", "filename": "croquettes-saumon-aneth.md", "id": "Poisson__croquettes-saumon-aneth", "raw": "---\ntitre: Croquettes de saumon à l'aneth\nportions: 6\ntemps_prep: 15 min\ntemps_cuisson: 30 min\ntags: [four, congélateur]\ncertifie_bittle: true\n---\n\n## Ingrédients\n\n### Croquettes\n- 675 g (1 1/2 lb) pommes de terre grelots (ou 1 L / 4 tasses)\n- 500 ml (2 tasses) saumon cuit (voir notes)\n- 250 ml (1 tasse) fromage râpé à l'italienne (mélange du commerce)\n- 2 œufs\n- 30 ml (2 c. à soupe) aneth frais\n- Poivre et sel\n\n### Mayo à l'ail\n- 160 ml (2/3 tasse) yogourt grec nature\n- 80 ml (1/3 tasse) mayonnaise allégée\n- 5 ml (1 c. à thé) ail haché en pot (ou 1 gousse d'ail)\n- Poivre et sel\n\n## Préparation\n1. Hacher finement l'aneth. Si vous utilisez une gousse d'ail fraîche pour la mayo : la hacher finement.\n2. Préchauffer le four à 200 °C (400 °F). Placer la grille au centre du four. Tapisser une plaque de cuisson de papier parchemin.\n3. Déposer les pommes de terre grelots dans une casserole et les couvrir d'eau. Cuire à feu vif, à découvert, de 10 à 15 minutes ou jusqu'à ce que la pointe d'un couteau s'insère facilement dans une pomme de terre. Rincer à l'eau froide pour arrêter la cuisson et laisser refroidir.\n4. Sur une planche à découper, écraser grossièrement les pommes de terre à la fourchette en conservant la pelure. Déposer dans un grand bol.\n5. Ajouter le saumon, le fromage, les œufs et l'aneth. Poivrer généreusement et ajouter une pincée de sel. Mélanger.\n6. Façonner 12 croquettes de 2 cm (3/4 po) d'épaisseur (environ 80 ml / 1/3 tasse de préparation par croquette) et les déposer sur la plaque de cuisson.\n7. Cuire au four 15 minutes ou jusqu'à ce que les croquettes soient légèrement dorées.\n8. Pendant la cuisson, mélanger dans un bol tous les ingrédients de la mayo à l'ail. Poivrer généreusement et ajouter une pincée de sel.\n9. Servir les croquettes avec la mayo à l'ail et accompagner d'une salade verte.\n\n## Notes\n- 6 portions = 2 croquettes par portion.\n- Se conserve 4 jours au réfrigérateur ou 6 mois au congélateur. Pour réchauffer : déposer les croquettes congelées sur une plaque de cuisson tapissée de papier parchemin et cuire 20 minutes dans un four préchauffé à 200 °C (400 °F).\n- Variante : remplacer le saumon cuit par 3 conserves de 150 g (5 oz) de saumon égoutté, sans peau ni arête.\n", "macros_par_ingredient": [{"raw": "675 g (1 1/2 lb) pommes de terre grelots (ou 1 L / 4 tasses)", "grams": 675.0, "kcal": 519.8, "prot": 13.63, "gluc": 117.92, "lip": 0.61, "canonical": "pomme_de_terre", "status": "ok"}, {"raw": "500 ml (2 tasses) saumon cuit (voir notes)", "grams": 500.0, "kcal": 1040.0, "prot": 102.1, "gluc": 0.0, "lip": 67.1, "canonical": "saumon_cuit", "status": "ok"}, {"raw": "250 ml (1 tasse) fromage râpé à l'italienne (mélange du commerce)", "grams": 139.5, "kcal": 566.3, "prot": 33.53, "gluc": 1.86, "lip": 47.17, "canonical": "cheddar", "status": "ok"}, {"raw": "2 œufs", "grams": 100.0, "kcal": 145.0, "prot": 11.8, "gluc": 0.98, "lip": 10.01, "canonical": "oeuf", "status": "ok"}, {"raw": "30 ml (2 c. à soupe) aneth frais", "grams": 1.1, "kcal": 0.5, "prot": 0.04, "gluc": 0.08, "lip": 0.01, "canonical": "aneth_frais", "status": "ok"}, {"raw": "Poivre et sel", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}, {"raw": "160 ml (2/3 tasse) yogourt grec nature", "grams": 161.6, "kcal": 111.5, "prot": 15.69, "gluc": 6.46, "lip": 3.23, "canonical": "yogourt_grec", "status": "ok"}, {"raw": "80 ml (1/3 tasse) mayonnaise allégée", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}, {"raw": "5 ml (1 c. à thé) ail haché en pot (ou 1 gousse d'ail)", "grams": 2.9, "kcal": 4.3, "prot": 0.18, "gluc": 0.95, "lip": 0.01, "canonical": "ail_pot", "status": "ok"}, {"raw": "Poivre et sel", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}]}, {"folder": "Poisson", "filename": "rouleau-printemps-crevettes-tahini.md", "id": "Poisson__rouleau-printemps-crevettes-tahini", "raw": "---\ntitre: Rouleaux de printemps aux crevettes et concombres, sauce crémeuse au tahini\nportions: 4\ntemps_prep: 40 min\ntemps_cuisson: 5 min\ntags: [asiatique, poêle, rapide]\ncertifie_bittle: false\n---\n\n## Ingrédients\n\n### Sauce crémeuse au tahini\n- 125 ml (1/2 tasse) tahini\n- 30 ml (2 c. à soupe) huile de sésame grillé\n- 1 gousse d'ail\n- 30 ml (2 c. à soupe) sauce tamari\n- 30 ml (2 c. à soupe) vinaigre de riz\n- 30 ml (2 c. à soupe) miel\n- 15 ml (1 c. à soupe) sambal oelek\n- 80 ml (1/3 tasse) eau très chaude\n\n### Crevettes épicées\n- 45 ml (3 c. à soupe) sauce tamari\n- 15 ml (1 c. à soupe) miel\n- 15 ml (1 c. à soupe) huile de sésame grillé\n- 5 ml (1 c. à thé) poudre 5 épices\n- 2,5 ml (1/2 c. à thé) fécule de maïs\n- 30 ml (2 c. à soupe) huile de canola\n- 400 g crevettes crues, déveinées et décortiquées (16 à 20)\n\n### Rouleaux\n- 8 à 10 feuilles de riz\n- 8 concombres libanais\n- 100 g vermicelles de riz cuits\n- 100 g carottes\n- 20 g chou chinois (daikon)\n- 20 g feuilles de coriandre fraîche ou de menthe\n- 85 g gingembre mariné\n\n## Préparation\n\n### Sauce crémeuse au tahini\n1. Dans un récipient étroit, à l'aide d'un pied-mélangeur, mixer tous les ingrédients de la sauce jusqu'à l'obtention d'une texture lisse. Réserver.\n\n### Crevettes épicées\n1. Bien éponger les crevettes.\n2. Dans un petit bol, mélanger tous les ingrédients sauf l'huile de canola et les crevettes. Réserver.\n3. Dans une grande poêle antiadhésive, chauffer l'huile de canola à feu élevé. Faire dorer les crevettes environ 2 minutes.\n4. Ajouter la sauce réservée (attention aux éclaboussures !). Cuire de 2 à 3 minutes de plus pour terminer la cuisson.\n\n### Rouleaux\n1. Couper les concombres libanais en rubans. Couper les carottes et le chou chinois en julienne.\n2. Dans un grand bol rempli d'eau chaude, tremper une feuille de riz à la fois pendant quelques secondes ou jusqu'à ce qu'elle ramollisse. Retirer de l'eau, égoutter et déposer sur une surface propre et lisse. Replier deux extrémités de la feuille de riz vers l'intérieur.\n3. Déposer des rubans de concombres, une partie du reste des garnitures et des crevettes épicées sur la feuille de riz en les laissant dépasser légèrement de chaque côté. Rouler fermement la feuille pour bien emprisonner la garniture.\n4. Couvrir le rouleau d'un linge humide pendant la préparation des autres rouleaux.\n5. Servir les rouleaux avec la sauce crémeuse au tahini.\n\n## Notes\n- Source : K pour Katrine — kpourkatrine.com\n- Temps de prep / cuisson estimés (non visibles dans la source).\n", "macros_par_ingredient": [{"raw": "125 ml (1/2 tasse) tahini", "grams": 118.2, "kcal": 717.7, "prot": 21.22, "gluc": 21.15, "lip": 66.74, "canonical": "beurre_sesame", "status": "ok"}, {"raw": "30 ml (2 c. à soupe) huile de sésame grillé", "grams": 27.6, "kcal": 244.6, "prot": 0.0, "gluc": 0.0, "lip": 27.64, "canonical": "huile_sesame", "status": "ok"}, {"raw": "1 gousse d'ail", "grams": 3.0, "kcal": 4.5, "prot": 0.19, "gluc": 0.99, "lip": 0.01, "canonical": "ail_gousse", "status": "ok"}, {"raw": "30 ml (2 c. à soupe) sauce tamari", "grams": 29.4, "kcal": 26.5, "prot": 2.41, "gluc": 4.25, "lip": 0.09, "canonical": "sauce_soya", "status": "ok"}, {"raw": "30 ml (2 c. à soupe) vinaigre de riz", "grams": 30.4, "kcal": 5.5, "prot": 0.0, "gluc": 0.01, "lip": 0.0, "canonical": "vinaigre_riz", "sta cal": "riz_blanc_cuit", "status": "ok"}, {"raw": "100 g carottes", "grams": 100.0, "kcal": 41.0, "prot": 0.93, "gluc": 9.58, "lip": 0.24, "canonical": "carotte", "status": "ok"}, {"raw": "20 g chou chinois (daikon)", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "no_match"}, {"raw": "20 g feuilles de coriandre fraîche ou de menthe", "grams": 20.0, "kcal": 4.6, "prot": 0.43, "gluc": 0.73, "lip": 0.1, "canonical": "coriandre_fraiche", "status": "ok"}, {"raw": "85 g gingembre mariné", "grams": 85.0, "kcal": 68.0, "prot": 1.55, "gluc": 15.1, "lip": 0.64, "canonical": "gingembre_frais", "status": "ok"}]}, {"folder": "Poisson", "filename": "salade-tiede-crevettes-asiatique.md", "id": "Poisson__salade-tiede-crevettes-asiatique", "raw": "---\ntitre: Salade tiède de crevettes à l'asiatique\nportions: 8\ntemps_prep: 10 min\ntemps_cuisson: 10 min\ntags: [asiatique, salade]\ncertifie_bittle: true\n---\n\n## Ingrédients\n\n### Salade\n- 225 g (1/2 lb) nouilles asiatiques de blé\n- 450 g (1 lb) crevettes nordiques surgelées non décongelées\n- 2 bébés bok choys\n- 40 pois mange-tout\n- 1/2 poivron rouge\n\n### Vinaigrette\n- 30 ml (2 c. à soupe) huile de canola\n- 30 ml (2 c. à soupe) sauce soya réduite en sodium\n- 30 ml (2 c. à soupe) vinaigre de riz\n- 15 ml (1 c. à soupe) miel du Québec\n- 5 ml (1 c. à thé) gingembre frais\n- 5 ml (1 c. à thé) ail haché en pot (ou 1 gousse d'ail)\n- 5 ml (1 c. à thé) huile de sésame grillé\n- 5 ml (1 c. à thé) sauce piquante sriracha\n\n### Garniture\n- 125 ml (1/2 tasse) arachides non salées\n- 125 ml (1/2 tasse) basilic thaï frais\n- 3 oignons verts\n- 1 orange\n\n## Préparation\n1. Hacher les bébés bok choys. Hacher grossièrement les pois mange-tout. Couper le poivron en julienne. Râper le gingembre. Si vous utilisez une gousse d'ail fraîche : la hacher finement. Hacher les arachides. Hacher finement le basilic thaï et les oignons verts. Couper l'orange en quartiers.\n2. Cuire les nouilles dans l'eau bouillante 1 minute de moins que le temps de cuisson indiqué sur l'emballage. Ajouter les crevettes, les légumes et poursuivre la cuisson 1 minute.\n3. Pendant ce temps, mélanger les ingrédients de la vinaigrette dans un saladier ou un grand bol de service.\n4. Égoutter les nouilles, les crevettes et les légumes. Ne pas rincer. Ajouter dans le bol contenant la vinaigrette et mélanger pour bien enrober la salade.\n5. Garnir d'arachides, de basilic et d'oignons verts.\n6. Au moment de servir, presser un quartier d'orange sur chaque portion. Se mange chaud ou tiède.\n\n## Notes\n- Se conserve 2 jours au réfrigérateur et ne se congèle pas.\n- Le basilic thaï peut être remplacé par de la menthe fraîche.\n- Variante : nouilles asiatiques de blé (type Farkay) trouvables au rayon produits asiatiques. Remplaçables par vermicelles de riz ou autre type de nouilles asiatiques.\n", "macros_par_ingredient": [{"raw": "225 g (1/2 lb) nouilles asiatiques de blé", "grams": 225.0, "kcal": 310.5, "prot": 10.21, "gluc": 56.61, "lip": 4.66, "canonical": "nouilles_udon", "status": "ok"}, {"raw": "450 g (1 lb) crevettes nordiques surgelées non décongelées", "grams": 450.0, "kcal": 319.5, "prot": 61.24, "gluc": 4.09, "lip": 4.54, "canonical": "crevettes", "status": "ok"}, {"raw": "2 bébés bok choys", "grams": 200.0, "kcal": 28.0, "prot": 1.8, "gluc": 5.94, "lip": 0.28, "canonical": "bok_choy", "status": "ok"}, {"raw": "40 pois mange-tout", "grams": 160.0, "kcal": 67.2, "prot": 4.48, "gluc": 12.08, "lip": 0.32, "canonical": "pois_mange_tout", "status": "ok"}, {"raw": "1/2 poivron rouge", "grams": 60.0, "kcal": 18.6, "prot": 0.59, "gluc": 3.62, "lip": 0.18, "canonical": "poivron_rouge", "status": "ok"}, {"raw": "30 ml (2 c. à soupe) huile de canola", "grams": 27.6, "kcal": 244.6, "prot": 0.0, "gluc": 0.0, "lip": 27.64, "canonical": "huile_canola", "status": "ok"}, {"raw": "30 ml (2 c. à soupe) sauce soya réduite en sodium", "grams": 29.4, "kcal": 26.5, "prot": 2.41, "gluc": 4.25, "lip  (2 c. à soupe) pâte de tomates\n- 450 g (1 lb) saucisses italiennes douces ou fortes\n- 55 g (3/4 tasse) parmesan frais râpé\n- 1 courgette\n- 750 ml (3 tasses) bouillon de poulet\n- 200 g (1 tasse) orzo\n- 1 petit brocoli\n- 30 ml (2 c. à soupe) beurre\n- Sel et poivre\n\n## Préparation\n1. Retirer la chair des saucisses (jeter les boyaux). Râper la courgette. Râper le brocoli.\n2. Placer la grille au centre du four. Préchauffer le four à 230 °C (450 °F).\n3. Dans un plat de cuisson de 33 x 23 cm (13 x 9 po), mélanger les tomates et la pâte de tomates. Saler et poivrer. Réserver.\n4. Dans un grand bol, mélanger la chair à saucisses avec 35 g (1/2 tasse) du parmesan et la courgette. Saler légèrement et poivrer.\n5. À l'aide d'une cuillère à crème glacée de 45 ml (3 c. à soupe), former des boulettes avec le mélange et les répartir dans le plat de cuisson au fur et à mesure.\n6. Cuire au four 15 minutes. Augmenter la température à gril (broil) et poursuivre la cuisson 5 minutes ou jusqu'à ce que les boulettes soient cuites et légèrement dorées et que la sauce ait réduit légèrement.\n7. Entre-temps, dans une casserole, porter à ébullition le bouillon. Saler légèrement et poivrer. Ajouter l'orzo et cuire très al dente, environ 6 minutes. Ajouter le brocoli et poursuivre la cuisson 2 minutes ou jusqu'à ce que l'orzo et le brocoli soient cuits. Retirer du feu.\n8. Ajouter le beurre et le reste du parmesan dans la casserole avec l'orzo. Bien mélanger et rectifier l'assaisonnement.\n9. Dans des assiettes creuses, répartir l'orzo, la sauce tomate et les boulettes. Servir aussitôt.\n", "macros_par_ingredient": [{"raw": "1 boîte de 398 ml (14 oz) tomates en dés", "grams": 396.9, "kcal": 63.5, "prot": 3.14, "gluc": 13.77, "lip": 0.99, "canonical": "tomates_dés", "status": "ok"}, {"raw": "30 ml (2 c. à soupe) pâte de tomates", "grams": 34.9, "kcal": 28.6, "prot": 1.51, "gluc": 6.59, "lip": 0.16, "canonical": "pate_tomate", "status": "ok"}, {"raw": "450 g (1 lb) saucisses italiennes douces ou fortes", "grams": 450.0, "kcal": 729.0, "prot": 77.08, "gluc": 18.9, "lip": 36.36, "canonical": "saucisse_italienne", "status": "ok"}, {"raw": "55 g (3/4 tasse) parmesan frais râpé", "grams": 55.0, "kcal": 231.0, "prot": 15.63, "gluc": 7.65, "lip": 15.31, "canonical": "parmesan", "status": "ok"}, {"raw": "1 courgette", "grams": 200.0, "kcal": 42.0, "prot": 5.42, "gluc": 6.22, "lip": 0.8, "canonical": "courgette", "status": "ok"}, {"raw": "750 ml (3 tasses) bouillon de poulet", "grams": 776.5, "kcal": 23.3, "prot": 3.8, "gluc": 1.86, "lip": 0.16, "canonical": "bouillon_poulet", "status": "ok"}, {"raw": "200 g (1 tasse) orzo", "grams": 200.0, "kcal": 276.0, "prot": 9.08, "gluc": 50.32, "lip": 4.14, "canonical": "orzo", "status": "ok"}, {"raw": "1 petit brocoli", "grams": 280.0, "kcal": 95.2, "prot": 7.9, "gluc": 18.59, "lip": 1.04, "canonical": "brocoli", "status": "ok"}, {"raw": "30 ml (2 c. à soupe) beurre", "grams": 30.0, "kcal": 152.7, "prot": 0.99, "gluc": 0.0, "lip": 16.53, "canonical": "beurre", "status": "ok"}, {"raw": "Sel et poivre", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}]}, {"folder": "Porc", "filename": "cotelettes-porc-bbq.md", "id": "Porc__cotelettes-porc-bbq", "raw": "---\ntitre: Côtelettes de porc au four, sauce barbecue express\nportions: 4\ntemps_prep: 15 min\ntemps_cuisson: 30 min\ntags: [bbq, plaque, four]\ncertifie_bittle: true\n---\n\n## Ingrédients\n\n### Porc et légumes\n- 450 g (1 lb) carottes nantaises\n- 1 brocoli (environ 280 g)\n- 45 ml (3 c. à soupe) huile végétale\n- 10 ml (2 c. à thé) paprika doux\n- 7,5 ml (1 1/2 c. à thé) cassonade\n- 2,5 ml (1/2 c. à thé) poudre d'ail\n- 2,5 ml (1/2 c. à thé) sel\n- 4 côtelettes de porc désossées d'environ 2 cm (3/4 po) d'épaisseur\n- Ciboulette, au goût (facultatif)\n\n### Sauce\n- 60 ml (1/4 tasse) ketchup\n- 60 ml (1/4 tasse) sirop d'érable\n- 30 ml (2 c. à soupe) moutarde à l'ancienne\n- 15 ml (1 c. à soupe) vinaigre de cidre\n\n## Préparation\n1. Couper les carottes en deux sur la longueur, puis en tronçons biseautés de 2,5 cm (1 po). Couper le brocoli en bouquets. Ciseler la ciboulette si utilisée.\n2. Placer la grille au centre du four. Préchauffer le four à 220 °C (425 °F).\n3. Sur une plaque de cuisson antiadhésive ou tapissée de papier parchemin, enrober les légumes de 30 ml (2 c. à soupe) d'huile. Saler et poivrer. Cuire au four 15 minutes.\n4. Entre-temps, dans un petit bol, mélanger le paprika avec la cassonade, la poudre d'ail et le sel. Poivrer généreusement. Sur une assiette, enrober les côtelettes du mélange d'épices de chaque côté. Arroser du reste de l'huile. Laisser macérer le temps de cuire les légumes.\n5. Retirer la plaque du four. Répartir les côtelettes sur la plaque à travers les légumes. Poursuivre la cuisson 10 minutes ou jusqu'au degré de cuisson désiré. Laisser reposer les côtelettes 5 minutes sur une autre assiette.\n6. Poursuivre la cuisson des légumes au four jusqu'à ce qu'ils soient dorés et tendres, au besoin. Verser le jus de cuisson accumulé sur les légumes et bien mélanger.\n7. Entre-temps, dans une tasse à mesurer ou un bol en verre, mélanger tous les ingrédients de la sauce. Saler et poivrer. Cuire au four à micro-ondes 1 min 30 en remuant à mi-cuisson.\n8. Dans des assiettes, répartir la viande et les légumes. Accompagner de la sauce. Parsemer de ciboulette. Servir avec une purée de pommes de terre, si désiré.\n", "macros_par_ingredient": [{"raw": "450 g (1 lb) carottes nantaises", "grams": 450.0, "kcal": 184.5, "prot": 4.19, "gluc": 43.11, "lip": 1.08, "canonical": "carotte", "status": "ok"}, {"raw": "1 brocoli (environ 280 g)", "grams": 280.0, "kcal": 95.2, "prot": 7.9, "gluc": 18.59, "lip": 1.04, "canonical": "brocoli", "status": "ok"}, {"raw": "45 ml (3 c. à soupe) huile végétale", "grams": 41.5, "kcal": 366.5, "prot": 0.0, "gluc": 0.0, "lip": 41.46, "canonical": "huile_vegetale", "status": "ok"}, {"raw": "10 ml (2 c. à thé) paprika doux", "grams": 4.7, "kcal": 13.1, "prot": 0.66, "gluc": 2.52, "lip": 0.6, "canonical": "paprika", "status": "ok"}, {"raw": "7,5 ml (1 1/2 c. à thé) cassonade", "grams": 4.6, "kcal": 17.5, "prot": 0.01, "gluc": 4.51, "lip": 0.0, "canonical": "cassonade", "status": "ok"}, {"raw": "2,5 ml (1/2 c. à thé) poudre d'ail", "grams": 1.4, "kcal": 4.7, "prot": 0.23, "gluc": 1.03, "lip": 0.01, "canonical": "poudre_ail", "status": "ok"}, {"raw": "2,5 ml (1/2 c. à thé) sel", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}, {"raw": "4 côtelettes de porc désossées d'environ 2 cm (3/4 po) d'épaisseur", "grams": 600.0, "kcal": 762.0, "prot": 131.94, "gluc": 0.0, "lip": 22.26, "canonical": "porc_cotelette", "status": "ok"}, {"raw": "Ciboulette, au goût (facultatif)", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}, {"raw": "60 ml (1/4 tasse) ketchup", "grams": 60.9, "kcal": 61.5, "prot": 0.63, "gluc": 16.68, "lip": 0.06, "canonical": "ketchup", "status": "ok"}, {"raw": "60 ml (1/4 tasse) sirop d'érable", "grams": 79.9, "kcal": 207.7, "prot": 0.03, "gluc": 53.44, "lip": 0.19, "canonical": "sirop_erable", "status": "ok"}, {"raw": "30 ml (2 c. à soupe) moutarde à l'ancienne", "grams": 31.6, "kcal": 18.9, "prot": 1.18, "gluc": 1.84, "lip": 1.05, "canonical": "moutarde_ancienne", "status": "ok"}, {"raw": "15 ml (1 c. à soupe) vinaigre de cidre", "grams": 15.2, "kcal": 3.3, "prot": 0.0, "gluc": 0.14, "lip": 0.0, "canonical": "vinaigre_cidre", "status": "ok"}]}, {"folder": "Porc", "filename": "courgettes-farcies-italienne.md", "id": "Porc__courgettes-farcies-italienne", "raw": "---\ntitre: Courgettes farcies à l'italienne\nportions: 4\ntemps_prep: 20 min\ntemps_cuisson: 35 min\ntags: [italien, four, farci]\ncertifie_bittle: true\n---\n\n## Ingrédients\n\n### Courgettes\n- 4 courgettes moyennes\n- 30 ml (2 c. à soupe) huile d'olive\n- Sel et poivre, au goût\n- 30 ml (2 c. à soupe) persil frais (pour garnir)\n\n### Farce\n- Sauce à Spaghetti\n\n### Garniture\n- 125 ml (1/2 tasse) fromage mozzarella râpé\n- 125 ml (1/2 tasse) parmesan râpé\n- 125 ml (1/2 tasse) chapelure panko\n- 2,5 ml (1/2 c. à thé) épices italiennes\n\n## Préparation\n1. Couper les courgettes en 2 dans le sens de la longueur. Hacher le persil.\n2. Préchauffer le four à 200 °C (400 °F), placer la grille au centre et tapisser une plaque à cuisson de papier parchemin ou d'une feuille antiadhésive réutilisable.\n3. À l'aide d'une cuillère, gratter le centre des courgettes pour enlever les graines et créer une cavité, en laissant une bordure de chair. Badigeonner les courgettes d'huile d'olive et assaisonner.\n4. Déposer sur la plaque et enfourner 15 minutes.\n5. Pendant ce temps, réchauffer la sauce à spaghetti dans une casserole.\n6. Dans un bol, mélanger tous les ingrédients de la garniture.\n7. Répartir la sauce à spaghetti sur les courgettes, parsemer de la garniture, puis remettre au four environ 10 minutes.\n8. Garnir de persil et servir.\n", "macros_par_ingredient": [{"raw": "4 courgettes moyennes", "grams": 800.0, "kcal": 168.0, "prot": 21.68, "gluc": 24.88, "lip": 3.2, "canonical": "courgette", "status": "ok"}, {"raw": "30 ml (2 c. à soupe) huile d'olive", "grams": 27.4, "kcal": 242.4, "prot": 0.0, "gluc": 0.0, "lip": 27.39, "canonical": "huile_olive", "status": "ok"}, {"raw": "Sel et poivre, au goût", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}, {"raw": "30 ml (2 c. à soupe) persil frais (pour garnir)", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}, {"raw": "Sauce à Spaghetti", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}, {"raw": "125 ml (1/2 tasse) fromage mozzarella râpé", "grams": 69.7, "kcal": 177.1, "prot": 16.92, "gluc": 1.93, "lip": 11.1, "canonical": "mozzarella", "status": "ok"}, {"raw": "125 ml (1/2 tasse) parmesan râpé", "grams": 52.8, "kcal": 221.9, "prot": 15.01, "gluc": 7.35, "lip": 14.71, "canonical": "parmesan", "status": "ok"}, {"raw": "125 ml (1/2 tasse) chapelure panko", "grams": 63.4, "kcal": 243.5, "prot": 8.96, "gluc": 43.42, "lip": 3.47, "canonical": "chapelure", "status": "ok"}, {"raw": "2,5 ml (1/2 c. à thé) épices italiennes", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": "herbes_seches_generic", "status": "skip"}]}, {"folder": "Porc", "filename": "filet-mignon-porc-erable.md", "id": "Porc__filet-mignon-porc-erable", "raw": "---\ntitre: Filet mignon de porc à l'érable\nportions: 3\ntemps_prep: 15 min\ntemps_cuisson: 10 min\ntags: [poêle, rapide]\ncertifie_bittle: true\n---\n\n## Ingrédients\n- 125 ml (1/2 tasse) bouillon de poulet\n- 60 ml (1/4 tasse) sirop d'érable\n- 5 ml (1 c. à thé) moutarde de Dijon\n- 5 ml (1 c. à thé) ketchup\n- 5 ml (1 c. à thé) fécule de maïs\n- 1 filet de porc de 450 g (1 lb)\n- 30 ml (2 c. à soupe) beurre\n- 1 petit oignon\n- Sel et poivre\n\n## Préparation\n1. Émincer l'oignon.\n2. Dans un petit bol, mélanger au fouet le bouillon, le sirop d'érable, la moutarde, le ketchup et la fécule de maïs. Réserver.\n3. Sur un plan de travail, couper le filet de porc en tranches d'environ 1,5 cm (1/2 po).\n4. Dans une poêle antiadhésive à feu moyen-élevé, dorer la moitié de la viande à la fois, de chaque côté, dans la moitié du beurre. Réserver sur une assiette.\n5. Ajouter l'oignon dans la poêle et poursuivre la cuisson 2 minutes en remuant.\n6. Ajouter le mélange de bouillon et remettre la viande. Laisser mijoter 2 minutes. Saler et poivrer.\n7. Servir le porc et la sauce avec du riz blanc et un légume au choix, si désiré.\n\n## Notes\n- Recette pour 2 à 3 portions selon l'appétit.\n", "macros_par_ingredient": [{"raw": "125 ml (1/2 tasse) bouillon de poulet", "grams": 129.4, "kcal": 3.9, "prot": 0.63, "gluc": 0.31, "lip": 0.03, "canonical": "bouillon_poulet", "status": "ok"}, {"raw": "60 ml (1/4 per l'oignon rouge en 8. Émietter le fromage feta. Si vous utilisez des gousses d'ail fraîches : les hacher finement.\n2. Préchauffer le four à 230 °C (450 °F). Placer la grille au centre du four. Tapisser une plaque de cuisson de papier parchemin.\n3. Déposer le porc, les pommes de terre, les poivrons, l'oignon et l'ail sur la plaque.\n4. Verser l'huile et le jus de citron. Poivrer généreusement et ajouter une pincée de sel. Remuer avec les doigts pour enrober et répartir les ingrédients sur la plaque. Ajouter le fromage feta, sans mélanger.\n5. Cuire au four 30 minutes ou jusqu'à ce que la pointe d'un couteau s'insère facilement dans une pomme de terre.\n6. Au moment de servir, garnir d'origan et, si désiré, accompagner de sauce au yogourt et à l'ail.\n\n## Notes\n- Se conserve 4 jours au réfrigérateur ou 3 mois au congélateur.\n- **Sauce au yogourt et à l'ail (accompagnement facultatif)** : mélanger 250 ml (1 tasse) de yogourt grec nature, 2,5 ml (1/2 c. à thé) d'ail haché en pot, du poivre et une pincée de sel.\n- **Variantes** :\n  - *Italienne* — remplacer citron, feta et origan par tomates séchées, mozzarella fraîche et basilic.\n  - *Asiatique* — remplacer par jus de lime, gingembre et graines de sésame grillées.\n  - *Mexicaine* — remplacer par assaisonnement au chili, salsa et coriandre fraîche.\n", "macros_par_ingredient": [{"raw": "1 filet de porc d'environ 450 g (1 lb)", "grams": 453.6, "kcal": 485.3, "prot": 100.7, "gluc": 0.0, "lip": 5.9, "canonical": "porc_filet", "status": "ok"}, {"raw": "675 g (1 1/2 lb) pommes de terre grelots", "grams": 675.0, "kcal": 519.8, "prot": 13.63, "gluc": 117.92, "lip": 0.61, "canonical": "pomme_de_terre", "status": "ok"}, {"raw": "2 poivrons", "grams": 240.0, "kcal": 74.4, "prot": 2.38, "gluc": 14.47, "lip": 0.72, "canonical": "poivron_generic", "status": "ok"}, {"raw": "1 petit oignon rouge", "grams": 110.0, "kcal": 44.0, "prot": 1.21, "gluc": 10.27, "lip": 0.11, "canonical": "oignon_jaune", "status": "ok"}, {"raw": "15 ml (1 c. à soupe) ail haché en pot (ou 3 gousses d'ail)", "grams": 8.6, "kcal": 12.8, "prot": 0.55, "gluc": 2.85, "lip": 0.04, "canonical": "ail_pot", "status": "ok"}, {"raw": "30 ml (2 c. à soupe) huile d'olive", "grams": 27.4, "kcal": 242.4, "prot": 0.0, "gluc": 0.0, "lip": 27.39, "canonical": "huile_olive", "status": "ok"}, {"raw": "Le jus de 1 citron (ou 60 ml / 1/4 tasse)", "grams": 30.9, "kcal": 6.8, "prot": 0.11, "gluc": 2.13, "lip": 0.07, "canonical": "citron_jus", "status": "ok"}, {"raw": "Poivre et sel", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}, {"raw": "120 g (1/4 lb) fromage feta", "grams": 120.0, "kcal": 316.8, "prot": 17.05, "gluc": 4.91, "lip": 25.54, "canonical": "feta", "status": "ok"}, {"raw": "60 ml (1/4 tasse) feuilles d'origan frais", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}]}, {"folder": "Volaille", "filename": "boulettes-dinde-asiatique.md", "id": "Volaille__boulettes-dinde-asiatique", "raw": "---\ntitre: Boulettes de dinde à l'asiatique\nportions: 4\ntemps_prep: 20 min\ntemps_cuisson: 25 min\ntags: [asiatique, air-fryer, boulettes]\ncertifie_bittle: true\n---\n\n## Ingrédients\n\n### Boulettes\n- 450 g (1 lb) dinde hachée\n- 15 ml (1 c. à soupe) gingembre frais\n- 3 gousses d'ail\n- 60 ml (1/4 tasse) coriandre fraîche\n- 15 ml (1 c. à soupe) graines de sésame\n- 2 oignons verts\n- 1 œuf\n- 150 ml (2/3 tasse) chapelure panko\n- Huile végétale en vaporisateur\n\n### Sauce aigre-douce\n- 80 ml (1/3 tasse) sauce aux huîtres\n- 80 ml (1/3 tasse) jus d'orange\n- 10 ml (2 c. à thé) sriracha\n- 15 ml (1 c. à soupe) miel\n\n## Préparation\n1. Hacher le gingembre, l'ail, la coriandre et les oignons verts (le tout finement).\n2. Mélanger tous les ingrédients de la sauce dans un petit chaudron et porter à ébullition. Réserver.\n3. Dans un bol, mélanger la dinde, le gingembre, l'ail, la coriandre, les graines de sésame et les oignons verts.\n4. Dans un autre bol, mélanger l'œuf et la chapelure panko. Laisser reposer 2 minutes pour faire gonfler la chapelure, puis l'incorporer à la préparation de dinde.\n5. Façonner 16 boulettes et vaporiser d'huile.\n6. Déposer les boulettes dans le panier du air-fryer et cuire 25 minutes à 200 °C (400 °F) en mode air-fry, en remuant à mi-cuisson.\n7. Servir avec la sauce.\n", "macros_par_ingredient": [{"raw": "450 g (1 lb) dinde hachée", "grams": 450.0, "kcal": 657.0, "prot": 85.05, "gluc": 0.0, "lip": 32.54, "canonical": "dinde_hachee", "status": "ok"}, {"raw": "15 ml (1 c. à soupe) gingembre frais", "grams": 6.1, "kcal": 4.9, "prot": 0.11, "gluc": 1.08, "lip": 0.05, "canonical": "gingembre_frais", "status": "ok"}, {"raw": "3 gousses d'ail", "grams": 9.0, "kcal": 13.4, "prot": 0.57, "gluc": 2.98, "lip": 0.04, "canonical": "ail_gousse", "status": "ok"}, {"raw": "60 ml (1/4 tasse) coriandre fraîche", "grams": 4.1, "kcal": 0.9, "prot": 0.09, "gluc": 0.15, "lip": 0.02, "canonical": "coriandre_fraiche", "status": "ok"}, {"raw": "15 ml (1 c. à soupe) graines de sésame", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}, {"raw": "2 oignons verts", "grams": 30.0, "kcal": 10.2, "prot": 0.57, "gluc": 1.95, "lip": 0.12, "canonical": "oignon_vert", "status": "ok"}, {"raw": "1 œuf", "grams": 50.0, "kcal": 72.5, "prot": 5.9, "gluc": 0.49, "lip": 5.0, "canonical": "oeuf", "status": "ok"}, {"raw": "150 ml (2/3 tasse) chapelure panko", "grams": 76.1, "kcal": 292.1, "prot": 10.75, "gluc": 52.11, "lip": 4.17, "canonical": "chapelure", "status": "ok"}, {"raw": "Huile végétale en vaporisateur", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}, {"raw": "80 ml (1/3 tasse) sauce aux huîtres", "grams": 97.3, "kcal": 49.6, "prot": 1.31, "gluc": 10.62, "lip": 0.24, "canonical": "sauce_huitre", "status": "ok"}, {"raw": "80 ml (1/3 tasse) jus d'orange", "grams": 83.9, "kcal": 37.7, "p e, déglacer la poêle avec le bouillon de poulet, en grattant le fond pour décoller les sucs de cuisson. Incorporer la moutarde de Dijon, le sirop d'érable et la mayonnaise. Fouetter et laisser mijoter jusqu'à ce que la sauce soit crémeuse.\n6. Remettre les boulettes dans la poêle et laisser réchauffer quelques minutes. Garnir d'herbes fraîches hachées avant de servir.\n\n## Notes\n- 30 boulettes pour 6 portions = environ 5 boulettes par portion.\n", "macros_par_ingredient": [{"raw": "700 g (1 1/2 lb) dinde hachée", "grams": 700.0, "kcal": 1022.0, "prot": 132.3, "gluc": 0.0, "lip": 50.61, "canonical": "dinde_hachee", "status": "ok"}, {"raw": "1 œuf de grande taille", "grams": 50.0, "kcal": 72.5, "prot": 5.9, "gluc": 0.49, "lip": 5.0, "canonical": "oeuf", "status": "ok"}, {"raw": "1/2 oignon", "grams": 55.0, "kcal": 22.0, "prot": 0.61, "gluc": 5.14, "lip": 0.06, "canonical": "oignon_jaune", "status": "ok"}, {"raw": "60 ml (1/4 tasse) farine d'amande", "grams": 23.3, "kcal": 90.3, "prot": 5.22, "gluc": 13.49, "lip": 1.56, "canonical": "farine_amande", "status": "ok"}, {"raw": "4 gousses d'ail", "grams": 12.0, "kcal": 17.9, "prot": 0.76, "gluc": 3.97, "lip": 0.06, "canonical": "ail_gousse", "status": "ok"}, {"raw": "7,5 ml (1 1/2 c. à thé) romarin frais", "grams": 0.9, "kcal": 1.1, "prot": 0.03, "gluc": 0.18, "lip": 0.05, "canonical": "romarin_frais", "status": "ok"}, {"raw": "7,5 ml (1 1/2 c. à thé) thym frais", "grams": 1.2, "kcal": 1.2, "prot": 0.07, "gluc": 0.3, "lip": 0.02, "canonical": "thym_frais", "status": "ok"}, {"raw": "5 ml (1 c. à thé) sel casher", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}, {"raw": "2,5 ml (1/2 c. à thé) poivre noir fraîchement moulu", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}, {"raw": "45 ml (3 c. à soupe) huile d'olive extra vierge", "grams": 41.1, "kcal": 363.6, "prot": 0.0, "gluc": 0.0, "lip": 41.08, "canonical": "huile_olive", "status": "ok"}, {"raw": "250 ml (1 tasse) bouillon de poulet", "grams": 258.8, "kcal": 7.8, "prot": 1.27, "gluc": 0.62, "lip": 0.05, "canonical": "bouillon_poulet", "status": "ok"}, {"raw": "60 ml (1/4 tasse) moutarde de Dijon", "grams": 63.1, "kcal": 37.9, "prot": 2.36, "gluc": 3.68, "lip": 2.11, "canonical": "moutarde_dijon", "status": "ok"}, {"raw": "60 ml (1/4 tasse) sirop d'érable", "grams": 79.9, "kcal": 207.7, "prot": 0.03, "gluc": 53.44, "lip": 0.19, "canonical": "sirop_erable", "status": "ok"}, {"raw": "30 ml (2 c. à soupe) mayonnaise", "grams": 27.9, "kcal": 189.7, "prot": 0.27, "gluc": 0.16, "lip": 20.88, "canonical": "mayonnaise", "status": "ok"}, {"raw": "Romarin et thym frais (pour la garniture)", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}]}, {"folder": "Volaille", "filename": "boulettes-dinde-ricotta.md", "id": "Volaille__boulettes-dinde-ricotta", "raw": "---\ntitre: Boulettes fondantes à la dinde et à la ricotta\nportions: 4\ntemps_prep: 20 min\ntemps_cuisson: 20 min\ntags: [italien, four, salade]\ncertifie_bittle: true\n---\n\n## Ingrédients\n\n### Boulettes\n- 450 g (1 lb) dinde hachée (ou poulet haché)\n- 1 contenant de 300 g (10 1/2 oz) fromage ricotta à 5 % m.g. (325 ml / 1 1/3 tasse)\n- 1 œuf\n- 125 ml (1/2 tasse) chapelure de blé entier à l'italienne\n- 15 ml (1 c. à soupe) fines herbes séchées (mélange à l'italienne)\n- 1 pincée flocons de piment fort\n- Poivre et sel\n\n### Sauce tomate rapide\n- 1 boîte de 796 ml (28 oz) tomates en dés sans sel ajouté, avec le jus\n- 5 ml (1 c. à thé) poudre d'oignon\n- 5 ml (1 c. à thé) poudre d'ail\n- 5 ml (1 c. à thé) cassonade légèrement tassée\n\n### Salade\n- 30 ml (2 c. à soupe) huile d'olive\n- 15 ml (1 c. à soupe) vinaigre balsamique blanc\n- 1 cœur de laitue romaine\n- 1 petit radicchio\n- 1/4 oignon rouge\n- 1/2 fenouil (bulbe et tiges, avec ses feuilles)\n\n### Pour servir\n- Feuilles de basilic frais\n\n## Préparation\n1. Trancher finement le cœur de laitue romaine. Retirer le cœur du radicchio, puis le trancher finement. Trancher finement l'oignon rouge. Trancher finement le fenouil (bulbe et tiges) et hacher ses feuilles.\n2. Préchauffer le four à 200 °C (400 °F). Placer la grille au centre du four. Tapisser une plaque de cuisson de papier parchemin.\n3. Dans un grand bol, mélanger la dinde, la ricotta, l'œuf, la chapelure, les fines herbes et les flocons de piment. Poivrer généreusement et ajouter une pincée de sel.\n4. Façonner 12 boulettes et les déposer sur la plaque. Cuire au four 20 minutes ou jusqu'à ce que les boulettes soient dorées.\n5. Dans une grande tasse à mesurer allant au four à micro-ondes, au pied-mélangeur, réduire en purée les ingrédients de la sauce tomate. Couvrir d'une pellicule de plastique et cuire 4 ou 5 minutes au four à micro-ondes.\n6. Dans un grand bol, fouetter l'huile et le vinaigre. Incorporer le reste des ingrédients de la salade.\n7. Répartir la salade dans 4 assiettes, puis déposer 3 boulettes par assiette. Napper de sauce tomate et garnir de basilic. Accompagner de pain frais.\n\n## Notes\n- 4 portions de 3 boulettes.\n- Les boulettes se conservent 4 jours au réfrigérateur ou 3 mois au congélateur. La sauce tomate se conserve 1 semaine au réfrigérateur ou 6 mois au congélateur.\n- En cas d'allergie au blé / sans gluten : remplacer la chapelure de blé par de la chapelure à base de maïs ou de riz.\n", "macros_par_ingredient": [{"raw": "450 g (1 lb) dinde hachée (ou poulet haché)", "grams": 450.0, "kcal": 657.0, "prot": 85.05, "gluc": 0.0, "lip": 32.54, "canonical": "dinde_hachee", "status": "ok"}, {"raw": "1 contenant de 300 g (10 1/2 oz) fromage ricotta à 5 % m.g. (325 ml / 1 1/3 tasse)", "grams": 56.7, "kcal": 78.2, "prot": 6.46, "gluc": 2.91, "lip": 4.48, "canonical": "ricotta", "status": "ok"}, {"raw": "1 œuf", "grams": 50.0, "kcal": 72.5, "prot": 5.9, "gluc": 0.49, "lip": 5.0, "canonical": "oeuf", "status": "ok"}, {"raw": "125 ml (1/2 tasse) cha 27.5, "kcal": 11.0, "prot": 0.3, "gluc": 2.57, "lip": 0.03, "canonical": "oignon_jaune", "status": "ok"}, {"raw": "1/2 fenouil (bulbe et tiges, avec ses feuilles)", "grams": 117.0, "kcal": 36.3, "prot": 1.45, "gluc": 8.54, "lip": 0.23, "canonical": "fenouil", "status": "ok"}, {"raw": "Feuilles de basilic frais", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}]}, {"folder": "Volaille", "filename": "boulettes-poulet-grecques.md", "id": "Volaille__boulettes-poulet-grecques", "raw": "---\ntitre: Boulettes de poulet à la grecque, salade de concombres et mayo ail et citron\nportions: 4\ntemps_prep: 35 min\ntemps_cuisson: 20 min\ntags: [grec, four, été]\ncertifie_bittle: true\n---\n\n## Ingrédients\n\n### Boulettes\n- 675 g (1 1/2 lb) poulet haché\n- 1 petite courgette (environ 125 g)\n- 1/2 tasse (65 g) chapelure\n- 2 c. à soupe (30 ml) moutarde de Dijon\n- 1 1/2 c. à thé (7,5 ml) assaisonnement grec\n- Zeste de 1/2 citron bien lavé\n- 2 petites gousses d'ail\n- 1/2 c. à thé (2,5 ml) sel\n\n### Mayo ail et citron\n- 3/4 tasse (165 g) yogourt grec nature\n- 1 petite gousse d'ail\n- Zeste de 1/2 citron bien lavé\n- 1 c. à soupe (15 ml) jus de citron\n- 1 c. à soupe (15 ml) miel\n- 1/2 c. à thé (2,5 ml) assaisonnement grec\n- 1/4 c. à thé (1,25 ml) sel\n- Poivre, au goût\n\n### Salade de concombres et petits pois\n- 6 concombres libanais\n- 1 1/2 tasse (225 g) petits pois blanchis\n- 1/3 tasse (15 g) menthe fraîche\n- 3 c. à soupe (45 ml) huile d'olive\n- 1 c. à soupe (15 ml) jus de citron\n- 1 c. à thé (5 ml) moutarde de Dijon\n- 1/2 c. à thé (2,5 ml) sel\n- 1 petite gousse d'ail\n- Poivre, au goût\n\n## Préparation\n1. Râper finement la courgette. Zester le citron. Hacher l'ail (boulettes, mayo, salade — 4 gousses au total). Hacher la menthe. Couper les concombres en petits cubes.\n2. Préchauffer le four à 400 °F et placer la grille au centre. Tapisser une plaque à biscuits de parchemin.\n3. Dans un bol, mélanger tous les ingrédients des boulettes. Avec les mains légèrement humides, former des boulettes de la grosseur d'une balle de golf et les déposer sur la plaque. Vaporiser de spray à cuisson. Cuire au four 20 min. Régler la température à broil et cuire 2 min maximum.\n4. Pendant la cuisson des boulettes, préparer la mayo : mélanger tous les ingrédients dans un bol. Réserver.\n5. Mélanger tous les ingrédients de la salade de concombres et petits pois. Servir avec les boulettes et la mayo ail et citron.\n\n## Notes\n- La recette originale mentionne « sauf l'huile » à l'étape 2, mais aucune huile n'est listée dans les ingrédients des boulettes. Possible coquille — la mention a été retirée.\n", "macros_par_ingredient": [{"raw": "675 g (1 1/2 lb) poulet haché", "grams": 675.0, "kcal": 985.5, "prot": 127.57, "gluc": 0.0, "lip": 48.8, "canonical": "poulet_hache", "status": "ok"}, {"raw": "1 petite courgette (environ 125 g)", "grams": 125.0, "kcal": 26.2, "prot": 3.39, "gluc": 3.89, "lip": 0.5, "canonical": "courgette", "status": "ok"}, {"raw": "1/2 tasse (65 g) chapelure", "grams": 63.4, "kcal": 243.5, "prot": 8.96, "gluc": 43.42, "lip": 3.47, "canonical": "chapelure", "status": "ok"}, {"raw": "2 c. à soupe (30 ml) moutarde de Dijon", "grams": 31.6, "kcal": 18.9, "prot": 1.18, "gluc": 1.84, "lip": 1.05, "canonical": "moutarde_dijon", "status": "ok"}, {"raw": "1 1/2 c. à thé (7,5 ml) assaisonnement grec", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": "herbes_seches_generic", "status": "skip"}, {"raw": "Zeste de 1/2 citron bien lavé", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}, {"raw": "2 petites gousses d'ail", "grams": 6.0, "kcal": 8.9, "prot": 0.38, "gluc": 1.98, "lip": 0.03, "canonical": "ail_gousse", "status": "ok"}, {"raw": "1/2 c. à thé (2,5 ml) sel", "grams": 0.0, "kcal": 0.0, "prot": 0.0, "gluc": 0.0, "lip": 0.0, "canonical": null, "status": "skip"}, {"raw": "3/4 tasse (165 g) yogourt gr
