# Mapping canonique français → CNF (Santé Canada)
#
# Pour chaque aliment, on définit :
#   cnf_id   : FoodID dans le CNF (data/cnf_foods.json)
#   aliases  : liste de chaînes (sans accents, minuscules, sans qty/unit)
#              que le parser cherchera dans la ligne d'ingrédient
#   count_g  : (optionnel) grammes par défaut pour "1 unité" sans poids
#              (ex. "1 oignon" → 110 g)
#   skip     : (optionnel, true) ignorer cet aliment (macros = 0)
#
# Format : YAML simplifié — un parser maison (pas de dépendance PyYAML)
# le lit. Voir tools/parse_yaml.py.

skip_keywords:
  - sel
  - poivre
  - sel et poivre
  - poivre et sel
  - poivre, au goût
  - sel et poivre, au goût
  - sel et poivre au goût
  - sel casher
  - sel casher et poivre noir moulu, au goût
  - poivre noir fraîchement moulu
  - poivre noir concassé
  - poivre du moulin
  - eau
  - eau très chaude
  - spray de cuisson
  - huile végétale en vaporisateur
  - un filet d'huile d'olive
  - 1 filet d'huile
  - filet d'huile
  - feuilles de basilic frais
  - basilic frais
  - origan frais, pour garnir
  - persil ou thym frais
  - brins d'aneth
  - feuilles d'origan frais
  - romarin et thym frais
  - estragon frais et fleur de sel, pour garnir
  - ciboulette, au goût
  - ciboulette
  - feuilles de laitue ou de chou
  - pickles
  - tomate
  - persil frais (pour garnir)
  - persil frais
  - graines de sésame grillées
  - graines de sésame
  - sauce piquante sriracha
  - mayonnaise allégée
  - sauce à spaghetti
  - garnir de graines de sésame
  - garnir d'épices everything bagel
  - ajouter 1/4 tasse de fromage râpé au mélange
  - "**cuisson longue** : oignons en fines tranches, carottes en rondelles, céleris tranchés en biseau, pieds de brocoli tranchés"
  - "**cuisson courte** : pois mange-tout, mini-bok choys tranchés, poivrons en lanières, fleurons de brocoli, chou chinois nappa en fines tranches, oignons verts en tronçons, courgettes tranchées en biseau, fèves germées"
  - "légumes au choix :"

